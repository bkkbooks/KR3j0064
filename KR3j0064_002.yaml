body:
  text: 名義考卷二目録天部東隅桑榆雪用瓊字雹霰雷虹蜺慶雲甘露野馬白駒玉燭醴泉伏臘木公金母扶桑若木祥瑞月惡日忌寒食五行八卦昧谷土牛納音常儀占月正朔歲本夜子時百刻更鼔世節令所起百六陽九反支往亡耗磨刑禁上戊欽定四庫全書名義考巻二明周祈撰天部東隅桑榆馮異傳失之東隅收之桑榆淮南子西日垂景在樹端謂之桑榆謂晩也東隅未有解者隅當作嵎即書所謂嵎夷東方日出之地故曰東隅謂蚤也異與赤眉戰先敗績囘谿後破於澠池言失之於蚤收之於晩囘谿澠池所戰地俱在今河南永寧縣界雪用瓊字古人咏雪多用瓊樹瓊枝瓊瑶皆誤也謝惠連賦林挺瓊樹李商隠詩已隨江令誇瓊樹按瓊赤玉也二公且誤况其他乎雹霰雹音薄霰音線洪範五行傳隂陽相脅而雹霰盛隂雨雪凝滯而氷寒陽氣薄之不相入則散而為霰盛陽雨水温暖而湯熱隂氣脅之不相入則轉而為雹霰者陽脅隂也雹者隂脅陽也大戴禮陽之專氣為雹隂之專氣為霰說雹霰者莫辨於此矣雷説文雷隂陽薄動生物者也明是陽氣激隂而出故有聲奮自地者陽欲升也鳴自天者陽欲降也激物乃其遇耳然有雷斧雷楔沈括以斧乃銅鐵為之楔乃石又有雷火括又云内侍李舜舉家􅍥上漆器銀釦者銀盡鎔漆器不焦灼一劔亦鎔劔室儼然斧楔乃氣聚似斧楔似鐵石即隕星亦似石火乃陽極所生銀與劔鎔而漆器劔室存者自李舜舉家偶見若此耳此隂陽不測之謂神也􅍥音紀釦音口虹蜺爾雅螮蝀謂之雩螮蝀虹也蜺為挈二凡虹雙出色鮮盛者為雄曰虹闇者為雌曰蜺淮南子天二氣則成虹釋名純陽攻隂之氣朱子曰日與雨交倐然成質天地之淫氣皆不若詩詁為得詩詁蝃蝀隂氣所為也陽氣下而隂氣應則為雲而雨隂氣起而陽不應則為虹故詩以喻淫奔俗名美人虹以此也螮蝃俱音帝蝀音東慶雲甘露爾雅疏云五色為慶雲三色為矞雲西京雜記慶雲曰景雲或曰卿雲雲外赤内青謂之矞雲晉中興書甘露降耆老得敬則松柏受之尊賢容衆則竹葦受之其凝如脂其美如飴一名天酒雲五色者鮮三色二色者常有之松脂有誤以為甘露者熈寧中華隂縣民以甘露降告縣有道人笑曰此木將槁故耳及春果不復榮矞音聿野馬白駒莊子野馬也塵埃也沈括云塵埃與野馬乃田野間浮氣逺望如羣羊又如水波佛書謂如熱時野馬陽焰魏豹傳人生一世間如白駒之過隙注白駒日影也是日氣謂之野馬日景謂之白駒駒與馬以疾馳上騰為義野言其處白言其色耳玉燭醴泉爾雅四時和謂之玉燭甘雨時降萬物以嘉謂之醴泉蓋謂四時和光明如玉燭時雨降潤澤如醴泉郭璞注道光照是矣所以致醴泉非不知璞意何以兩訓伏臘厯忌釋秋以金代火故至庚日必伏髙堂隆曰王者各以其行之盛祖以其終臘二説似是而非厯家初伏在夏至後第三庚中伏第四庚末伏在立秋初庚則初伏中伏猶在季夏晉張亮曰臘明日為初歲則臘在除日是非以金代火與以其行之終臘也説文冬至後三戌為臘顔師古曰隂氣將起迫於殘陽而不得升為伏斯二言者近之矣伏臘皆祭名三戌三庚猶云上辛上戊秦德公六月初作伏祠以夏至後隂氣將起磔狗四門以禦蠱災謂之伏伏者藏也藏隂氣以抑隂也秦惠文王十二月初臘以冬至後陽氣初起報祭百神謂之臘臘者接也接陽氣以扶陽也皆秦人為之周以前無是也厯家與張亮之説亦非木公金母木東方生氣有父道故曰公金西方成氣有母道故曰母曰王公王母者尊之也有謂木公居雲房之間以紫雲為蓋青雲為城仙童侍立玉女散香真僚皆稟命焉王母狀如人豹尾虎首蓬髪暠然白首石城金屋穴居其中在崑崙墟之北又有謂穆王觴西王母於瑶池張子房拜東王公於道者妄益甚矣暠音杲扶桑若木十洲記扶桑在碧海中樹長數千丈一千餘圍兩幹同根更相依倚日所出處山海經灰野之山有樹青葉赤華名曰若木日所入處夫日所出入最為荒逺桑曰扶木曰若亦以疑似言之耳根幹花葉孰從而見之耶𤾉谷虞淵等稱亦不過因義立名非若職方可考而知也祥瑞説文祥福也瑞以玉為信也徐氏曰天以人君有徳符將錫之厯年錫之五福先出此以與之為信也如景星慶雲嘉禾醴泉之類然祥兼禍福而言易注禍福之祥漢志妖孽自外來謂之祥書亳有祥左傳將有大祥吉以兆福㐫以兆禍皆天之示信也故曰祥瑞今人槩以為福因說文誤也俗謂福澤曰造化災厄曰星辰不知造化星辰亦兼禍福二者月惡日忌世俗以正五九月為月惡戒殺不上官佛家謂天帝釋以大寳鏡於此三月照南贍部洲察人善惡或謂月令孟春毋覆巢仲夏薄滋味季秋寒氣將至民皆入室時令當然也又以每月初五十四二十三為日忌不出行不營為隂陽家以此三日為五鬼下哭為飛廉小火或謂此三日即河圖數之中宫五數五為君象非臣庶所得用也二家可不論而五數亦何害於用耶寒食荆楚嵗時記以去冬至一百五日為寒食是在仲春之末太原舊俗以介子推焚骸至其亡月每冬中輒一月寒食是在仲冬二説自異今寒食在清明前則是去冬至一百五日非介子推亡月而用子推事誤也歲時記以是日有疾風甚雨風雨豈可必亦是臆説周官司烜氏仲春以木鐸徇火禁於國中禁火則寒食鑽燧乃出火也此正謂龍忌之禁蓋龍星木位春木行心大火火盛故禁周制則然與介子推何與仲春一月皆然非獨去冬至一百五日之日也五行八卦五行謂之行者流行而不息也八卦謂之卦者掛萬象於上也五行各有神以司之卜者以配卦之六爻蒼龍木神朱鳥火神白虎金神𤣥武水神勾陳土神而又有螣蛇何也𤣥武原有龜蛇二者既分螣蛇則𤣥武獨為龜矣勾陳鹿頭龍身天上神獸也昧谷尚書堯典宅西曰昧谷謂日所入處𡨕昧之谷也伏生尚書作􅬛谷􅬛與昧同古文今文之别耳徐廣注堯紀以􅬛為栁曰栁谷已譌矣周禮縫人注云度西曰栁穀並宅與谷而變易之又愈譌矣疏遂云栁者諸色所聚日將沒其色赤兼有餘色故曰栁穀其附㑹有如此者土牛月令季冬之月出土牛以送寒氣非立春日也成都記太平興國二年縣司以土牛呈知府就午門前薦以香燈酒果知府程給事曰芒兒耕墾之人不宜上㕔無祭先農之事也今有司迎春造土牛芒神至日於門外酒果朝服以祭祭畢擊而碎之謂祭先農似太簡謂祭牛與芒兒似太過謂勸耕不應反碎之以傷牛謂為勾芒不應䇿牛以慢神失不自今相襲之誤也納音鬼谷子作納音納者受也音者感物助聲也水音一六火音二七木音三八金音四九土音五十此生成之數也甲巳子午九乙庚丑未八丙辛寅申七丁壬卯酉六戊癸辰戌五己亥四此干支之數也五行之中惟金木有自然之音水火土必相假而後成音水無音假土則激火無音假水則沸土無音假火則烈以干支之數合生成之數感物助聲而音斯受矣如甲子乙丑其數三十有四四者金之音也故曰金戊辰己巳其數二十有三三者木之音也故曰木庚午辛未其數三十有二二者火也土以火為音故曰土甲申乙酉其數三十十者土也水以土為音故曰水戊子己丑其數三十有一一者水也火以水為音故曰火六十甲子皆然其曰海中爐中云者以生旺衰墓為義如子屬水金死於子墓於丑水旺而金死故曰海中金丙丁屬火又得寅卯之木以生之天地開爐萬物始生故曰爐中火他可類推常儀占月儀叶音俄嫦娥始見淮南子許愼張衡又附㑹之説者益紛紛矣宋史繩祖引漢志黄帝使羲和占日常儀占月而所謂嫦娥即常儀字之誤儀叶音俄詩實惟我儀樂且有儀皆作俄音也近潘塤又引通鑑前編常儀帝嚳之四妃而人惑於帝妃之文其辨是矣然帝嚳後黄帝幾二百年何得黄帝使占月又為帝嚳妃也意羲和古厯官常儀與羲和等故黄帝時有羲和堯時亦有羲和黄帝時有常儀帝嚳時亦有常儀也妃善占月故帝嚳使之因謂之常儀與正朔記大傳疏云周建子商建丑夏建寅是改正也周夜半商雞鳴夏平旦是易朔也自漢武以來皆以寅為正而朔不復論矣今内廷歲首朝賀在平旦王國有司多在雞鳴是何不同也歲本胡汝嘉歲本論謂今夜子時即是來日則今歲子月當為來歲似亦有理然唐堯授時以春為首夫子告為邦以夏正為善盖子時之為來日固以子而寅月之為來歲亦以子子為一陽日月皆更新焉太陽每一日順行十二方隅在子位為子時厯十二位而為十二時也每一歲逆躔十二星次當𤣥枵之次亦在子位厯十二次而為十二月也胡汝嘉見不及此夜子時夜子時謂本日夜子初初刻初一初二初三初四刻尚屬本日正初以後四刻則為來日矣如三月日夜子時立夏則月將屬巳日猶本日立秋立冬皆然十二月日夜子時立春則太歲屬改歲月將屬寅日猶本日其子時生人不復論夜與否皆以來日之日為日似有遺論也百刻每日百刻每時初凡四刻正凡四刻得八刻十二時得九十六刻尚餘四刻均分於十二時之中為初初正初也或以子丑寅卯獨多一刻非更鼔古者審時以刻漏晝夜皆然後用日晷與鼔從簡便也鼔謂之更者率更官名師古曰掌刻漏故曰率更以漏籌更易為義更鼔義又祖此世説文三十年為一世又父子相代為一世大率父子相代三十年上下耳佛家謂之刼西京雜記刼灰道家謂之塵丁約謂韋子威郎君得道尚隔兩塵道家以塵埃視人代佛則梵音不可曉也又浩刼廣韻宫殿大階級也杜詩浩刼因王造今人誤以為累世無窮之意先天道德經錬成浩刼妙一靈元則又似以世為言矣節令所起正旦朝賀始於漢制朝賀儀元夜燈火始於漢祠太一社始於漢以仲春祠社寒食始於周禁火三月三始於鄭俗上巳祓除魏改用三日清明墓祭始於春秋時有披髪於野而祭者四月八始於大慧禪師浴佛五日競渡始於楚人拯屈原伏日始於秦作伏祠六月六始於宋以天書降詔為天貺節七夕始於成武丁言織女詣牽牛中元始於佛盂蘭盆供養中秋翫月始於唐明皇銀橋升月宫九日登髙始於費長房教桓景避災下元始於道家謂是日水官詣天闕言事冬至朝賀始於魏儀亞於歲朝臘日始於殷之清祀漢以後以運墓為臘無定日臘八粥始於佛家作五香粥灌佛二十四祭竈始於隂子方以黄羊祠竈神除日始於周大儺前歲一日擊鼔驅疫厲之鬼謂之逐除又鬭草昔人以端午今在春月青精飯昔人以寒食今在四月八百六陽九一元之中四千六百一十七嵗有九戹陽戹五為旱隂戹四為水初入元百六歲有戹則前元之餘氣也故凡言災異者或曰世際陽九或曰百六之㑹也反支徃亡濳夫論注反支用月朔日為正戌􅕀朔一日反支申酉朔二日反支午未朔三日反支辰巳朔四日反支寅卯朔五日反支子丑朔六日反支集覽云立春後七日驚蟄後十四日清明後二十一日立夏後八日芒種後十六日小暑後二十四日立秋後九日白露後十八日寒露後二十七日立冬後十日大雪後二十日小寒後三十日其日是謂徃亡古以反支日不受章奏徃亡日不利行師耗磨刑禁正月十六日流傳謂之耗磨日官司不開庫月一日八日十四日十五日十八日二十三日二十八日二十九日釋氏謂之十齋日官司不行刑唐并正五九月國朝并立春以後秋分以前皆為刑禁上戊古者舉事卜用上旬之日如舜攝位告廟以正月上日魯郊以十二月下辛卜正月上辛之類國朝㑹典祭社稷以春秋仲月上戊日祭先師孔子以春秋仲月上丁日戊取義於土丁取義於文明非謂戊次於丁也如仲月十日之丁祭孔子則當以仲月一日之戊祭社稷此不待辨而知者奈何舉事者不察每以十日之丁祭孔子次日祭社稷則是中戊矣不惟於義未恊抑且於制有違禮官曽未議及者何也名義考巻二
