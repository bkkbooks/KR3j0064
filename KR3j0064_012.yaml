body:
  text: 名義考卷十二目録物部酒醴食糗餌粉餈餅麴糵緑蟻白墮尊彞觴勺罍飲器車制氷鑑水鑑闌干爐瓶銀囊滚毬梳枇蘭膏蓮炬關鍵管鑰銓衡文衡度量衡古今不同滑稽舟箜篌即琵琶巵匜白玉珂紫荷囊藟梩鹿中笏手板竹根藍尾摴蒱黃流流黃鼓角車蓋凝缸風鐸風旌書瓻酒經骨朵魁蒯緱模笵觚艗舟鸞旗屬車黃屋左纛豹尾儤房筵席刀圭金井銀床輜重什器家火廜㢝紫詔黃麻紙碑方策款識臨摹硬黃響搨牌揭帳目案字有六義肉好有二義草卅卌欽定四庫全書名義考卷十二明周祈撰物部酒醴食酒酉也以米麴酉醳為義黍所成者醴體也以汁滓相埒為義稌所成者稌即稻稻即糯詩多黍多稌為酒為醴食飯也以炊穀為義稷所成者詩曰我藝黍稷以為酒食又曰黍稷彧彧以為酒食古人以黍稷百穀之長故祭祀用焉稌則洽百禮不用祼獻矣醳音亦稌音杜又音凃祼音貫糗餌粉餈糗丘救切餈音慈周禮饈籩之實有糗餌粉餈內則注搗熬穀以為糗餌與餈同又糗搗粉熬大豆為之又曰合蒸曰餌粉之曰餈又曰粉稻米餅之曰餈又曰粉米蒸屑皆餌也訓皆未辨按說文糗熬米麥也一曰煼乾米麥也一曰􅀈糗也說文餌先屑米為粉然後溲之為餅也粉以豆為粉糝餈上也餈炊米爛乃搗之不為粉也諸家之說莫精於說文煼􅀈俱音炒義同溲音藪餅釋名餅并也溲麥麵使合并也凡以麵為食具者皆謂之餅以火炕曰爐餅有巨勝曰胡餅漢靈帝所嗜者即今燒餅以水瀹曰湯餅亦曰煮餅束晢云𤣥冬為最者即今切麵蒸而食者曰蒸餅又曰籠餅侯思正令縮葱加肉者即今饅頭繩而食者曰環餅又曰寒具桓𤣥恐汚書畫乃不復設即今饊子他如不托起溲牢丸泠淘等皆餅類麴糵說文麴酒母也徐氏曰麴糵也酒主於麴故曰酒母玉篇䊈麴酒母孟康曰媒酒酵糵麴也周禮媒人注齊人名麴麩曰媒說文玉篇媒人注訓麴已明徐氏訓麴并及糵孟康所訓俱失之蓋麴今麴餅糵今麥芽為餳者故書注曰麴多則太苦糵多則太甘今人止用麴不復用糵矣然麴亦麥所成者酒酵酒滓也麴糵以釀酒故釀成其罪者曰媒糵䊈音枚酵音教緑蟻白墮釋名酒有泛齊浮蟻在上泛泛然蓋酒之美者其上有華其色緑斟則泛泛然浮於杯間洛陽伽藍記晉河東人劉白墮善釀酒飲者醉不能醒謂酒曰白墮者與何以解憂唯有杜康意同尊彞觴勺周禮六尊犧尊象尊著尊壺尊太尊山尊以待祭祀賔客之禮六彞雞彞鳥彞黃彞虎彞蜼彞斚彞以待祼將之禮犧尊沙牛飾尊也象尊三足象其鼻形也著尊著地無足也壺尊以壺為尊也太尊瓦尊也山尊為山雲形也壺以壺太以瓦餘皆木也鳥鳯也黃龜目也蜼卬鼻岐尾獸也斚稼也刻而畫之於彞也尊之為言尊也彞之為言常也尊用以獻上及於天地彞用以祼施於宗廟而已尊受五斗彞受三斗曰罍曰卣尊彞之異名也皆用以盛酒者三禮圖云凡諸觴皆同升數則異詩疏引韓詩說一升曰爵二升曰觚三升曰觶四升曰角五升曰散總名曰爵其實曰觴爵雀也故謂之羽觴曰巵曰觥觴之異名也皆用以飲酒者周禮梓人云勺一升注勺尊升也明堂位曰夏后氏以龍勺注為龍頭狀勺口似魁勺柄似杓有似於斗又謂之斗用以挹酒者此其大略耳取象之不同所受之不一諸儒之說尚多也蜼音壘卬音昂罍說文罍龜目酒尊似壺容一斛刻作雲雷象施不窮也按雲古文作雷古文作罍刻之文象施不窮也古器存者文尚可見謂罍作阿香狀連鼓形者蓋俗也今器邊肉處有回環文猶是之遺意而知者鮮矣飲器趙襄子漆智伯之頭以為飲器韋昭曰飲器椑榼也晉灼虎子屬也一以為酒器一以為溺器按漢胸奴傳單于以老上單于所破月氐王頭為飲器者㰱血盟然則酒器是也每賔㑹設之示恨深耳溺音尿車制上古聖人觀轉蓬為輪輪主流運有輻輪中木之直指者上有爪以輳轂下有菑以指輞有轂居輪之正中而為輻之所輳三十輻共一轂當輻之空謂之藪大車之轂長一尺有半兵車之轂長三尺二寸三分其轂之長二在外以置輻一在內以受軌其內大穿謂之賢小穿謂之軹有軧轂之旁出者即長二分在外者也有輞輪之外圍者一曰轑有輨轂中鐵以受轄者亦謂之軑曰輻曰轂曰藪曰賢曰軹曰輞轑曰輨軑皆附於輪者也輪行不可載因為之輿輿車底也主容納有軫車上前後橫木大車前軫至後軫其深八尺兵車之軫四尺四寸有轖車藉交錯也有軨車藉間橫木已駕僕展軨也一曰轛有轓車箱也以障物有􅕈車軨間皮篋以藏玉有軾去輿髙三尺三寸有較去軾又髙二尺二寸通髙五尺五寸立則憑較應為敬則俯憑軾有輢兩旁植木以橫較者曰軫曰轖曰軨轛曰轓曰􅕈曰軾曰較曰輢居輿之中在輿上者也有軌車下橫木以持輪者兵車乘車之輪其崇六尺六寸軌居輪之中實得其半濟盈不濡軌是也凡車之制廣皆六尺六寸軌之廣狹既同則轍迹亦同後人因謂車轍亦曰軌車同軌是也亦謂之軸又謂之轊有轄車軌頭鐵以鍵輨者無事則脫行則設之一作牽有輹伏兔也伏於軌上一作轐曰軌軸曰轊曰轄曰輹居輿之中在輿下者也有轅兩腋木之前後出者長一丈四尺四寸有輈轅之從軫以前稍曲而上至衡居衡之上而嚮下鉤之如屋之梁謂之梁輈一曰軏有輗橫居輈下以縳軛者亦謂之衡有軛重縳於衡上以駕馬領者有軥軛之下曲者曰轅曰輈軏曰輗衡曰軛曰軥在輿前附於轅者也有蓋以覆輿者也有輇車無輻直斫木為之若推輪也有軔礙輪木也有輠盛膏器也輿方象地蓋圓象天三十輻象日月蓋弓二十八以象列星也他若為楯為樏用之泥乘山乘者其制非一皆古聖之精意也輞音罔軹音止軧音遲轑音老輨音管軑音地轖音色􅕈音復轊音遂輠音夥氷鑑水鑑鑑鏡所以照物又器名如甀大口氷鑑以盛氷置食物於中以禦溫氣周禮凌人春治鑑祭祀共氷鑑是也水鑑如水之照物無有遁形者書人無於水鑑習鑿齒水鑑無私龎德公以司馬德操為水鑑衛瓘奇樂廣曰此人之水鑑蔡大寶見栁莊嘆曰襄陽水鑑復在於兹是也甀音垂䦨干階際木勾欄曰欄干亦作䦨干眼眶亦曰䦨干蓋䦨干以橫斜為義勾欄木縱橫為之故曰䦨干以木為之故字從木息夫躬傳涕泣流兮萑蘭臣瓉曰萑蘭泣涕䦨干也萑葦蘭香草躬誤當作渙瀾亦縱橫之意淚出于眼因謂眼眶為䦨干曹植詩月落參橫北斗䦨干薛令之詩苜蓿長䦨干近孫太初詩山中芝草䦨干長凡橫斜皆可言䦨干爐瓶周人尚臭宗廟焫蕭漢人始為博山爐其制象海中博山下盤貯湯使潤氣蒸香無今之爐也所焚唯蘭蕙劉后博山爐銘中有蘭錡朱火青煙古樂府香風難久居空令蕙草殘無今之香也自武帝通南越中國始有龍腦雞舌等香通西域始有安息薔薇水等香而蕙蘭與蕭不復用矣佛氏有供花之說亦未聞用瓶瓶似罋但以汲水今之爐古鼎也今之瓶古觚也得二器者無所用以爇香插花謂之爐瓶後又倣而為之其制愈訛矣􅌊音丙錡音起罋與甕同爇音越銀囊滚毬銀囊帳中爐也滚毬被中爐也鄴中記石季龍冬月為復帳四角安金銀鑿鏤為香爐白居易詩銀囊貯火懸西京雜記長安巧匠丁緩作被中香爐為機圜轉之其運四周爐體常平趙德麟曰今謂之滚毬銀囊甚新滚毬殊不文曩豫名之曰金鞠與銀囊正作對也梳枇枇音陛廣韻梳櫛也枇細櫛也皆理髮之器炙轂子赫連氏造梳二十四齒取疏通之義故名梳枇似梳齒而密取密比之義故名枇胸奴𫝊比疏注比疏解髮之飾以金為之揚雄頭蓬不暇疏疏即梳也今枇作箆魏武帝病眼令華陀以金箆刮膜箆乃掠器非細櫛也蘭膏蓮炬宋玉招魂蘭膏明燭注以蘭漬膏取其香也唐令狐綯夜對禁中以金蓮花炬送歸院金蓮花以載炬者範銅為之天子制也關鍵管鑰老子善閉者無關楗而不可開周禮地官掌受管鍵月令謹管鑰楗或又從金鑰本作門籥亦有作籥者訓者多未辨按說文關以橫木持門戶也廣雅楗拒門木月令注鍵謂鎖之入內者鑰摶鍵器也以鐵為之搢鎖內摶取其鍵是知關即今門􅂒管即今鎖筒鍵即今鎖鑐鑰即今鑰匙鍵從金者為鎖鑐從木者為關之入牝處總曰拒門木鑰從門者以其為門用從竹者古字通用也􅂒音拴銓衡文衡銓說文衡也非是玉篇平木器今俗謂推刨衡諸書訓平廣韻權衡也今俗謂稱笴唐選法尚書銓掌七品以上選侍郎銓掌六品以下選阿衡古官名阿倚也衡平也水衡漢官名主平其稅入今吏部曰銓衡主考官曰文衡顧名思義可不平乎笴音桿度量衡古今不同宋張表臣云劉仲原得銅斛二於永興軍其一云始元四年造一云甘露元年十月造數量皆同云容十斗重四十斤以今權量較之容三斗重十五斤按永興軍漢左馮翊地始元漢昭帝年號甘露漢宣帝年號則二銅斛漢器也以此上推之亷頗見魏使一飯斗米肉十斤則是米三升肉三斤十二兩凡言一石准今三斗一斤准今六兩于定國飲酒數石不亂劉伶飲一石五斗解酲孔圭飲酒七八斗曹操帳下士持雙㦸八十斤皆可推且古升上徑一寸下徑六分其深八分古權十黍為絫十絫為銖八銖為錙二十四銖為兩視漢又輕小矣周尺才得今六寸六分家語布指知尺謂以拇指食指一奓仍以食指屈二節為一尺湯九尺文王十尺亦可推奓音揸滑稽楚辭突梯滑稽注滑稽圜轉貌公孫𢎞傳滑稽則東方朔注滑稽轉利之稱揚雄酒針鴟夷滑稽應劭曰鴟夷酒器師古曰滑稽圜轉縱舍無窮之狀是滑稽本圜轉之義或以言人或以言酒器耳酒器何以能圜轉崔浩音義酒器轉注吐酒不已若今之陽燧尊此亦是臆說按罍說文龜目酒尊刻作雲雷象施不窮也徐氏曰圜轉之意故曰不窮罍既圜轉則罍亦可稱滑稽此其義何也蓋雲雷之文圜轉不窮非吐酒不窮也今尊彞諸古器皆有之人不識以為花樣耳揚雄謂鴟夷腹如大壺說文謂罍似壺可見鴟夷與罍皆似壺之器知罍之有雲雷則鴟夷亦有雲雷知鴟夷可稱滑稽則罍亦可稱滑稽互言之也鴟當作瓻廣韻瓻酒器後通作鴟夫差取馬革為鴟夷以為榼也范蠡自號鴟夷謙言但可盛酒耳舟周禮天子造舟諸侯維舟大夫方舟士特舟天子以舟為橋自此造彼曰造諸侯以衆舟維持之曰維大夫二舟相並曰方士扁舟而已貴賤之分也後乃以造從舟作艁方從舟作舫扁從舟作艑皆非字之正也楊用修謂扁舟作鯿舟亦非箜篌即琵琶傅𤣥琵琶賦序故老云漢遣公主嫁烏孫念其行道思慕使知音者裁箏筑箜篌之聲以方語目之曰琵琶方語烏孫語也推手前曰琵引手後曰琶烏孫謂箏筑箜篌皆曰琵琶以有絃可推引也字本作批把箏即今箏筑形似箏箜篌其說不一烏孫謂箜篌為琵琶則琵琶即箜篌箏筑雖可言琵琶而其名仍舊獨箜篌易以方語耳晉志箜篌出自西域又曰琵琶出自西域皆未深考釋名箜篌空國之侯所好杜佑謂其聲坎坎應節曰坎侯吳競樂府謂樂人侯暉依琴造坎故曰坎侯皆未得其實也巵匜應劭曰巵飲酒禮器古以角作受四升師古曰飲酒圜器也漢髙紀奉玉巵為太上皇壽說文匜盥器似羹魁柄中有道可以注水左傳奉匜沃盥一為酒器一為洗手器今槩稱酒器曰巵匜失之矣廣韻杯匜似柿非是白玉珂紫荷囊荷音賀昔人誤以白玉珂作佩玉如杜甫夜宿左省詩因風想玉珂又以紫荷囊作侍從事如宋祁事賦筆助荷囊按爾雅翼貝大者珂黃黑色其骨白通俗文勒飾曰珂以貝飾馬勒謂之珂其骨白謂之白玉珂非真玉也晉輿服志文武皆有囊綴綬八座尚書則荷紫謂之生紫為祫囊綴之服外加於左肩乃負荷之荷非荷蕖也今謂囊曰荷包本此藟梩孟子藟梩注籠臿之屬按韻書蔂盛土籠或作蔂詩注築牆者捊聚壤土盛之以藟投諸版中是也梩臿也臿本作鍤鍬也爾雅􅯘謂之􅀈是也捊音裒􅯘古鍬字􅀈古臿字藟音雷梩音梨鹿中禮記司射奉中注士鹿中大夫兕中疏云刻木如兕虎而伏背上立圜圈以盛算者猶今之算盤今但平底不復刻木為鹿與兕矣笏手板徐廣車服儀制曰笏即手板也漢魏以來皆執手板有事則插於紳間故曰縉紳晉王坦之倒執手板唐段秀實以笏擊朱泚唐故事搢笏於帶而乘馬張九齡體羸使人持之因置笏囊崔琳每嵗時宴于家以一榻置笏猶重積其上是知古人執笏搢笏不獨對君也竹根藍尾杜甫詩共醉終同卧竹根白居易詩三杯藍尾酒竹根藍尾人多未喻庾信山杯捧竹根是知竹根杯名傾銀注玉富貴者之器竹根山家之器其醉一也藍又作婪宋景文詩且盡燈前婪尾杯河東記謂是謙遜不敢先飲石林燕語謂是處於末席得酒常貪婪二說非是廣韻飲酒半罷半在曰䦨當作䦨尾為是淳于髠所謂主留髠而送客當此之時能飲一石者也宋景文意亦是但襲用婪字不察耳摴蒱摴蒱局戲局戲為博博為今雙陸按韻㑹樗似椿北人呼山椿江東呼虎目葉脫處有痕如摴蒱子故名樗虎目與摴蒱子皆謂葉脫處形迹也知樗以摴蒱得名則知摴蒱以骰子為義雙陸有骰子也黃流流黃詩瑟彼玉瓉黃流在中注黃流鬱鬯也沈佺期詩誰為含愁獨不見更教明月照流黃人多未喻流黃蓋謂簟也簟之佳者織文黃色滑膩若流故曰流黃唐人詩珍簟冷流黃是也韓昌黎詠吾蘄竹簟云攜來當晝不得卧一府爭看黃琉璃則又以琉璃比黃色矣鼓角衛公兵法軍城及野營行軍在外日出沒時鼓千撾三百三十捶為一通鼓音止角音動吹十二聲為一疊一角三鼓而昏明畢角之曲有三弄一曰為君難為臣亦難難又難二曰創業難守成亦難難又難三曰起家難保家亦難難又難曹子建撰今角聲嗚嗚者皆難字曳聲耳車蓋車上覆者曰蓋其形圓以象天風俗通黃帝戰蚩尤於涿鹿常有五色雲氣金枝玉葉止於帝上因作華蓋武王伐紂大風折蓋遂為曲蓋家語孔子之郯遭程子於途傾蓋而語漢髙紀天子車以黃繒為蓋裏謂之黃屋續漢志二千石皆皂蓋皆車上覆者也後世乘藍輿乃謂繖為蓋矣凝缸佛書凝缸注凝定也缸燈也缸從缶蓋長頸罌佛氏以注油燃燈故謂缸為燈凝則燈光之凝定也唐人不知誤以凝為銀以缸為釭黃氏辨釭為車轂中鐵是矣不知二字俱誤非止釭也風鐸風旌開元遺事唐岐王宫於竹林內懸碎玉片每夜聞相觸之聲即知有風號占風鐸又五王宫中各立長竿挂五色旌於竿頭四垂綴以金鈴有聲即往視旌之所向可以知四方風候此後世鐵馬定馬旗之始也書瓻酒經瓻酒器亦以盛書大者一石小五斗古語借書一瓻還書一瓻後人訛以瓻為癡謂借書與人為一癡還書為一癡經亦酒器小頸環口修腹受一斗晉安人餉人酒一經二經至五經他境人不達其義聞五經至束帶迎於門乃是酒五瓶二事出聞見侯鯖二録骨朵朵本作􅥺音髽演繁露云宋景文謂俗以撾為骨朵古無稽據字書檛竹瓜反通作簻徒果反轉為骨朵此說亦非說文檛箠也本作􅥺是􅥺與撾簻一也曰骨朵者始製以木從木曰檛以竹從竹曰簻曰􅥺後以骨飾之曰骨􅥺猶骰子以竹從竹曰簺以牙曰牙簺以車渠曰車渠簺今又範銅為之宿衛人所執者是也􅥺又待可切後人去竹直曰骨朵遂難曉也今人稱花含胎者曰骨朵上敷下枝與檛類也檛簻俱音髽簺音色敷音敷魁說文魁羹斗也蓋挹羹之器北斗七星第一至第四為首其形方有似於魁故名魁第五至第七為末其形曲似魁柄故名杓總謂之斗借羹斗為言也凡為首者皆名曰魁罪首曰渠魁舉首曰倫魁亦曰大魁是又借斗首為言也又東夷傳三韓皆魁頭露紒注魁頭猶科頭科當作窠謂人髮縈繞成窠有似於羹斗其取義已逺作科益謬矣杓音標窠音科蒯緱蒯音塊緱音勾史馮歡往見孟嘗君置之傳舍十日問傳舍長曰客何為曰馮先生甚貧猶有一劒耳又蒯緱按廣韻刀劒頭纒絲為緱爾雅蒯草中為索蒯緱言劒緱無絲以草為之也模笵通俗文規模曰笵以土曰型以金曰鎔以木曰模以竹曰笵今模笵作模範按說文出必先告其神樹茅以依神為軷既祭軷轢於牲而行為範作範借用耳軷音鈸觚論語觚注或曰酒器或曰木簡說文觚鄉飲之爵受四升韓詩外傳一升曰觚此酒器之觚也博雅笘􅀢䉉也小兒所書通俗文木四方為稜八稜為柧䉉柧通作觚陸士衡文賦或操觚而率爾此木簡之觚也一名而二物夫子本意所指今不可知即以木簡言之亦得笘音占􅀢音𨽻艗舟艗音逆廣韻艗舟也舟首謂之艗首則凡舟皆可言艗首者對尾而言後誤作鷁張協七命乘鷁舟兮為水嬉郭璞云鷁水鳥也今江東貴人船前作青雀是其像也嘗考鷁即鶂鶂即鶬鴰鶬鴰即鬼車所謂九頭鳥蓋鵂鶹類也其為禽不祥舟首何取焉且青雀為桑扈又非鷁晉王濬為益州刺史謀伐吳造戰艦畫怪獸於其首以懼江神今官舟多獸形無水鳥者是鷁本無與於艗當作艗首為是後人誤用璞亦誤釋也鸞旗屬車黃屋左纛顔師古曰編以羽毛列繫幢旁載於車上謂之鸞旗車駕出則陳於道而先行輿服志古者諸侯二車九乘秦滅九國兼其車服大駕屬車八十一乘法駕半之最後一車懸豹尾蔡雍曰天子車翠羽蓋以黃繒為裏是為黃屋李斐曰纛羽葆幢也在乘輿車衡上左方注之故曰左纛豹尾儤房儤音豹崔豹古今注豹尾車周制象君子豹變尾言謙也蔡雍云行道豹尾中亦為禁中今鹵簿有幡曰豹尾雖非車亦其遺意也唐志新到官府併上者謂之儤俗謂程司課作者為儤上增韻吏官連直也今大內有儤房當是課作連直之所以為豹房者誤筵席古人坐於地以席藉之司几筵疏初地一重者謂之筵重在上者謂之席皆以莞蒲為之詩上莞下簟是也或以竹書筍席篾席是也天子諸侯席有黼黻純飾憑則設几宴饗則設籩豆今俗言椅以代席也言棹以代几也言楪以代籩豆也椅棹楪本無此字椅則借椅柅之椅棹與楪皆俗書也今人謂尊俎曰筵席至又謂席一筵可哂也刀圭本草云刀圭十分方寸匕之一藥准如梧桐子大釋名婦人上服曰袿其下垂者上廣下狹如刀圭夫刀圭本草以狀藥之大小釋名以見燕尾之廣狹未有明言其義者蓋刀鋭處如圭首故曰刀圭猶刀尖也匕匙也方一寸得十分一分如梧桐子大衣下垂者割正幅使一頭狹如燕尾然梧桐子燕尾其大小廣狹才刀尖若耳故或言梧桐子或言燕尾或言刀圭也金井銀床禇記室世言金井梧飄以葉上有金井字非井也唐人謂井欄為銀床潘平田之說不知何據葉上恐亦無字今人家鑿井有置鉛錫其下者蓋青金也或以此得名銀床亦非井欄蓋轆轤架也廣韻轆轤圓轉木也用以汲水喪大紀以紼繞碑間之鹿盧南人謂之油葫蘆北人謂之滑車曰銀者對金而言或其色白也李白詩絡緯秋啼金井欄亦是指井蘇軾露帳銀床初破睡誤以銀床為偃息之具也輜重說文軿車前衣車後徐氏曰所謂庫車字林載衣物車前後皆蔽後漢書輿服志注軿車有衣蔽無後轅者謂之輜釋名輜厠也謂軍糧什物雜厠載之以其纍重故稱輜重說文衣字即字林輿服志蔽字但說文輜後蔽字林與志則前後俱蔽釋名雜厠正所謂庫也字林衣物即所謂軍糧什物也或曰輜載衣車重載物車非是什器家火軍法五人為伍二伍為什共其器物故稱什器從軍及作役者十人為火共畜調度故稱家火廜㢝博雅廜㢝菴也通俗文屋平曰廜㢝四時纂要作屠蘇又廣韻酴酥酒名玉篇麥酒不去滓飲是屠蘇為屋酴酥為酒本不相混也唐人詩手把屠蘇讓少年先把屠蘇不讓春誤以屠蘇為酴酥後人遂謂屠蘇又為酒古人正旦飲酒以少者得歲故先飲老者失時故後飲是日酒皆然亦無屠蘇先飲之說或云屠絶鬼氣蘇醒人魂妄說也紫詔黃麻漢志凡天子璽皆以武都紫泥封聞見後録謂武都今階州山水皆赤而泥紫用為印色故詔有紫泥之稱泥豈堪作印色或如今紫粉之類武都所出為最非真泥也唐太宗詔用麻紙寫詔勑髙宗以制勑為永式白紙多蠧自今並用黃紙蓋自蔡倫用樹膚敝布為紙故有麻紙遜齊閒覽謂以檗染紙使不蠧故曰黃麻古今書籍亦曰黃卷不獨詔勑用黃紙也紙古者書用竹帛竹簡䇿是已其字從竹帛紙是已其字以糸一作紙從巾馮鑑事始謂蔡倫始造紙史繩祖引趙飛燕赫蹄書注赫蹄小紙也謂紙已見於前漢其辨似是而亦未燭其原按說文紙絲滓也以絲繅餘絮為紙以是為書謂之帛書非真縑帛也後漢蔡倫始用樹膚及敝布魚網為紙今榖樹皮紙即蔡倫樹膚紙髙麗蠶繭紙即古絲滓紙又有用竹與秸者因樹膚而生智也紙一音低蹄音題聲相近訛謂紙為蹄赫赤也赫蹄謂赤紙也鄧展謂赫音䦧孟康謂蹄猶地晉灼謂薄小物為赫蹄皆非後人以漢人之說多未詳考也糸音覔赫音黑繅音騷穀谷搆二音閲音奭碑今世所謂碑古無之七十二家封禪言勒石穆天子傳言為名迹於弇兹石上可見者惟此而已士昏禮入門當碑揖則廟內之碑用以麗牲者喪大記天子用大木為碑謂之豐碑諸侯樹兩大木謂之桓盈檀弓注天子六繂四碑諸侯四繂二碑士二繂無碑則方上之碑用以下棺者臣子因於其上紀述功德今廟堂墓隧及諸創建碑林立而不知非古也方策春秋正義云簡容一行字數行者書於方方所不容書於策杜預曰大事書之於策小事簡牘而已大事小事謂字有多寡也古者折竹為簡以火炙之令其汗取其青易書青簡汗青殺青皆取炙竹為義曰篇廣韻謂篇簡成章也連編諸簡謂之策以繩次策謂之編此簡篇策從竹編從糸也又以木為方謂之柧作觚故曰操觚又謂之槧故曰鉛槧其體方總謂之方曰劄說文刺著也竹木以刺著為書竹書當作劄木書當作札曰牒說文以為札曰牘說文以為書板皆方也此柧槧札從木牒牘從片說文片判木也大都不過竹木二者後世易之以紙而其稱名猶故也款識古器有款識款謂隂字是凹入者識謂陽字是凸出者款居外識居內夏器有款有識商器無款有識凹腰遏二音凸突耋二音臨摹硬黃響搨於古人書畫置紙在傍視其大小濃淡形勢而學之謂之臨以紙覆其上隨其曲折宛轉用筆謂之摹置紙尉斗上以黃蠟塗勻儼如魫角毫釐必見謂之硬黃就明窗上以紙覆映光摹之謂之響榻牌揭博雅篁牌籍也周禮職幣以書揭之疏謂府别各為一牌書知善惡價數多少謂之揭今言牌票揭帖義出此帳目今俗謂簿籍曰帳目韻書帳幬也帷也無有以簿籍為義者按漢制郡國歲時上計顔師古曰計若今諸州之計帳是師古亦用帳字其來久矣案字有六義說文案几屬周禮掌次張氊案魏志曹公作欹案卧視書又玉篇食器也史髙祖過趙趙王自持案進食隱逸傳孟光每饋食舉案齊眉曹操别傳太祖為人佻至以頭沒杯案中又據也荀子案飾其辭董仲舒策謹案春秋又考也丙吉傳無所案驗又下也爾雅疏可以案酒又止也周紀案兵無出肉好有二義爾雅肉好若一謂之環郭璞云肉邉也好孔也禮記寬裕肉好之音輔氏曰肉好猶俗言美滿也方氏曰肉好如一旋而不窮者環肉好之音旋而不窮者也義亦相貫草卅卌草音入卅音颯卌音習說文草二十并卅三十并卌數名顔之推稽聖賦中山何夥有子百草言有子百二十也韓愈孔戣墓志孔世卅八謂戣為孔子三十八世孫也字統卌插糞把皆讀為一字後人直以草為二十卅為三十卌為四十是一字而讀為二字矣至有讀草為奴店切又有直作念字者其謬不知何起也名義考卷十二
