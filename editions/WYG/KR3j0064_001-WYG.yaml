body:
  text: 名義考卷一目録天部天七襄房星非馬烏兔月星之光北辰北斗天一太一紫微太微少微台階五星二十八宿牛女啓明長庚星辰中星彗孛長實沈次王良星參商𤣥武分野薰風光風化日扶搖羊角花信風黄梅雨太白欽定四庫全書名義考卷一明周祈撰天部天蓋天其說出庖犧謂天形如蓋天運如轉磨日月實東行而天牽之以西沒宣夜殷氏之制無傳漢郗萌補其說謂日月五星浮生虚空之中七曜伏見無常北斗不與衆星西沒攝提鎭星皆東行蓋天寡驗郗萌無承唯渾天儀自堯舜以來用之其言曰天形如雞子地居中而天周焉日在地上為晝日在地下為夜渾天圜貌儀即璣衡也今欽天銅儀其遺制黄帝書曰天在地外水在天外水浮天而載地考靈曜注二十八宿及諸星皆循天左行日月五星右行不易之論也七襄大東之詩曰跂彼織女終日七襄跂即跂予望之之跂舉踵望也襄說文織文也漢魏郡有縣能織錦綺因名襄七襄織文之數也詩意謂望彼織女終日織文至七襄之多終不成報我之文章也詩注未及此箋謂自卯至酉更七次殊非房星非馬爾雅天駟房也周禮馬八尺以上為龍房東方蒼龍宿龍為天馬故曰天駟非馬也龍也八尺以上馬之最良者故曰龍非龍也馬也漢儒以馬祖為天駟星史記王良䇿馬車騎滿野至有謂龍與馬交生良馬者皆謬也烏兔張衡靈憲日者太陽之精積而成鳥象烏陽之類其數竒月者太隂之精積而成獸象兔隂之類其數耦論衡曰烏日氣也酉陽雜俎曰佛氏謂月中所有乃大地山河影或言蟾兔地影空處水影也此可見烏兔乃日月積氣非實有烏兔也地影之說恐未然日陽精全體渾融月隂魄猶少有渣滓耳月星之光周髀云日猶火月猶水火施光水含影月光生於日所照魄生於日所蔽京房云月與星隂也有形無光日照之乃有光周髀之說無驗京房猶踵之且日既入矣厚地之下更於何處照考靈曜月當日則光盈近日則明盡斯言得之蓋月星本自有光獨避日耳朔以後漸逺於日其光漸増故望日光滿望以後漸近於日其光漸减故晦日明盡日入而星見日出而星沒猶之月也日食時厯厯有星亦自可驗辟之人臣在輦轂自藏戢漸逺則漸烜赫矣月食以與日同道相射遙奪其光雖逺猶近也北辰北斗北辰其星五即北極即中宫天極星天官書天極星其一明者太一之常居也在紫微中北斗其星七春秋運斗樞云第一天樞第二璇為魁第三璣第四權第五衡第六開陽第七瑶光第一至第四為斗第五至第七為杓杓攜龍角衡殷南斗魁枕參首二星自異人多以北斗為北辰爾雅疏亦誤杓音鑣天一太一隋書天一星在紫宫中天帝之神也太一星在天一南亦天帝之神也天官書天極星其一明者太一之常居也二書所云不若宋均之說為得均曰天一太一北極之别名蓋天一太一天極北極皆謂北辰星也北辰又謂之耀魄寳又謂之昊天上帝漢祀太一正祀此星耳隋書分為二星非是天官書太一之常居何也蓋北辰其星有五其一明者為太一之常居太一猶天子其一明者猶闕庭也紫㣲太㣲少㣲紫微即紫宫天官書環之匡衛十二星藩臣皆曰紫宫前列直斗口三星若見若不見曰隂德晉天文志紫宫垣十五星其西蕃七東蕃八在北斗北晉志十五星兼隂德三星而言太微一曰衡天官書衡太微三光之庭宋均曰太微天帝南宫正義太微宫垣十星在翼軫之北春秋緯太微為天德中有五帝座五帝者蒼帝威靈仰赤帝赤熛怒黄帝含樞紐白帝白招拒黒帝叶光紀即五緯星也座在太微垣中本五帝座而曰三光之庭者并言之也五帝亦天帝也五帝應五行五行各有德又曰天德少微四星在太微西一曰處士台階天官書魁下六星兩兩而比者曰三能三能色齊君臣和不齊為乖戾春秋元命苞云三台起文昌抵太微王公之位晉天文志三台六星西近文昌二星曰上台為司命主夀次二星曰中台為司中主宗室東二星曰下台為司禄主兵黄帝泰階六符經曰泰階天子之階也上階上星為男主下星為女主中階上星為諸侯三公下星為卿大夫下階上星為士下星為庻人是台階上自天子下至庻人徴驗皆繫焉獨曰三公者非也能與台同苞音包五星東方歲星十二歲而周天南方熒惑三十三歲而周天西方太白八歲而周天北方辰星一歲而周天中央塡星二十八歲而周天與日月右旋謂之五緯同舍為合是為易行有德者慶亡德者殃晉志五星降於地為人歲星為貴臣熒惑為小兒歌舞嬉戯太白為壯夫處於林麓辰星為婦女塡星為老人婦女二十八宿二十八宿十二次在焉東方七宿其形龍北方七宿其形龜蛇西方七宿其形虎南方七宿其形朱鳥龍虎南首而北尾朱鳥龜蛇西首而東尾角亢夀星也房心尾大辰也亦曰大火箕斗之間析木也即漢津斗牛星紀也虚𤣥枵也又名顓頊之虚又名北陸室壁娵訾也奎婁降婁也昴大梁也又名旄頭又名西陸觜參實沈也井鬼鶉首也栁鶉火也朱鳥之咮翼軫鶉尾也日月之㑹十一月在星紀十二月𤣥枵正月娵訾二月降婁三月大梁四月實沈五月鶉首六月鶉火七月鶉尾八月夀星九月大火十月析木㑹而為晦晦而復蘇為朔咮音晝牛女焦林太斗紀天河之西有星煌煌與參俱出謂之牽牛天河之東有星微微在氐之下謂之織女牽牛一名河鼔譌為黄姑續齊諧志桂陽成武丁有仙道謂七月七日織女當渡河弟問故曰織女暫詣牽牛此不過武丁一人之謬悠耳至今遂謂織女嫁牽牛至有謂烏鵲填河而渡織女牽牛娶織女借天帝錢二萬久不還被驅在營室何誣天之甚也啓明長庚啓明長庚二星也李氏曰啓明即太白長庚不知何星夾祭鄭氏曰啓明金星長庚水星金在日西故日將出則東見水在日東故日將沒則西見郭璞云啓明太白星也晨見東方為啓明昏見西方為太白且庚又金屬故人謂長庚為太白不疑也如李母夢長庚子名白不知庚續也啓明謂旦出長庚謂長續璞亦不免誤李氏以為太白夾漈鄭氏以為金水二星然太白辰星俱出以辰戌入以丑未又安得每日東西見也或别是二星非金水星辰星陽之榮也萬物之精也辰日月交㑹於十二次也不當日月之㑹直謂之星日月所㑹謂之辰謂之次謂之宿亦謂之房中星尚書仲春星鳥仲夏星火仲秋星虚仲冬星昴月令仲春昏弧中仲夏昏亢中仲秋昏牽牛中仲冬昏東壁中三統厯立春昏畢十度中元嘉厯立春昴九度中其不同者何也鄭康成謂月令舉其初朔尚書總舉月中故月令之中星常在前書之中星常在後然昴又在壁前初朔之說亦未然南方七宿鶉火井為鶉首其度廣逺弧星在井度中最易見故書言鳥月令言弧中也心大火也與亢皆東方宿故書言火月令言亢也虚與牽牛皆北方宿昴與東壁皆西方宿故書言虚月令言牽牛書言昴月令言東壁或總言其全或各言其一其為二十八宿應分至昏見於南方無弗同也至月令與厯不同者孔穎達以為月令但舉其大畧若然則尚書亦是舉其大畧而劉歆何承天之徒視羲和反精詳矣恐如歲差乃有不同耳彗孛長彗音遂孛音僕文穎曰彗孛長三星其占異同孛光芒短其光四出蓬蓬勃勃彗光芒長參參如掃彗長星光芒有一直指或竟天或十丈三丈二丈大法孛彗多為除舊布新火災長星多為兵革爾雅彗星為欃槍郭璞云彗亦謂之孛此説非欃音餐槍音撐實沈次王良星次有實沈在觜參間而實沈髙辛氏子也星有王良在天駟旁而王良趙簡子時人也蓋星家因髙辛氏使實沈主參故謂觜參為實沈之次王良善御故謂天駟旁一星為王良至傅說星主後宫女巫禱祠求子之事與殷傅說不相蒙莊周謂傅說星為殷相蘇軾謂傅說為列星皆誤也參商至親不睦曰參商參參星也商商丘也昔髙辛氏有二子長閼伯次實沈不相能也帝遷閼伯於商丘以主辰遷實沈於大夏以主參曰參商者錯舉以見也亦有言參辰者變言辰夏亦得閼音遏𤣥武𤣥武天文北宫七宿也蓋水之精天一所生者虚危以前其形蛇室壁其形龜居坎位曰𤣥有鱗介曰武又曰眞武祀𤣥武即郊祀黑帝之意乃設象散髪跣足身披鎧甲以象鱗介𤣥裳皂纛以應坎置龜蛇於前明其為七宿非人也國朝崇祀太和山謂太和形勝惟𤣥武足以當之故曰武當有曰母某氏生於某代某年為人天教主者妄也䙝天甚矣鎧音􅀈分野分扶問切古者封國皆有分星以觀妖祥或繫之北斗如魁主雍或繫之二十八宿如星紀主吳越或繫之五星如歲星主齊吳之類有土南而星北土東而星西反相屬者何耶先儒以為受封之日歲星所在之辰其國屬焉吳越同次者以同日受封也故自昔星家以歲之所在為福歲之所衝為災屢有明驗秦以後則一統矣疆域之廢置則又大不侔矣如之何皆驗也薫風舜南風歌南風之薫兮薫香草風何以謂之薫按薫蕙也即零陵香是蕙从惠薫从熏以零陵香其氣惠和可熏因名曰蕙曰薫也南風長養萬物有惠和熏蒸之義故得薫名莊子薫然慈仁謂之君子義取此光風化日光風日出而風也爾雅日出而風為暴夫日出隂消風日明麗故謂之光而曰暴者誤也化日化國之日也􅅗夫論化國之日舒以長日有定晷惟民有餘力故覺長所謂無事此静坐一日似兩日也晷音詭扶摇羊角莊子摶扶摇羊角而上者九萬里扶摇暴風相扶而動摇奔疾若犬走然即爾雅所謂猋也羊角旋風望之揷天如羊角即爾雅所謂頽也又轉旋如焰焚輪之狀亦曰焚輪猋音鑣花信風東臯雜録江南自初春至初夏五日一畨風候謂之花信風梅花風最先楝花風最後凡二十四畨以為寒絶楝今苦楝木三四月開花紅紫色其餘二十二花當是桃杏荼䕷之屬惜雜録未具言也黄梅雨風土記夏至前雨為黄梅雨沾衣服皆敗涴埤雅云江湘兩浙四五月間梅欲黄落則水潤土溽礎壁皆汗鬱蒸成雨謂之梅雨今人衣服四五月間為濕氣所敗謂之上梅說文物中久雨青黒曰黴楚辭顔黴黎以沮敗則梅雨上梅皆當作黴因雨當梅熟遂譌為梅雨至有迎梅送梅之説又因梅雨譌為上梅益謬矣涴烏卧切溽音辱礎音楚黴音眉太白晉灼曰太白隂星上公大將軍之象出東當伏東出西當伏西過午為經天洪範五行傳太白少隂之星以己未為界不得經天而行然太白八年而周天周天不免過午過午不能以己未為界不知星家當周天之年論經天與否如論是亂紀八年一見矣名義考卷一
