body:
  text: 名義考卷九目録物部蒲盧菉竹苞桑葑菲鬱鬯黍稷穜稑粱粟秔稻蘭蕙鳧茈頻婆蘋蘩藴藻芄蘭杜蘅蔆芡萑葦荇蓴蓬蒿杜榮萇楚荷水紅花苹萍芝芀藜藿蘿蔦菖蒲花甘菊逺志寄生雕苽芹獻葵傾天棘南燭石南花菟葵燕麥菘芥蘆菔蔓菁稂莠胡麻戎菽茶即荼松柏橘柚枏楩梓豫章女貞合歡芧栗木蘭桐桂子陽燧隂燧崖蜜石蜜木蜜竹蜜波羅蜜唐棣沈速木芍藥木芙蓉樗櫟茈竹嶰谷蘄離離欽定四庫全書名義考卷九明周祈撰物部蒲盧蒲盧沈括以為蒲葦或問以為果蠃爾雅果蠃之實栝樓夫蒲似莞葦大葭也果蠃蜂也栝樓天𤓰也不應相逺如此埤雅曰似匏而圓曰壺小而細腰曰蒲盧其根著在土而浮蔓常縁於木蓋蒲以浮為義盧猶壺盧今人以盛藥物者是浮蔓與敏樹意正合果蠃腰細有似於蒲盧借蒲盧以名果蠃所謂𤣥蜂若壺也非謂果蠃為蒲盧栝樓實兩兩相值有似於果蠃又借果蠃以名栝樓所謂果蠃之實栝樓也非謂栝樓為果蠃朱子訓蒲盧時意亦未安故託之沈括也菉竹大學菉竹毛詩作緑竹是以竹為冬生草篠簜之屬緑為色矣以故二章青青三章如簀皆不可訓不知非也按爾雅菉王芻注云菉蓐也今呼鴟脚莎又爾雅竹扁竹注云似小黎赤莖節好生道旁可食又殺蟲疏皆引菉竹猗猗為據是菉非緑乃王芻竹非冬生草乃扁竹也詩傳亦主此說但王芻扁竹識之者尠嘗考王芻即本草藎草扁竹即本草萹蓄唐慎微云藎草葉似竹而細薄莖亦圓小生平澤溪澗之側煮以染黄極鮮好洗瘡有效俗名菉蓐草圖經曰萹蓄一名扁竹生下濕地苗似瞿麥葉細緑如竹赤莖如釵股節間花出甚細微青黄色根如蒿根二草皆云似竹一生平澤溪澗之間一生下濕地正與淇澳水涯相應藎草今尚無的識萹蓄在處有之南人呼鐵線草者是二草生於淇澳猗猗初生貌青青生而盛也如簀猶言草如茵也詩終朝采緑亦當作采菉若菉豆之菉當作緑其色緑也菉筍之菉當作甪筍嫩者如鳥喙也卄音入甪音緑啄音恵苞桑易其亡其亡繫於苞桑傳謂苞桑為安固之道以桑之為物其根深固苞謂叢生者其固尤甚此非善說易者也易謂休否之大人其視否也有其亡之戒故曰其亡其亡若繫於叢生之桑即書所謂若蹈虎尾渉於春氷也否休則泰來此大人所以吉也凡木樨則叢生喬則特立未有樨而可以為固者也書曰草木漸包包與苞同云水退而草木始叢生也至詩言苞者亦不一肅肅鴇行集于苞桑洌彼下泉浸彼苞稂亦可謂鴇集安固之桑泉浸安固之稂乎此其不然也大人致泰之意在言外鴇音保稂音郎葑菲詩采葑采菲無以下體注謂不可以其根之惡而棄其莖之美此說非由不辨二物故也葑今蘿蔔箋葑蔓菁之類也陸佃云蕪菁一名葑紫華者謂之蘆菔郭璞云蘆菔蕪菁屬紫華大根蕪菁即蔓菁與葑相似紫華惟蘆菔為然是葑為蘆菔故曰蔓菁之類也佃說微有疵吉州人謂蘆菔之脆美者為芋頭葑葑其名芋其形耳謂蘆菔為葑者陳楚方言吉州故楚地名猶存菲今土𤓰郭璞云菲芴土𤓰也唐慎微土𤓰根似葛細而多糝即月令所謂王𤓰二物根為美詩人謂采葑采菲者得無以下體之故乎言已之顔色不足采而徳音或可以配君子故承言及爾同死也蘆音盧菔音白糁音繖鬱鬯記曰鬱合鬯臭先儒謂擣鬱金香草之汁和合鬯酒按本草鬱金無定識嘗考達磨俱含論鬱金樹名出罽賔國花黄色壓汁為香竊恐周以前罽賔未通中國先王不寳逺物亦何取鬱金也蓋鬱非草乃草之舂築猶鬯非酒乃酒之條達說文鬱作鬱芳草也十葉為貫百廾貫築以煮之為鬱故其字从臼从缶又曰百草之華逺方鬱人所貢則鬱乃合衆香草舂築之故曰鬱鬱人亦以是得名以是鬱和酒其氣條達故曰鬯衆香草薫蘭蕭艾之屬皆備也故曰百草之華王度記天子以鬯諸侯以薫大夫以蘭芝士以蕭庶人以艾諸侯以下各一物天子備物耳禮記釋鬱鬯誤引鬱金本草釋鬱金誤引鬱鬯於是交亂矣埤雅釋草至以鬯亦為草名非甚黍稷穜稑穜音童稑音六詩黍稷重穋黍即今黍北人曰黄米以釀酒者古以為秬鬯者也赤黍謂之虋黒黍謂之秬黒黍一稃二米者謂之秠稷即今穄北人曰小米以炊飲者古以為粢盛者也闗西謂之􅓱冀州謂之重穋本作穜稑其實不可知鄭司農曰先種後熟曰穜後種先熟曰稑恐亦無是種疑即今楚人所謂芒穀最先種者稑即今楚人所謂緑穀最後種者萌與穜聲相近緑則稑之譌也虋音門秬音巨稃音敷穄音祭􅓱音糜音欠粱粟秔稻粱與粟同類粱大而粟小詩詁曰粱似粟而大是也粱有青黄白三種最益脾胃但收穫少損地力故人多種粟而少種粱粟即禾說文禾嘉穀二月始生八月而熟粟嘉穀實春秋二十八年冬大無麥禾是也粟有黏不黏二種黏者謂之秫爾雅秫黏粟釀酒汁少於黍為糵温於大麥或以秫為稷之黏或以禾為苗皆非秔與稻亦同類稻黏而秔不黏說文秔稻屬沛國謂稻為稬是也秔今人所常食米有赤白大小四五種惟白晚米最勝一名秈别一種謂之占亦不黏宋真宗給江淮兩浙占城種也稻今造酒者是雜記曰醴稻醴字書解餈稻餅明醴與餈皆稻所為可見稻是稬說文沛國謂稻為稬無疑此本草所以有秔米稻米而無稬米一名稌爾雅稌稻孔子曰食夫稻謂飲酒不然居喪者不粒食耶自漢人置稻田使者字林有稬稻秔稻之說於是始亂矣稬俗作糯蘭蕙古所佩蘭蓋都梁香一名蘭澤與澤蘭又别澤蘭俗名孩兒菊葉尖微有毛方莖紫節花似蘭澤而不香蘭澤葉似澤蘭光潤而有岐隂微紫花紅白色而香二蘭相似而小異又有山蘭似劉寄奴葉無椏馬蘭花似菊而紫今人所種蘭草葉似麥門冬而濶且韌花黄有細紫㸃與所釋佩蘭全異陶隠居以蘭澤為澤蘭本草衍義以今蘭草為蘭澤皆非古所稱蕙蓋零陵香一名薫南越謂之燕草麻葉方莖赤花黒實氣如靡蕪可以已厲雖乾枯猶香爾雅翼蘭一荑一花蕙一荑五六花荑初生芽有荑而後有柎有柎而後有花一荑一花單出者也一荑五六花叢出者也黄山谷曰一幹一花為蘭一幹數花為蕙並蘭蕙俱不識今人已不識蘭又執此以辨蘭蕙益謬矣韌音刃荑音移鳧茈茈音疵今果實有曰荸薺諸書無荸薺字必鳧茈也爾雅芍鳧茈郭璞曰生下田苗似龍鬚而細根如指頭黒色可食本草謂之藉姑又苗曰剪刀草漢劉𤣥傳掘鳧茈而食是也續漢書作符訾已非今作荸薺益妄矣頻婆北方有果六七月熟似林檎而大色通碧注以丹名頻婆按華嚴經脣口丹潔如頻婆果注頻婆果名此果似北方林檎極鮮好者也又西域有頻婆帳頻婆香蓋頻婆梵音猶華言色相端好也此果鮮赤端好得頻婆名故西域種不知何時入中國也帳與香色似此果故亦謂之頻婆蘋蘩藴藻蘋今浮萍也爾雅萍蓱其大者蘋季春始生可糝為茹蘩今白蒿也埤雅蘩葉麄於青蒿從初生至枯白於衆蒿欲似細艾者陸璣云白蒿春始生及秋香美可生食又可蒸爾雅謂之皤蒿蔏蔞亦似艾白色初生即可食詩食野之苹謂蔏蔞也又非蘩藻陸璣云生水底有二種一種葉如鷄蘇莖大如箸長四五尺一種莖大如釵股葉似蓬蒿皆好聚生故曰藴藻蓱音平糝音繖蔏音商蔞音閭莖音横箸音著芄蘭芄音丸爾雅雚芄蘭說文芄蘭莞也莞即蒲一名苻蘺其上臺名蒚一種極纖者名􅤴皆可為席但有精粗耳雚音貫莞音官苻音蒲蒚音歴杜蘅陶𨼆居云杜若葉似廉薑而有文理根似髙良薑而細味辛香又絶似旋復根唐慎微云陶所注旋復根即真杜若也一名杜蘅又别有杜蘅圖經曰杜蘅苗似細辛根麄黄白色葉似馬蹄之下布者名馬蹄香山海經曰狀如葵其臭如靡蕪名曰杜蘅可以走馬食之已癭杜若廣雅所謂楚蘅者也杜蘅爾雅所謂土鹵者也蔆芡蔆今蔆角武陵記曰四角三角曰芰兩角曰蔆爾雅蕨􅀈是也又芰菜名實如山茱萸闗西謂之薢茩爾雅芵茪是也即屈到所耆者芡今鷄頭子一名鴈頭根謂之䓈莖謂之蒍􅀢爾雅所謂鉤芺也蔆華背日性寒芡華向日性暖故醫家本草諸書有蔆寒芡暖之諸要之芡有益于人也􅀈音眉薢音皆茩音狗芵音決茪音光䓈音役萑葦萑音桓埤雅葦即今之蘆一名葭葭葦之未秀者也萑即今之荻一名蒹蒹萑之未秀者也字說蘆謂之葭其小曰萑荻謂之蒹其小曰葦埤雅以萑為蒹荻葦為葭蘆字說以萑為葭蘆葦為蒹荻大都不過二種而萑葦所屬不同今南土多蘆小者曰荻以代薪北土多葦以織箔此可見大者為蘆為葭南土所謂荻者萑也小者為荻為蒹為葦字說為得埤雅不及也即爾雅亦未辨曰菼葭中赤黒色曰薍以根旁行曰虇初生苗也菼音毯薍音翫虇音綣埤音皮荇蓴荇音杏蓴音純荇一作莕一名接余葉紫赤色正圓徑寸餘浮水上莖上青下白與水淺深等大如釵股以苦酒浸之可案酒根在水底正白而細可糟食詩所謂參差荇菜也蓴一名􅈋一名鳬葵又謂􅝶􅀈草葉大如手圓而色赤莖大如箸柔滑可羹以篩盛漏水中結如氷柱張翰所思蓴羹也􅝶音鴨􅀈音鹿蓬蒿陸佃云蓬葉遇風輒拔而旋未識為何草古者觀轉蓬為輪葉雖乗風亦難圓轉今野外有草髙尺許黄花花罷出白穗如彈丸極輕虚表裏洞見風起輒飛揚著地若轉環然疑此蓬也說文蒿菣也爾雅蘩之類青蒿謂之菣皤蒿謂之蘩牡蒿蔚薌蒿蕭藾蒿苹蘿蒿莪其名不同至秋皆為蒿也一云皤蒿謂之蓬蒿菣覲欠二音杜榮萇楚杜榮今莣草也似茅皮可為繩索履屩萇楚今羊桃也葉長而狹紫花實亦似桃枝莖弱引蔓草上莖浸以水汁出如膠可以黏土荷爾雅荷芙蕖其莖茄其葉蕸其本蔤其華菡萏其實蓮其根藕其中的的中薏注蔤莖下白蒻在泥中者蓮房也的蓮中子也薏中心苦茄音欹蕸音遐蔤音宻菡音喊萏音橝蒻音弱莖音横薏音意水紅花詩隰有㳺蘢毛云蘢紅草也陸機云一名馬蓼葉大而赤白色生水澤中髙丈餘爾雅紅蘢古其大者蘬是也今北人多植之院落生水澤者謂之水蓼髙不過二三尺苹萍苹藾蒿陸地所生者詩呦呦鹿鳴食野之苹是也萍浮萍水生楊花所化一夜七子者爾雅萍蓱其大者蘋詩于以采蘋是也芝說文芝神草徐氏曰芝為瑞服之神仙本草有青赤黄白𤣥紫六色今所見者𤣥紫二色如鹿角或如繖蓋皆堅實芳香叩之有聲一種木檽朽木株上生又名木椹賀氏曰芝木椹也一種胡菌天隂生糞上見日則死莊注謂之大芝菌與檽皆得名芝非芝也芀藜藿艻音條芀說文葦華也通作苕抽條搖逺生華而無莩蕚遇風則吹揚如雪其聚地如絮稍大為蘆今人取之以為帚曰芀帚是也一名茢禮記巫祝桃茢藜徐鉉曰今落帚或謂落藜初生可食邢昺以為王彗爾雅曰藜之科大為樹可為帚又可為杖今人曰杖藜是也子名地復子可入藥一名萊詩北山有萊藿說文菽之少豆葉也初生可食一種鹿藿即䝁豆䝁音勞蘿蔦蘿正名女蘿即唐䝉也一名兔絲陸佃云在木為女蘿在草為兔絲爾雅翼女蘿正青而細長無雜蔓蔦即宛童寄生草也陶𨼆居云生桑上者為桑寄生亦有生楊及楓上者各隨其樹名菖蒲花古詩菖蒲開花馬生角甚言菖蒲無花也梁太祖后忽見庭前菖蒲花謂侍者曰女見否曰不見因取吞之是月產武帝此猶是異事至蘇子瞻和子由盆中石菖蒲忽開九花則誠有花矣風俗通菖蒲放花人取而食之長年則是菖蒲有花但不常有耳甘菊風俗通南陽郡酈縣有甘谷其上有大菊水得其滋液飲者多壽爾雅疏菊有兩種一種莖紫氣香而味甘葉可作羹食者為真一種莖青作艾蒿氣味苦不堪食者名苦薏今菊甘谷者亡矣大抵味甘者甘菊也逺志寄生世說謝安晦跡東山已而就桓温辟有餉温逺志者温以問安此藥又名小草何也安未即答郝隆曰處則為逺志出則為小草安有媿色其實苗名小草東方朔傳幸倡郭舎人覆樹上寄生令朔射之朔曰是窶藪也舎人曰果知朔不能中也朔曰生肉為膾乾肉為脯寄生盆下為窶藪上令倡監搒舎人注以盆盛物戴於首故以窶藪薦之楊惲傳䑕不容穴銜窶藪其實窶藪不盡皆寄生搒音彭雕􅋎􅋎音孤說文雕一名蔣今所食茭苗米也初生苗謂之茭白中心生薹如藕至秋如小兒臂可蒸食其中有黒㸃者謂之茭鬱至後結實可炊為飯乃雕􅋎米也爾雅齧雕蓬是也西京雜記作雕胡内則注作彫胡枚乗作安胡相如傳作觚盧爾雅翼云江南人呼茭草刈以飼馬肥土人謂之葑田其莖謂之􅋎書峙乃芻茭即此物又爾雅茭牛蘄郭璞注今馬蘄葉細銳似芹可食本草注茭生水澤中苗似鬼鍼花青白色子黄黒色似防風子皆是物也但其名有異爾雅又兩言之耳芹獻葵傾今人言芹獻非水芹乃馬芹也言葵傾非蜀葵乃葵菜也芹獻說出嵇康野人美芹子韻㑹馬芹俗謂胡芹不可食惟子香美可調羹飲若水芹則無子故知是馬芹也葵傾說出左傳葵猶能衛其足說文葵菜也有紫白莖二種常傾葉向日不令照其根若蜀葵蜀之言獨也無附枝葉不能衛足故知是葵菜也天棘杜詩天棘蔓青絲人多不識天棘為何物鄭樵以為栁非是學林新編以為天門冬按博物志天門冬逆捋有刺若葉滑者名絺體一名顛棘抱朴子天門冬在東嶽名淫羊藿在中嶽名天門冬在西嶽名管松在北嶽名無不愈在南嶽名百部在京陸山阜名顛棘二書所云皆顛棘又按說文天顛也則顛棘即天棘也天棘即天門冬也南燭南燭日華子謂即烏飯草也本草圖經葉類苦楝而小冬生紅子作穗謂之南天燭其種是木而似草又號南燭葉可以染飯食之令人健即太極真人青精乾石􅀈也根治誤吞銅鐵􅀈音訊石南花石南花即今白繡毬花本草注石南生石上葉似枇杷但背無毛光而不皺正二月間開花冬含胎為苞一荑五六苞一苞中十餘花一花六葉如椿花甚細碎淡白緑色葉多於花既開惟見葉不見花花纔罷舊葉盡脫漸生新者湖南北江湘皆有之此惟白繡毬花為然故知為白繡毬花也菟葵燕麥爾雅莃菟葵蘥燕麥本草注菟葵苗如石龍花白如梅莖紫色煮汁極滑堪噉燕麥苗似小麥而弱實似穬麥而細二者今在處有之菘芥蘆菔蔓菁菘音松菔音白菘今白菜也芥今辣菜也蘆菔今蘿蔔也一名葑蔓菁即蕪菁也又名蕘本草圖經菘與蕪菁相類梗長葉不光者為蕪菁梗短葉濶厚而肥痺者為菘衍義曰菘葉似蕪菁緑色差淡其味微苦陶𨼆居曰芥似菘而有毛味辛郭璞曰蘆菔蕪菁屬紫花大根又云蕪菁根細於温菘而葉似菘此說四物之最精者也菘謂之白菜者以白菘得名蘆菔謂之温菘又謂之紫色菘一曰大芥爾雅疏謂葑也須也蕪菁也蔓菁也飱蕪也蕘也芥也七者一物也夫葑與蘆菔一物蕪菁蔓菁蕘一物芥一物須飱蕪郭璞謂似羊蹄葉細味酢與四物又不類當别一物疏殆未之辨與稂莠稂音郎莠音酉爾雅疏稂一名童梁陸璣云禾秀為穗不成則嶷然謂之童梁爾雅翼莠似稷而無實今狗尾草一名葽詩注物成自秀葽始胡麻戎菽胡麻似脂麻而大胡麻稭短而圓一名藤苰脂麻稭長而方一名苣蕂皆可壓油古以為飯鄭司農以居五穀之首今脂麻南北皆有胡麻惟陜西近邊一帶有之云種出大宛故得胡名戎菽即今黄黒大豆大者曰菽小者曰荅古以為粥鄭司農以居五穀之一或以種出山戎得戎名一曰戎大也戎菽猶言大豆也對小者荅而言茶即荼嘗考茶即荼也說文荼从艸余聲有二音一鉏加切一同都切有四義一苦苣霜後可食詩誰謂荼苦是也一委葉布地而生花黄如菊𫝊秦網密於秋荼是也三􅈋秀其穗色白詩有女如荼是也四苦荼茗也爾雅檟苦荼郭璞曰樹如梔子冬生葉可煮為羹飲本草苦荼能去脂使人不睡是也後人視苦苣委葉􅈋秀為惡草作荼作同都切視茗為嘉木妄作茶作鉏加切於是有荼字又有茶字不知茶非正文也陸羽荼經曰其字或从艸或从木或艸木并从艸者荼正文也艸木并者旁从木作􅟒也巴南人曰椵􅟒俗以上从艸下从木作茶亦曰木并不知下余聲非从木也松柏松南土為多北鮮唯塞上者為尤大柏南北皆有之身曲而葉直者松葉曲而身直者柏爾雅樅松葉柏身檜柏葉松身樅葉與身俱直檜葉與身俱曲也埤雅樅直而從檜曲而㑹柏木理堅緻美於松樅又美於柏尸子云松柏之䑕不知堂密之有美樅今塞上大者或即樅與古以為太廟梁材者也橘柚柚音宥橘今黄柑也劉晏𫝊江淮珍甘以味甘得名柑木銜馬口俗借用耳柚大於橘皮薄而苦不可口犀中小瓣如麥粒解之視橘不易敗汁少而微酸詩秦風有條列子吳楚之國有大木其名為櫾皆謂柚也似橘而小如彈丸者名楱似橘而大皮麄厚香美者名橙似柚而大如盂皮厚二三寸中似枳食之少味者名椵一種皮似橙狀如手指俗名佛手柑枏爾雅梅枏夫梅之曰枏猶鯉之曰鱣也枏即楠本大木木理細緻於豫章一名交讓木後人因爾雅梅枏之文遂謂枏為梅雖許慎孫炎亦不復知有楠矣猶鱣本鱣鮪大魚鯉亦謂之鱣不應遂謂鱣獨為鯉也楩梓豫章古人稱美材曰楩梓豫章然四木鮮有辨之者楩蓋椿屬爾雅棆楩屬說文棆母杶此可見為椿屬也梓今梓木楸屬陸璣云楸之白色而生子者為梓正義云豫今􅚴木章今樟木服䖍曰豫章生七年乃可知以􅚴樟初生相似也女貞合歡女貞一名萬年枝一名冬青江東人呼為凍生又訛為粽心葉凌冬不凋堪染緋木理白文如象齒子赤如郁李山海經秦山多貞木合歡一名夜合一名青裳北人謂之馬纓花木似梧桐葉與皂莢槐等至暮而合五月花開紅白色若絲茸然嵇康合歡蠲忿芧栗芧音序杜甫詩園收芧栗未全貧與山農詞歳暮鋤犁空傍壁呼兒登山收橡栗意同芧栗即橡栗櫟木子也材善為炭殻可以染子澁膓可禦歉歳莊子狙公賦芧即此物一作杼莊子食杼栗一名栩詩集于包栩一名柞陸機今柞櫟也一名棌相如傳棌椽不斵史記作采俗名皂斗今刻本與讀者皆云芋栗芋為蹲鴟栗為莍蝟是二物矣朱山人其富翁耶木蘭世傳木蘭舟不知木蘭為何物陶𨼆居云似楠木皮甚薄而味辛香相如傳注如椒而香可作面膏或云與桂同或云桂中之一種玊篇欃木蘭也廣韻欃檀木别名則木蘭其理與材堅緻故云似楠皮亦香故云似椒桂桐陶𢎞景謂桐有四種青桐梧桐白桐岡桐青桐似梧桐無子白桐與岡桐無異惟白桐有花子此不足據賈思勰曰華而不實者曰白桐實而皮青者曰梧桐青白之外復有岡桐即油桐也埤雅曰青桐即今梧桐白桐無子材中琹瑟岡桐子大而有油二說為是則桐止三種賈又曰白桐無子冬結似子者乃是明年之華房爾雅所謂榮桐者也鄭氏曰諸桐惟白桐最大可為棺槨爾雅所謂櫬梧者也注指櫬梧與榮桐木皆為梧桐非即郭璞亦未辨況其他乎岡桐埤雅云桐性便濕不生於岡反得岡名桂子桂子如蓮實閩粤間多有之郭璞云桂花而不著子謂白花者也埤雅桂黄花者著子謂在閩粤者也餘則否陽燧隂燧周禮以夫遂取明火於日謂陽燧也淮南子方諸見月則津而為水謂隂燧也廣韻陽檖木名一名赤羅檖與燧同以其木謂之檖以其取火謂之燧今江浙間欏木也與榆􅀥槐檀皆可取火淮南子注隂燧大蛤也說文方石也諸珠也周禮注鏡謂之方諸韻㑹方諸鑑名由淮南子注則方諸為蛤由說文則方諸為石與珠由周禮注韻㑹則方諸為鏡珠胎于蛤孕月而生以取水氣相感也鏡呵之則水出亦可取水以鏡故又謂之鐩崖蜜石蜜木蜜竹蜜波羅蜜杜詩崖蜜亦易求注以為櫻桃南中八郡志窄甘蔗汁曝成飲謂之石蜜詩註枳枸樹髙大似白楊有子著枝端如指長數寸噉之甘美如飴八月熟亦名木蜜孔氏六帖蜀中有竹蜜蜂好于野竹上結窠窠與蜜并紺色甘倍于常蜜一統志安南有波羅蜜大如冬𤓰皮有軟刺五六月熟味最甜香食能飽人唐棣爾雅唐棣栘注似白楊江東呼夫栘陸璣疏云唐棣奥李也一名雀梅陸佃云唐棣一名栘其華反而後合凡木之華皆先合而後開惟此華先開而後合故曰偏其反而沈速本草沈香木類椿櫸多節皮幹俱朽心與節不壊者香也色黒而沈水者為沈香半沈半浮為鷄骨香最粗者為箋香酉陽雜俎一木四香根曰㫋檀節曰沈香花曰鷄舌膠曰薫陸一名乳香丁香母亦謂之鷄舌伐樹而得者名生結樹自朽而得者名熟結又曰伐樹去木而得香者謂之生速樹仆於地木腐而香存者謂之熟速葉廷珪香譜更不名速何樹或生速熟速即生結熟結也速亦沈香與本產自異域鮮的名以其沈水謂之沈香以其自腐謂之熟結速又熟音之譌也木芍藥木芙蓉牡丹唐人謂之木芍藥李白序開元中禁中初種木芍藥謂牡丹也拒霜唐人謂之木芙蓉栁宗元詩嘉木開芙蓉李白詩花盡木蓮開皆謂拒霜也樗櫟韻㑹樗似椿北人呼山椿江東呼虎目葉脫處有痕如摴蒲子又如眼目故名材易大而不中器用今臭椿是爾雅櫟其實梂孫炎曰櫟實橡也有梂彚自裹木雖堅而不堪充材今櫟炭木是茈茈音子廣韻茈薑玊篇茈草作紫者非又音豺廣韻茈胡作柴者非竹竹類甚多本草所載惟䈽淡苦三竹而已按竹譜䈽音斤其竹堅而促節體圓而質勁皮白如霜大者宜刺舩細者可為笛淡竹肉薄節濶有粉南人以燒竹瀝者苦竹有二種一種出江西及閩中本極麄大味殊苦不可噉一種出江浙肉厚而葉長濶笋微有苦味俗呼甜苦笋食品所最貴者不入藥嶰谷吕氏春秋伶倫自大夏之西沅渝之隂取竹于嶰谷兩節間注解脫也谷溝也取竹之無谷節者則嶰當作解兩節間自無谷節故云取竹于解谷兩節間或以為地名者非也蘄郡志蘄香草也葉如蘼蕪即今之芹菜此說非蓋因廣韻蘄通作芹之說而誤也廣韻謂古文作蘄後通作芹如云馬蘄馬芹非謂蘄即芹也芹楚葵莖潔白有節其氣芬香可食蘄一名茝一名蘼蕪爾雅蘄茝蘼蕪郭璞云香草葉小如萎狀淮南子云似蛇床邢昺云芎藭苗也本草芎藭其葉名蘼蕪圖經蘼蕪一名蘄即楚詞所謂江離也楚謂之蘺晉謂之虈齊謂之茝諸說甚明何得謂之芹也陶𢎞景云芎藭出厯陽者節大莖細狀如馬銜謂之馬銜芎藭因謂馬銜為蘄三都賦結駟方蘄此亦可證吾郡之得名以此管子曰五沃之土生蘼蕪蘄在荆域中亦沃土與說文江夏有蘄春亭前漢志江夏郡有蘄春縣蘄在秦為亭在漢髙析南郡置江夏郡始為縣也又薜名山蘄又名白蘄茭名牛蘄又名馬蘄而白芷一名茝是以混而莫辨也茝音齒又昌亥切虈音梟芎音熊藭音窮芷音止離離詩彼黍離離說文釋䅻引詩彼黍䅻䅻長沙人謂禾把曰䅻詩作離離與說文作䅻䅻俱非是按集韻穲穲黍稷行列也當作彼黍穲穲名義考卷九
