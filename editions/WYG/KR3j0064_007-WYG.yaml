body:
  text: 名義考卷七目録人部郊祀社稷宗廟禘祫六宗貙膢射侯正鵠夫里之布秦以後取民之制唐宋青苗南北軍左袒為劉五刑象刑宫刑上服下服菹醢簿録椓㓤聅軋鬼薪白粲城旦舂審録得財分贓保辜規避令甲花押左右左右所尚不同置草迎新婦兊運中鹽刻絲束脩仰駁禀奪文移射䇿對䇿挾書摹印雋永𫝊竒炙輠八分飛白欽定四庫全書名義考卷七明周祈撰人部郊祀易先王作樂崇徳殷薦之上帝書肆類于上帝周禮王祀昊天上帝則大裘而冕祀五帝亦如之其曰上帝曰昊天上帝皆指蒼蒼者為言曰五帝則孔子所謂天有五行也孝經郊祀后稷以配天宗祀文王於明堂以配上帝天即易書所謂上帝周禮所謂昊天上帝而上帝則五帝也郊祀后稷以配天即冬至祀天於圜丘宗祀文王於明堂以配上帝即季秋大享五帝於明堂明堂有木火土金水五室黄帝祀上帝於明堂唐虞祀五帝於五府五府即五室上帝亦謂五帝也月令於四立日及季夏土徳王日各迎其王氣之神於郊即兆五帝於四郊配以五人帝春以太皥夏以炎帝季夏以黄帝秋以少昊冬以顓頊并孟夏龍見而雩嵗凡八祭古人郊祀之義如此漢文帝作五帝廟武帝立太一祠漢儒因以耀魄寳為太一為昊天上帝以太㣲五帝座為五帝又以五緯星為五帝亦異乎先王之所指矣秦襄公作西畤祠白帝文公作鄜畤祠黄帝漢儒又謂王者先祖皆感太㣲五帝之精以生堯赤舜黄禹白湯黒文王蒼就五帝之中特祭所感生之帝并前祭而九其妄甚矣畤音止社稷白虎通曰土地廣博五穀衆多難以徧祀故封土立社示有土也稷得隂陽中和之氣稷為長此所以祀社稷也賈逵馬融王肅之徒直以為人鬼者非鄭康成曰句龍有平水土之功配社祀之后稷有播種之功配稷祀之兼白虎通之説為盡然自顓帝祀共工氏子龍為社烈山氏子柱為稷厯髙辛唐虞夏因之商湯遷社以后稷代柱欲遷句龍無可繼者乃止康成以其初即為后稷亦非或又謂髙陽氏子黎亦為社厲山氏子龍亦為稷云宗廟唐虞五廟夏因之商七廟周因之五廟親廟四與太祖而五七廟三昭三穆與太祖而七所謂王者禘其祖之所自出以其祖配之也祖謂髙祖以下所自出謂太祖黄帝虞夏之所自出契商之所自出后稷周之所自出故四代禘之也商周之初亦是五廟後來以湯文武受命不祧故増而為七不祧惟太祖基命與受命之君為然繼世雖有功徳者亦祧成康刑措宣王中興當時皆祧非若後世也有四時之祭夏商春禴夏禘秋嘗冬蒸禘其祖之所自出禴禘之禘也周改春祠夏禴以禘為禘祫又薦新之祭月令孟夏薦麥孟秋薦黍季秋薦稻不疏不怠古人廟祭之義如此吕氏月令一嵗之間八薦新物韋𤣥成傳廟嵗二十五祠而薦新在焉不幾於凟乎祧音挑禘祫祫音狎周禮五嵗一禘三嵗一祫禘以四月祫十月謂之殷祭傳曰五年再殷祭唐禮樂志禘祫大祭也祫以昭穆合食於太祖禘以審禘尊卑盖祫則毁廟未毁廟之主皆升合於太廟所謂合食於太祖也以十月者以萬物歸根有合大之義禘則惟及於毁廟文武以下毁主依昭穆于文武廟中祭之所謂先王之祧祔於文武之廟也王季以上于后稷廟祭之所謂先公之祧附於后稷之廟也所以審禘尊卑以四月者以陽上隂下有尊卑之義二者皆大祭謂之殷祭鄭𤣥以祫大於禘六宗六宗之説十餘家迄無定議孔叢子以為四時寒暑日月星水旱鄭𤣥以為星辰司中司命風師雨師馬融以為天地四時孔光劉歆以為水火雷風山澤賈逵以為日月星河海岱歐陽大小夏侯以為上不謂天下不謂地旁不謂四方在六者之間助隂陽變化此漢以前之説也或謂太極冲和之氣為六氣之宗或謂天皇大帝及五帝或謂地有五色合五為六或謂六代帝王或謂三昭三穆或又謂周禮無六宗之兆祭法無六宗之文可不祀則又謬甚者也就前諸説求之孔安國王肅雖主孔叢子之説謂出於孔子亦無明據大宗伯云以禋祀祀昊天上帝以實柴祀日月星辰司中司命以槱燎祀風師雨師皆天神也祭義曰郊之祭大報天而主日配以月則肆類上帝並祭日月可知故又及星辰司中司命風師雨師為六宗星謂五緯星辰謂日月所會十二次司中司命文昌第五第四也風師箕也雨師畢也皆麗於天之神鄭𤣥主此説為是餘可不必矣槱音酉燎音了禋音因貙膢貙音攄膢音婁漢制立秋出獵祭曰貙膢蓋貙常以立秋日祭獸亦以此日出獵還以祭宗廟曰貙膢按説文貙䝢似貍者能捕獸祭天陸佃云虎五指為貙林氏曰膢祭名揚子不膢臘也與膢臘皆祭也律厯志作貙劉膢劉聲相近訛也或以劉殺也捕獸為殺也䝢音萬射侯正鵠正音征侯其所射者也正鵠射之的也司裘云王虎侯諸侯熊侯卿大夫豹侯卿大夫之大射君臣皆麋侯侯道虎侯九十弓熊侯七十弓豹麋侯五十弓侯道弓二寸以為侯中如虎侯九十弓侯中得一丈八尺也三分侯中而正鵠居其一如侯中一丈八尺正鵠得六尺也他准此虎熊豹麋特以其皮縁侯側耳正即月令征鳥厲疾本作鴊或作征又作正今鷂也鵠玉篇鳱鵠鳥之知來者今靈鵲也侯的制皮賔射正大射鵠正鵠之外所謂二分者以五采􅀞之王内朱次白次蒼次黄𤣥居外諸侯損𤣥黄卿大夫去白蒼以朱緑燕射之侯無正鵠􅀞熊麋虎豹鹿豕之形庶人主皮之射無侯張獸皮射之而已是侯以布為質以虎熊豹麋為縁侯中二分以五采三采二采為飾一分以正鵠為的或云正之言正鵠之言較又云畫布曰正棲皮曰鵠及五正三正二正之説皆非也夫里之布夫夫稅也一夫百畆之稅使同養公田也布泉也即錢也一里二十五家之泉漢口率出錢百二十是其遺也周禮凡宅不毛者有里布凡民無職事者出夫家之征孟子止言夫稅未及家稅也家稅出士徒車輦給徭役秦以後取民之制三代取民之制皆十一秦田租口賦鹽鐵二十倍於古力役三十倍於古漢田租十五稅一筭賦每人錢百二十為一筭孝文令民半出田租始三十稅一孝景則平分而稅一孝武復三十而稅一算舟車𣙜鹽鐵又紛然雜出班史以厥名三十乃十稅五唐丁男給永業田二十畆口分田八十畆丁歳輸粟二斛稻三升謂之租歳輸絹四丈綾絁二丈布加絹之一綿三兩麻三斤非蠶鄉納銀十兩謂之調用人之力歳二十日閏加二日不役者日為絹三尺謂之庸憲宗分天下之賦為三一曰上供二曰送役三曰留州徳宗作兩稅法夏輸不過六月秋輸不過十一月宋沿後唐之制賦民已非良法至王安石為相熈寧元豐之間務為聚斂政和以後領以巨鐺迄於宋亡由秦漢以來惟唐制差善人授田百畆古今不甚相逺以中田所獲計之得粟四百石租庸調當用銀十二兩去粟六十石是十税一十分一之五今亦大畧近之内府供應即上供邉儲即送役存留即留州夏稅秋糧即夏秋二輸也絁音詩唐宋青苗唐代宗詔天下田一畆稅錢十五不及秋方青苗征之號青苗錢宋神宗任王安石為相方春貸錢於民出息以償亦謂之青苗錢南北軍漢南軍衛尉主之掌宫門屯衛兵北軍中尉主之巡徼京師即周虎賁氏之職也武帝増八校改中尉為執金吾唐南衙禁兵即漢南軍領以左右衛府上將軍宋為殿前司官曰都撿㸃宋祖由此受禪改稱都指揮使北衙衛兵即漢北軍領以左右羽林軍大將軍宋為武徳司後改皇城司官曰皇城使又改為武功大夫今錦衣衞實兼其職也左袒為劉周勃袒左袒右之令似坐觀成敗之形安在其安劉也使北軍袒右將王吕乎使左右相半將並王乎是不然此勃誓師之辭為劉者袒而立於左左祖吾賞之也為吕者袒而立於右右社吾戮之也片辭之下定社稷之安危勃之重厚於此可見予聞之闗中喬景叔先生說如此五刑古五刑墨劓臏宫大辟墨黥面劓割鼻臏去膝盖骨宫男子去勢婦人幽閉大辟死刑臯陶改臏為剕去足肚周改為刖去趾漢文帝定律諸當黥者鉗為城旦舂當劓者笞三百當刖左趾者笞五百刖右趾已論而復有笞罪者棄市宫與大辟猶故也北魏文帝詔應宫刑者直沒官于是宫刑始除矣唐𤣥宗令應斬者重杖流嶺南于是大辟亦除矣今人以除肉刑美漢文而不知北魏文帝之賢也知肉刑當除而不知大辟終不可廢也劓音義臏音牝黥音檠剕音肺刖音月鉗音䖍象刑書曰象以典刑蔡沈以五刑如天垂象以示人白虎通曰象刑者以衣服象五刑犯墨者幪巾犯劓者赭其衣犯臏者黒其髕犯宫者屝犯大辟者布衣而無領縁謂唐虞之世人尚徳義但設象而民自不犯也若然何至又有怙終賊刑耶其説出孝經緯云五帝􅀞象民順機􅀞象亦猶懸法象魏非指衣服而言蔡沈所説為是白虎通亦自相兼盖犯墨者着幪巾就刑餘四刑皆然今有罪者亦去平時衣冠也幪音䝉髕與臏同屝音肺宫刑宫次死之刑男子割勢婦人幽閉男女皆下蠶室蠶室宻室也又曰䕃室隠於䕃室一百日乃可故曰隠宫割勢若犍牛然幽閉若去牝豕子腸使不復生故曰次死之刑或疑幽閉為禁錮則視劓刵反輕豈能以䕃室終身哉自北魏文帝除後其法遂冺惟割勢為閹人進身之階甘自蹈之矣犍音堅上服下服周禮聴民之所刺宥以施上服下服之刑注上服墨劓也下服宫剕也墨劓施於面故為上服宫剕施於下體故為下服凡行刺必先以物規之如衣服乃施刑故言服也吕刑上刑適輕下服下刑適重上服注事在上刑而情適輕則服下刑事在下刑而情適重則服上刑周禮所謂上下身之上下也吕刑所謂上下刑之輕重也菹醢簿録古刑有菹醢者果以為菹醢與菹酢菜也醢肉醬也酷烈者亦何至以人為菹醢也漢刑法志梟其首菹其骨肉於市注菹調醢也死刑之極者首則挂之於木若梟骨肉則臠之於市若菹醢今凌遲刑也簿録猶今言抄劄籍其貲産沒官也椓㓤聅軋椓音卓㓤音戛聅音哲軋音揠椓㓤聅軋四者皆刑名也尚書劓刵椓黥韓詩敗面碎刺㓤司馬法小罪聅之中罪刖之大罪剉之前匃奴傳有罪小者軋大者死説文椓去隂之刑也聅軍法以矢貫耳也廣韻㓤剥面也顔師古曰軋謂輾轉轢其骨節若今之厭踝也厭與壓同踝戸瓦切讀若花上聲足骨也俗謂螺拐骨厭踝猶今夾棍踝又讀若螺音者一作來可切音倮轉而為螺音也刵音貳剉音挫轢音歴鬼薪白粲城旦舂漢律男子有罪使取薪給宗廟曰鬼薪旦起行治城曰城旦婦人不與外徭使擇米正白曰白粲但舂作米曰舂鬼薪白粲三嵗刑也城旦舂四嵗刑也審録録音慮録良豫切寛省也漢百官志録囚徒太𤣥蹛於狴獄三嵗見録録與慮同史作慮囚謂獄囚必反覆思慮之有寃抑即與寛省正書所謂服念要囚也今讀作紀録之録而曰審某䖏録誤矣得財分贓律强盗已行不得財杖流盗賊窩主行而不分贓斬或疑行不分贓同已行不得財不知得財盗財而出也論夥不論人即一人得財同夥皆斬分贓得財後分受也論人不論夥雖同夥共謀不行不分贓止杖也已雖不行然已分贓已雖不分贓然已得財故皆斬也不得財是一物未得非某有贓某無之謂二行字亦有别已行謂已執仗入其家行不行謂身往不往也保辜規避律文有曰保辜有曰規避其義未詳説文嫴保任也則保辜之辜當作嫴謂毆者死生未决令毆之者保任之俟其平復與否然後坐罪也韻會曰規避也唐書規影徭賦令甲蕭望之對景帝曰金布令甲邊郡數被兵令天下共給其費章帝詔曰令丙箠長短有數江充傳注令乙騎乘車馬行馳道中三言令皆漢令甲乙丙令之篇次猶國朝大誥三篇律職制公式等篇今稱述法令者不曰有誥有律而曰載在令甲殊非花押今之花押唐以來之花書也韋郇公署陟字時號五雲體王荆公押石字人有笑押反字者其用名自唐宋然矣左右人道尚右以右為尊故尊文曰右文尊武曰右武莫能尚者曰無出其右以左為僻凡幽猥曰僻左䇿畫不適事宜曰左計非正之術曰左道舍天子仕諸侯曰左官去朝廷為州縣曰左遷左右所尚不同古以右為尊周制左祖右社社外神也視祖為尊禮秋官朝士掌外朝之法左九棘孤卿大夫位焉右九棘公侯伯子男位焉公侯視孤卿為尊秦爵十左庶長十一右庶長右庶長視左庶長為尊漢朝儀功臣列侯將軍陳西方文官丞相以下陳東方西方右也以王陵為右丞相陳平為左丞相平亞於陵也漢以前皆尚右吳以陸凱萬彧為左右丞相晉以瑯琊王睿為左丞相南陽王保為右丞相自是以左為尊國朝廟制朝儀従周與秦漢皆尊右官制左右都御史左右少卿左右布政使則又從三國以後尊左又今主人肅賔而入主人從東居已於左居賔於右猶是古人尚右之義但古人肅賔而出亦然故阼階為主人之階交拜古東西嚮今北嚮南肅賔而東以東為左北肅賔而西以身左為左皆是尚左至陪祀與叅謁上官尊者居東亦以東為左也置草迎新婦京師娶婦之家置草於門以緋方尺羃其上人多未知其故昔漢京房之女適翼奉子奉擇日迎之房以其日三煞在門三煞者青羊青牛烏鷄之神新婦犯之損尊長及無子奉俟新婦至門以穀豆與草禳之京師迎新婦置草者猶踵此也兊運中鹽刻絲客有問予兊運中鹽刻絲者其義何居予曰兊増韻通也交兊猶言交通也民出賦而軍運之有交通之義故曰兑中韻會着其中曰中今啇人先入其直而後讎鹽若着其中然故曰中或曰種格古要論曰宋時織者配色如傅采謂之刻絲作是刻絲宋已有之而刻之義未詳廣韻緙乞格切織緯也則刻絲之刻本作緙誤作刻周禮内司服翬衣其色𤣥褕狄青闕狄赤皆刻繒為雉形亦誤作刻束脩曲禮童子委贄而退婦人之贄脯脩􅀥栗古者見師以菜為贄束脩非童子所得行也其贄雖非其意則是朱子茍以禮來之句最為得之曰束脩其至薄者則非以上猶云以來也與今來學曰上學來任曰上任意同漢和帝詔束脩良吏伏諶傳自行束脩訖無毁玷二束脩皆謂檢束脩飾檀弓古之大夫束脩之問不出境與論語束脩二脩字當从肉史束脩之脩當从彡今亦从肉易脩辭立誠書慎厥身脩皆从肉亂已久矣不獨史也彡音衫仰駁禀奪廣韻仰舉也反首望也詩注仰者心慕之辭説文駁馬色不純詩皇駁其馬増韻受命曰禀文中子奚適而無禀奪攘取也左傳一與十奪四字之訓如此今行移家以行下為仰不允其議為駁白事為禀詳定為奪不知其訓别有所出否也文移文文書也自秦少府遣吏四人在殿中主發書始有文書之稱移移狀也如張安世移病劉歆移書大常始有移狀之稱文通上下皆謂之文移公府不相屬敬則為移也射䇿對䇿漢射䇿與對䇿不同設為難問疑義射者隨其所得而釋之謂之射與射覆之射同顯問以經義政事對者直陳所見謂之對對答問也今試士兼二者而用之挾書摹印白居易集禮部試進士例用書册兼得通宵容齋隨筆大中祥符元年試進士出清明象天賦仍録題解摹印以示之景祐元年詔試日題目其經史所出摹印給之更不許上請是挾書給燭自唐已然摹印題目所出則宋事也雋永傳竒炙輠雋音選傳音篆輠音夥蒯通論戰國説士權變號雋永裴硎著小説號𫝊竒淳于髠所言齊人視為炙輠説文雋肥肉也釋名𫝊𫝊也所以𫝊示人徐氏曰古者車行嘗載膏以塗軸輠其器也通之論如雋之悦口而味長硎之説多竒異可𫝊示髠之言如炙輠器雖久而膏不盡八分飛白八分飛白二書皆蔡邕作也法書苑蔡文姬曰臣父割𨽻字八分取二分割李篆字二分取八分故名八分其為體篆多而𨽻少所謂漢篆者也或言上谷王次中所作又曰勢如八字又曰蔡邕於八體之後又分此法皆非也書㫁蔡邕待詔鴻都門下見役人以堊箒成字心悦焉歸而為飛白之書剏法於八分窮微於小篆王僧䖍云飛白八分之輕者是飛白即八分篆但輕微不滿施之宫殿題署者也歸田録仁宗好飛白以㸃畫象物形而㸃最難工此與蔡邕飛白異梁武帝謂蔡邕飛而不白王羲之白而不飛亦是謬談堊音噩名義考卷七
