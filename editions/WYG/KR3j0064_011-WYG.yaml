body:
  text: 名義考卷十一目録物部緼袍褐寛博褧衣端章甫冕服冠幘導履舄韍韠韐珮帔褘褕副編次綦緤韈縢絲綸綍綬魚袋犀比犀毗紗縠綾綺六珈六服襦半臂背子重襺重繭褦襶裨冕副褘裼襲布稱升𤣥纁袒絻帢鞮幱窮袴犢鼻褌匹特端匹圭璧瑶瓊玖碧藍錢開通元寳傳國璽劈正斧五金一金塗金襄金錙銖縮酒莤酒案酒下飯母母𤓰刺屈膝叵羅瑟瑟刀斗欽定四庫全書名義考卷十一明周祈撰物部緼袍玉藻纊為襺緼為袍注纊新綿緼舊絮廣韻繹繭為絲不繅為綿繅餘為絮以蠶繭繹而出之曰繅繅之所累曰絲以為黼黻文章不繅而成之曰綿書纎纊莊子洴澼絖是也以禇襺繅餘為絮繭内衣護蛹者與其外膜雜為之易繻有衣袽是也以禇袍襺春秋傳所謂重襺衣之貴者袍即論語所謂緼袍衣之賤者貧者又不可得絮於是雜用枲禇枲􅐨也以禇袍亦曰緼袍編而為粗短衣即孟子所謂褐寛博以為禪縠以行道禦塵即詩所謂褧衣記所謂絅師古曰以綿裝衣曰禇論語注作著襺音簡繅音騷絖與纊同􅐨褧絅俱音頃褐寛博褐說文編枲鞿也馬絡頭也亦謂之馬衣賤者編枲為衣寛大有似於鞿故曰褐寛博毛布以禦寒何取於寛博哉今士子出身曰釋褐言去賤而將貴也若毛布則罽也亦謂之其字从毛康成杜預諸人皆誤釋罽音計褐音曷褧衣褧說文􅐨也爾雅翼􅐨葉似苧而薄今人績為布以為衣不重曰禪穀詩衣錦褧衣是也亦作絅玉藻禪為絅中庸衣錦尚絅通作顈士昏禮女從者畢袗𤣥袗顈黼雜記三年之喪既顈又作景儀禮婦乗以几姆加景乃驅絅顈景褧通皆嫁時在途禦塵之衣也端章甫端與𤣥端即緇布衣古者卿士聴朝之服以其正幅不衺殺故曰端章甫視毋追其飾漸大故曰章甫亦以緇布為之所謂𤣥冠也毋音牟追音堆冕服黄帝垂衣裳有冕服虞舜觀古人之象日月星辰山龍華蟲作㑹宗彞藻火粉米黼黻絺繡有十二章之制周去三辰為旂常九章自山龍而下謂之衮冕龍阿曲也七章自華蟲而下謂之鷩冕鷩朱雉即華蟲也五章自宗彞而下無火謂之毳冕虎蜼毛縟也三章粉米黼黻謂之希冕所存者少也一章唯黻而已曰元冕衣𤣥也此皆自服而言曰冕者以服得名也非冕之上有龍與鷩等也衮冕十二旒王大祀朝覲服之上公九旒鷩冕九旒王祀先公饗射服之王三公八旒侯伯七旒毳冕七旒王四望服之王之孤卿六旒子男五旒希冕五旒王祭社稷五祀服之王之大夫諸侯之孤各四旒元冕三旒王祭群小祀服之諸侯之公三旒再命大夫二旒一命大夫一旒王之五冕旒有多寡每旒玉皆十二無増損也上公以下毎旒玉數如其旒數尊卑之等也是冕之與服君臣所共惟冕前後垂旒則逓減耳故臣下之冕總謂之禆冕說文曰冕者大夫以上冠也玉藻注冕以板為之師古注五冕之板廣八寸長六寸前圓後方有綖綖用三十升布染黄覆冕上出冕前後而垂有紘紘冠卷也有紞即黈纊以黄綿為圜懸冕兩旁塞耳者下繋玉瑱謂之珥有繅繅合五采絲為繩垂於綖之前後以結玉有就就成也一玉為一成結之不相棄也周制如此秦服袀元漢冠竹皮因陋就簡古製隳廢此賈生有易服色之請班固不志輿服也絺音紙黈音陡冠幘說文冠絭也所以絭髮又曰髮有巾曰幘夏之冠曰毋追追猶堆也商曰章甫漸章著也周曰委貌委曲有貌也並以緇布為之故曰緇布冠又曰𤣥冠輿服志委貌與皮弁同制長七寸髙四寸前髙廣後卑銳但皮弁以鹿皮耳古冠制雖不可詳今羽流束髮者大畧近之趙惠文冠以冠如蟬翼猶古之鷩冕一名鵕䴊冠一名鶡冠謂之武弁鵕䴊鶡勇而有介今勲臣籠巾挿鵰羽其遺意楚獬豸冠以獲獬豸得名後有鐵柱又曰柱後謂之法冠今憲臣冠加獬豸於上亦其遺意也唐翼善冠太宗采古制自服之闕今乗輿常服亦名翼善冠或唐制也其他冠名尚多制不可考秦加武將首飾絳帕後稍稍作顔題漢興續其顔却結之施巾連題却覆之名之曰幘孝文乃髙顔續為之耳崇其巾為屋文者長耳武者短耳若今喪冠導周禮天子以玉屏而導亦如之南史齊髙帝見主衣中有玉介導梁沙門法雲謂周舍曰檀越既能戴纛貧道何為不執鍮段公路云通天犀堪為釵纛纛與導同音一物也按隋禮儀云簮所以建髪於冠導所以櫟髪於巾幘之裏說文箆導也簮即笄釵岐筓導即揥整髮釵箆亦以整髪即今掠子導即今引子以角為之櫟髮入幘故名引古名導今名引其義一也纛羽葆幢所以引行故又借為纛俗呼轉為敏音俗書作刡字於是引之義晦而導纛不復知為何物矣餘冬丹鉛二録雖嘗置辨亦未明的惜不能得楊君起而證之纛音到鍮音偷筓音鷄刡音敏履舄草曰屝又謂之履又謂之不借麻曰屨葛亦謂之屨皮亦曰履又謂之鞮又謂之鞵又禪下曰履複下曰舄蓋舄有三等赤舄為上冕服最上達者下有白舄皆履之複底者古今注曰祭服謂之舄朝服謂之履燕服謂之屨亦得凡履下置木曰屐履中薦曰屧履不著跟曰屣小兒履曰靸屝音費韍韠韐韍音弗韠音必韐音閤說文韍韠也韠韍也所以蔽前以韋下廣二尺上廣一尺其頸五寸帯博二寸鄭云韐合韋為之以茅蒐染之一曰韎韐以代韠是韍韠韐三者皆蔽膝之衣制同名異韐乃合韋韍韠不合此其異耳朱子曰冕服謂之韍他服謂之韠此大夫以上之服韐則士服也玉藻云君朱大夫素士爵韋天子直公侯前後方大夫前方後挫角士前後正陳氏曰以其茀前曰韍以其一巾足矣曰韠以色則曰緼以緼質則曰韎韐詩疏古者佃漁因衣其皮先知蔽前後知蔽後後王易以絺繡黒與白相次畫為謂之黻以韋从韋作韍以絺从黹作黻一曰古者席地而坐以臨俎豆設蔽膝以備濡漬韎音抹蒐音搜絺音止與黹同古弗字珮記曰古之君子必佩玉右徴角左宫羽輿服志曰古者君臣皆佩玉因名為珮三禮圖凡玉珮上有雙衡衡長五寸博一寸下有雙璜璜徑三寸衝牙蠙珠以納其間朱子曰佩有珩者佩之上横者也下垂三道貫以蠙珠璜如半璧繋於兩旁之下端琚如圭而正方在珩璜之中瑀如大珠在中央之中别以珠貫下繋於璜而交貫於瑀復上繋於珩之兩端衝牙如牙兩端皆銳横繋於瑀下與璜齊行則衝璜出聲也帔說文𢎞農謂帬為帔玉篇在肩背也今命婦衣外以織文一幅前後如其衣長中分而前兩開之在肩背之間謂之霞帔即古之帔也褘褕褘音輝褕音俞按王后六服褘衣褕狄褘衣畫翬也褕狄畫鷂也狄本作翟雉名翬鷂皆雉也爾雅伊雒而南素質五采皆備成章曰翬江淮而南青質五采皆備成章曰鷂是褘褕皆畫翟但質有青素之殊說文謂翟羽飾衣曰褕羽不可以飾衣十二章華蟲作㑹華蟲為鷩繪為畫帝服用鷩后服用翟皆畫也副編次周禮追師掌為副編次按副本作􅀢覆首以為飾若步揺服之從王祭編者列髪為之若假紒服之以桑次本作䯸次第髪長短為之若髲鬄服之以見王燕居有纒筓總綦緤韈縢綦音其緤音屑縢音滕七林云文綦綵緤緰韈羅縢綦廣韻履飾也文綦履之有文者緤與紲同廣韻繋也綵緤韈繋之有采色者緰說文貲布也緰韈以貲布為韈也縢増韻約也纒也偪束其足令小男子行縢自足至膝此則施之足羅縢以羅為之四者皆婦人足飾絲綸綍說文絲蠶所吐也一曰一蠶為忽十忽為絲緇衣注綸有秩嗇夫所佩疏云綸如宛轉繩廣韻綍大索一曰引車索又引柩索喪大記注在棺曰綍行道曰引一蠶謂蠶口所吐甚微合十忽而成一絲綸所佩之繩視絲為大綍引車引柩之索則又大矣綬綬有二一以佩玉謂之繸一以佩印謂之組訓者未甚分曉古人佩玉以比徳必有綬維之乃可佩徐廣曰秦以絲組連結於璲轉相結受漢制繸綬之間得施玉環鐍詩所謂鞙鞙佩璲是也今錦綬乃其遺制佩印以檢姦萌亦必有綬以繋之乃可佩翟方進傳赤􅀈縌師古曰韍所以繋印石顯為中書令民歌曰印何纍纍綬若若耶淮南王所謂方寸之印丈二之組是也今印鑰縚乃遺意鐍音決魚袋唐百官佩金魚謂之魚袋武后朝佩金龜後乃佩魚朝野僉載唐初為銀菟符以兔為瑞後為銀魚符以鯉為瑞武后以𤣥武為瑞乃以銅為龜符或謂鯉李也龜武也重國姓也炙轂子云古者有算袋魏文帝易以龜袋唐改魚袋本算袋之遺而龜袋又何取於國姓耶犀比犀毗楚辭招魂晉制犀比費白日些王逸注犀比博著比集犀角以為飾也前匈奴傳黄金犀毗一顔師古注犀毗胡帯鈎紗縠綾綺師古曰紡絲而織輕者為紗皺者為縠說文綾紈也綺繒也紗即今紗縠即今皺紗輕紗又謂之絹綾即今綾綺今細綾紈素亦謂之絹繒亦謂之帛今言段者紈繒之堅美者古無段之稱其曰段者猶言端疋也今人妄从絲作緞非是六珈六服詩副筓六珈疏云祭服首飾副之言覆所以覆首其遺制若今步揺云婦人之副可以當男子之冕晉志皇后則假髻步揺俗謂之珠松以黄金為山題貫白珠為桂枝相繆一爵九華熊虎赤羆辟邪南大豐大特六獸謂之六珈周禮内司服掌王后之六服褘衣褕狄闕狄鞠衣展衣褖衣褘當為翬褕狄讀為揺翟揺本作鷂闕狄一名屈狄言屈於二翟也是謂三翟唯褘言衣者為六服之首以衣目之也翬其色𤣥褕狄青闕狄赤皆刻繒為雉形五采兼之綴於衣上數皆十二鞠衣黄色如鞠塵展衣白褖衣黒祭先王服褘衣祭先公服褕狄祭羣小祀服闕狄蠶則服鞠衣以禮見王及賔客服展衣燕見及御於王服褖衣衣與裳其色同舄亦如其衣之色謂之六服珈與服皆六六者隂數之中也褖音彖襦說文襦短衣也方言汗襦自闗而西謂之袛裯此說非劉𢎞傳持更者羸疾無襦給韋袍複帽謝眺過江革時大雪見革敝絮單席躭學不倦眺脫所著襦并手割半氊與革充卧席而去顧協冬服單薄蔡法度欲解襦與之懼其清嚴不敢發口觀此則襦當是纊襺緼袍之類可以禦寒者非短衣汗衫也祗音低禂音稠半臂背子古者有半臂背子事物紀原隋大業中内官多服半臂除即長袖也又曰秦二世詔衫子上朝服加背子其制袖短於衫身與衫齊而大袖按方言襜褕其短者自關之西謂之䘪䘿郭璞云俗名䘿掖一曰襤褸即是諸于上加繡䘿如今半臂漢書音義云諸于大掖衣也此可見大掖衣外加半臂在手臂之間如今搭護相似脫去半臂即大掖衣故曰除即長袖也又衫子外加背子在脊背之間如今披風相似所謂其制袖短於衫身與衫齊而大袖也重襺重繭左傳夏重襺按纊為襺新綿也重襺謂重綿叙傳申重繭以存荆按繭本作趼足胝也亦通作繭胝起如繭也襺趼並音簡褦襶褦音柰襶音戴程曉伏日詩今世褦襶子觸熱到人家諸韻書訓褦襶為不曉事二字从衣何以云不曉事蓋褦襶涼笠也以竹為蒙以帛若絲繳簷戴之以遮日炎暑戴笠見人必不曉事者也裨冕副褘裨音卑裨之言偏也天子大裘為上公衮侯伯鷩子男毳偏於天子者也玉藻諸侯裨冕以朝是也副之言貳也王后褘衣上公如天子之服則上公夫人如后之服貳於后也禮記夫人副褘是也裼襲裼音錫裼衣乃半袖襌衣加于裘之上以見美襲衣乃有袖全衣加于裼之上以充美曲禮注古人近體衣有袍襗其外有裘葛裘葛皆有裼衣裼衣上有襲衣襲衣上有常著之服則皮弁服與深衣之屬也布稱升古者布稱升蓋精粗之名廣韻升成也布八十縷為一升一成也二千四百縷為三十升三十成也猶樂小成大成俗謂銀一成二成至十成之意閒傳曰斬衰三升既虞卒哭受以成布六升論語注三十升細宻難成夫布三升雖成猶未成六升始謂之成三十升則又細宻難成此亦可見升之為成也𤣥纁考工記三入為纁五入為緅七入為緇爾雅一染謂之縓再染謂之竀三染謂之纁賈疏云凡染𤣥纁之法取爾雅考工記相兼乃具然四入六入無文縓竀纁三色皆染以丹秫鄭云更以纁入赤汁則為朱淮南子曰纁不入赤而入黒汁則為紺更入黒則為緅朱與紺皆四入也周禮染人六入為𤣥以緅更入黒汁也更以此𤣥入黒汁則名七入為緇矣緇與𤣥相似故禮家每以緇布衣為𤣥端也更取周禮染人及鄭氏淮南子諸說始備赤汁以朱湛丹秫丹秫赤粟也黒汁以􅄺􅄺黒土在水中者也由朱以前則皆赤汁由紺以後則皆黒汁緅禮俗文作爵言如爵頭色赤多黒少也廣韻繒色一入為纔纔即縓也竀音稱袒絻檀弓注絻以布廣一寸從項中而前交於額上乂郤向後繞髻喪服小記集解吕氏曰絻以布卷幘以收四垂短髮而露其髻於冠禮謂之闕項冠者先著此後加冠按二說絻之義已明而曰袒者何蓋不著冠露髻猶喪大紀注所稱袒幘也此服之最輕者緦以下冠各異而絻固有也又古者有罪免冠而闕項存因謂之免是知絻不獨喪服即平時亦有吉則用皂所謂緇纚凶則用素所謂袒絻緇纚所以韜髮故用全幅袒絻止於括髪故廣一寸耳緇纚今易為網巾袒絻猶今之勒頭布也纚徙離二音帢鞮幱帢音恰鞮音提㦨音闌古者以緇布為冠止於斂髪魏武帝裁縑帛以為帢按頭使下今帽也以皮為履止於拘足趙武靈王作胡服變履為鞮連脛服之今靴也上衣下裳以隠形自蔽障後魏胡俗欲便於鞍馬施帬於衣為横幅而綴於下謂之幱今長衫也帢本軍容鞮與幱皆胡服古人冠裳之制於是盡變矣窮袴犢鼻褌漢昭記霍光欲后擅寵左右皆阿意雖宫人使令皆為窮袴注窮袴有前襠不得交通列傳司馬相如家徒四壁立自著犢鼻褌注小褌形如犢鼻玉篇三尺布作如牛鼻匹特今人稱布帛一馬一曰匹夫一婦一曰匹遂以匹為獨不知匹偶也楚辭孰可與兮匹儔布帛一曰匹者舉兩端也馬一曰匹者舉四足也匹夫匹婦曰匹者庶人夫妻相匹其名既定故通謂匹夫匹婦也特獨也書歸格于藝祖用特謂一牛也又以匹為義詩實維我特婦謂夫為特也求爾新特夫謂婦為特也端匹杜預曰二丈為端二端為兩所謂匹也是毎匹長四丈中分之向裏卷其末為二端二端兩也其實只一匹此胡大監旦致仕遇赦賜髙年束帛當十端夏竦鎮襄陽選縑十匹贈之胡却還其五也又曾子問疏云丈八尺為端十端六纁四𤣥五兩三𤣥二纁說又不同匹與疋同爾雅倍兩謂之匹是也圭璧周官典瑞王搢大圭執鎮圭大圭長三尺杼上終葵首以見天地宗廟鎮圭長尺有二寸以朝諸侯大圭或謂之珽又謂之玠公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧檀弓注四植謂之桓漢書注亭郵四角建大木貫以方板名曰桓表天子須諸侯以安猶亭郵須桓楹以安也故曰桓長九寸孔義云直者為信曲者為躬皆長七寸疏云穀以養人蒲為席以安人皆徑五寸各以其象為瑑飾圭圎而宛之無鋒芒曰琬圭圭上圎而判之曰琰圭皆王使之瑞節琬圭以治徳以結好琰圭以除慝以易行璧孔曰好邊曰肉爾雅肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環廣韻玦如環而有缺荀子召人以瑗絶人以玦反絶以環予謂大圭長三尺恐非紳帶之間所能容長或亦與鎮圭等但以見天地宗廟故曰大鎮圭以朝諸侯鎮安天下故曰鎮桓以植為義信其形伸以直為義躬其形曲以卑為義躬圭在圭為卑也鄭云穀善也天子穀圭以聘女又何取於養漢制天子卧内以青規地曰青蒲則蒲璧以青玉得名亦未可知若必以瑑飾為言則桓當刻大木雙楹恐無是理新圖亦云信圭直躬圭曲舊圗瑑為人形誤矣又天子執瑁四寸以朝諸侯蓋謂諸侯所受於天子之圭其冒藏之天子來則出以合之非執以為儀也亦取覆冒天下之意半圭曰璋半璧曰璜外八角而中圎曰琮圭邸邸本也璧羨羨延也璋邸射謂剡而出也又有圭瓉瓉形如槃以圭為柄有流爵以灌鬯瓉以受灌蓋祭器也瑑音篆瑶瓊玖碧藍瑶白玉瓊赤玉玖黒玉碧石之青美者紀年惠成王七年雨碧於郢又萇𢎞死於蜀埋其血三年化為碧藍玉之次美者三秦記有川方三十里其水北流出玉名藍田瑶則所謂白如截肪瓊則赤如鷄冠玖則黒如純漆者也碧為石青多而白少藍為玉白多而青少今人秖知瑶為玉即瓊玖不甚辨碧與藍則專指為色矣錢夾漈鄭氏云古錢其形如篆文一變而為刀器再變而為圜法文獻通考云太昊氏髙陽氏謂之金有熊氏髙辛氏謂之貨陶唐氏謂之泉周人謂之布齊人莒人謂之刀錢文周曰寳貨秦曰半兩漢曰漢興宋武帝靣曰孝建幕曰四銖以孝建年鑄重四銖也載年號始此後周宣帝曰永通萬國隋曰五銖唐曰開通元寳史思明據東都亦鑄得一元寳南唐李璟鑄永通錢貨不載年號又多有之稱元寳自唐髙祖始稱重寳自唐肅宗始稱通寳自宋人誤讀開通錢文始改元更鑄自宋太宗始今制錢輕重大小倣唐開通而文則襲宋人之誤讀也漈音祭篆文泉字圜與圓同幕音慢開通元寳唐錢率曰開元通寳予語人當曰開通元寳人多未之信按文獻通考唐武徳四年廢五銖錢鑄開通元寳其文歐陽詢製書八分及篆𨽻三體文自上及右迴環讀之詢初進蠟樣文徳皇后掐一甲跡後錢上有掐文吕東萊曰自漢至隋惟五銖之法不可易自唐至五代惟開通之法不可易龍川畧志蘇轍至京師上書王介甫問鑄錢對曰唐開通錢最善凡此皆可證而曰開元者何蓋是錢為唐鑄開元又唐年號裴耀卿對𤣥宗曰錢者通寳有國之權後人遂不知迴環讀乃錯綜讀而曰開元通寳也𤣥宗亦嘗鑄錢宋璟請行二銖四參錢謂開通元寳也以是錢徑八分重二銖四參得輕重之中故再鑄之其錢獨多也予家藏杜佑通典皆云開通今新刻本皆云開元末學妄竄易也錢文不用年號者古比比是即唐後亦有不用者南唐錢文曰永通錢貨宋錢文曰皇宋通寳何可以年號拘也傳國璽劈正斧傳國璽秦始皇所刻玉出藍田山方四寸上紐交盤五龍文曰受命於天既壽永昌厯漢魏晉沒於劉淵劈正斧或云自殷時流傳以蒼水玉碾造髙二尺廣半之藻文每朝㑹一人執之立於陛前元時猶存二物者所在當有神物䕶之五金一金說文金五色金也五金黄為之長師古曰金有五色黄金白銀赤銅青鉛黒鐵爾雅黄金謂之璗其美者謂之璆絶澤謂之銑白金謂之銀其美者謂之鐐徐曰銀色而鉛質曰錫又曰鈏又謂之鑞鐵堅者曰鋼古稱金印金鋪金馬金人皆銅也漢律三人以上無故羣飲酒罰金四兩亦銅也史平凖書秦以一鎰為一金惠本記注晉灼曰凡言黄金真金也不言黄謂錢也一斤直萬錢秦一金得二十四兩漢一斤得十六兩萬錢以今估計之纔足十二兩可見古今不甚相逺今人謂一兩曰一金一錢曰一文不知何起也塗金襄金今人謂金飾器外曰鎏包器内曰鑲傳寫不知其非玉篇鎏美金也美金安得謂之飾外當用塗字塗廣韻飾也謂以金飾其外也譌而為鎏塗又鋤加切東方朔傳諧語老柏塗俗書作搽廣韻鑲兵器也兵器安得謂之包内當用襄字襄廣韻包也謂以金包其内也譌而為鑲俗又作廂尤非楊用脩謂當作瓖引馬融廣成頌金鋄玉瓖似為得之不知鋄馬首飾瓖馬帯玦東京賦鉤膺玉瓖國語懐纓挾瓖皆指馬帯玦言並非包意又以金飾器曰鍍飾器口曰釦錙銖按說文十黍重曰銖一曰十黍為絫十絫為銖八銖為錙二十四銖為兩一則十黍為銖一則百黍為銖孟康曰黄鍾一龠容千二百黍為十二銖則百黍為銖也縮酒莤酒莤音縮郊特牲縮酌用茅注縮泲也說文禮祭束茅加於祼圭而灌鬯酒是為莤泲與䍤同蓋醴齊濁以茅藉滓䍤出其汁詩釃酒有與藇香草亦猶茅也曰縮者去滓若縮歛之耳束茅立之祭前沃酒其上酒滲下若神飲之士虞禮束茅五寸謂之苴者此也曰莤者从艸酉㑹意周禮甸師共蕭茅鄭大夫云蕭字或為莤莤讀為縮左傳包茅不入無以縮酒注謂束茅而灌之以酒為縮皆混釋也泲䍤俱音淮濟之濟釃師徒二音藇音語案酒下飯今謂折俎曰案酒謂腥曰下飯說文按下也亦作案陸璣云接余浸以苦酒肥美可以案酒下飯古無是稱今人謂腥可以下飯也又謂歸餼曰下程夫行者登途曰上路則停驂當曰下程必有歸餼以食俗所謂下馬飯者也母母爪剌屈膝叵羅母音謨京師人謂餅曰􅪪􅪪帽曰爪拉門鐶曰曲須栁斗曰頗羅初聞不省所謂乆而思之乃知􅪪􅪪為母母禮八珍淳母煎醢加黍上沃以膏者是也爪拉為爪剌韻㑹罩爪剌也帽亦罩也曲須為屈膝李賀詩屈膝銅鋪鎻阿甄蓋門鐶雙曰金鋪單曰屈膝言形如膝之屈也古烏棲曲作屈戌李商𨼆作屈戍皆誤頗羅為叵羅李白詩蒲萄美酒金叵羅謂金酒斚也叵羅本栁斗斚刻文似栁斗故名叵羅瑟瑟白居易詩楓葉荻花秋槭槭廣韻槭槭隕落貌潘岳賦庭樹槭以灑落蘇軾金山寺詩槭槭風響變後人誤以槭槭作瑟瑟杜甫詩雨多往往得瑟瑟博雅瑟瑟碧珠也益州城西每雨過人多得瑟瑟唐書髙僊芝襲石國掠得瑟瑟十餘斛五代史四夷附録吐蕃婦人瓣髪戴瑟瑟最好者一顆易一良馬瑟瑟本作璱璱夫瑟絃樂也白詩誤以槭作瑟杜詩博雅與史通以璱作瑟楊用脩偶見瑟為碧珠不審秋瑟瑟為槭槭乃謂為碧色失之矣又按風亦謂之飋飋或云秋飋飋謂楓葉荻花為秋風所吹飋飋然也雖非白之舊較用脩所說差勝槭音戚刀斗李廣傳下擊刀斗古者軍有刀斗以銅作鐎受一斗形如鋗晝炊夜擊刀即刀兵刀字刀兵之刀都勞切刀斗之刀丁聊切字同音異作刁者俗至有謂刁為姦衺者古無是訓莊子而獨不見之刀刀乎以風聲有似於刀斗鳴也鐎音焦鋗音喧名義考卷十一
