body:
  text: 名義考卷三目録地部兩戒五服河源潮汐九州道里不一堂室宫殿牆屋廣輪旁午辟雍泮宫納陛鼇山南北盛衰三輔空桑漢夀甲第譙樓象魏冀闕兩觀國封朝陽夕陽崑崙二赤壁二洞庭二九江三函丈方丈杖函青瑣白間楚建都三稱名二三楚三吳三晉三秦罘罳華蓋座蚩尾鮮卑欽定四庫全書名義考巻三明周祈撰地部兩戒天地山河之象存乎兩戒北戒則自三危積石負地絡之隂西至於太華北抵常山乃西循塞而至於朝鮮是謂北紀所以限南北也南戒則自岷山墦冡負地脉之陽東至於泰山南踰江漢乃東循嶺而至於閩中是謂南紀所以限蠻夷也故星經謂北戒為朔門南戒為越門河源自北紀之首北與地絡相㑹分而東流與涇渭濟相為表裏謂之北河又自南紀之首南與地脉相㑹分而東流與江漢淮相為表裏謂之南河此方輿之大凡也五服禹貢五服之制九州方五千里西漢盛時東西九千三百里南北萬五千里而山川所届猶不出禹貢之域何也禹貢東漸於海東萊之海也漢則遼東之海西被流沙張掖之流沙也漢則敦煌之流沙禹貢朔止平陽漢則盡朔方南止衡陽漢則盡日南名雖襲而實則不同孔穎達鳥道之說非也此自武帝開拓時如此髙惠文景之時南北􅂊五千里東西猶不及且禹之五服惟東西南為然平陽之北不盈千里僅一服而已河源河源諸書所載不一山經曰敦薨之水西流注於泑澤出於崑崙之東北鄙實惟河源水經載河出崑崙經十餘國乃至泑澤山經又稱陽紆之山河出其中穆天子傳云陽紆之山馮夷所居是為河宗釋氏西域志阿耨達大山上有大利水即崑崙山漢書載河有兩源一出于闐一出葱嶺皆未有能究其實者惟元潘昻霄志謂世祖欲城河源遣都實至其地還云河源在吐蕃朶甘斯西鄙有泉百餘泓淖弱不勝人旁視若列星名鄂端諾爾東騖成川名齊必勒又水西南來名伊爾齊又水南來名呼蘭又水東南來名伊拉齊俱與齊必勒㑹其流寖大水清人可涉又分九派水渾濁土人抱革囊乘馬過之自此以往其深叵測流經伊拉瑪博囉山其山最髙雪冬夏不消自河源至此可三十餘日程又有水西南來名納琳哈喇有水南來名齊爾穆蘓二水合流入河河北行至積石州即禹貢積石自伊拉瑪博囉至此亦三十餘日程又四五日程至河州安鄉關始入漢地鄂端諾爾漢言星宿齊必勒漢言黄河伊拉瑪博囉漢言崑崙也朶甘斯屬元輿地都實為吐蕃招討使昻霄聞之都實弟庫庫楚其言當不妄也宗懍歲時記謂張騫使大夏窮河源至一處見織女牽牛騫止厯大宛月氐等國即崑崙亦未至况河源乎河與天漢通亦自氣言之耳牛女果安在也懍無異病痁然博物志乘槎之説亦謬泑音有泓音翁淖音閙叵音頗剌音辣氏音攴痁音沾潮汐漢東宣伯聚潮候圖説圓則之運大氣舉之方儀之静大水承之氣有升降地有浮沉而潮汐生焉月有盈虚潮有起伏故盈於朔望虚於兩弦息於朓朒消於朏魄而大小凖焉月為隂精水之所生日為陽宗水之所從故晝潮之期日常加子夜潮之候月必在午而晷刻定焉卯酉之月隂陽之交故潮大於餘月朔望之後天地之變故潮大於餘日一晦一明再潮再汐一朔一望再虚再盈天一地二之道也月經於上水緯於下進退消長相為生成此天地之至信而古今不易者也其説頗備朓音挑朒音衂朏音斐九州道里不一禹别九州道里廣狹懸殊兖州徐州相去僅能千里豫州千里而近青州千里而遥冀州二千里而近荆州二千里而遥揚州相距六千里雍州梁州窮數千里是何也徐兖豫在荆河淮濟之間田可井授為中原要區故其地狹荆揚在淮海以南梁雍在函劔以西江湖汎濫嶺嶠重複而又僻在邊陬故其地廣惟青冀為適中也堂室今人以正寢為堂燕寢為室殊非堂盖正寢前露臺也玉篇堂土為屋基也爾雅古者為室自半以前虚之謂之堂半以後實之謂之室是也白虎通天子之堂髙九尺李斯傳堯之有天下也堂髙三尺若以為正寢豈直髙九尺三尺耶書曰若考作室既底法爾雅所謂為室也弗肯堂弗肯虚之也矧肯搆弗肯實之也虚謂築土實謂架木他如賈誼謂廉逺地則堂髙袁盎謂千金之子坐不垂堂鄭泰謂張孟卓東平長者坐不闚堂唐百官志諸校列坐堂皇皆以前虚者為堂也宫殿宫非寢室也牆也殿非正朝之室也亦猶堂也記君為廬宫之儒行注宫牆垣也蝘蜓依牆而生故名守宫不得其門而入者曰宫牆外望宫之為牆可知巳蒼頡篇殿大堂也虞摯云其制有經左墄右平平以文甎相亞次墄者為階級是殿與堂同但有大小耳即今所謂三墠者是也詩殿天子之邦馬融殿後軍義取此殿之為堂可知已古儒有一畝之宫漢黄霸令計吏條對有舉孝子先上殿宫殿又通上下言之秦以後始為至尊之稱師古曰屋之髙嚴者通呼為殿周禮六宫注婦人稱寢曰宫則謂宫為寢室謂殿為正朝之室者亦有自來矣墄音戚甎與磚同牆屋牆非止為垣屋非止為室喪大記注棺牆謂帷孔子閒居負牆謂却就後席論語蕭牆謂門屏檀弓牆置翣謂桞衣宋考父循牆謂幽側之處周禮夫屋謂三夫田三百畝詩夏屋謂大俎喪大記畢塗屋謂輴攅漢紀黄屋謂天子車蓋漢志崇其巾為屋謂幘收雜記素錦以為屋謂小帳顔叔子樎屋以繼謂飼馬具輴音春樎音述廣輪檀弓廣輪撑坎注輪從也横量曰廣從量曰輪東西曰廣南北曰輪輪又謂之袤又謂之運袤音茂旁午旁午霍光傳注分布也韻書交横也按午居正陽位縱也旁則横矣旁午猶縱横之意辟雍泮宫詩靈臺篇辟雍中言鳥獸昆蟲文王有聲篇辟雍言築城作豐魯泮宫言羣醜淮夷皆無預學校漢儒謂辟雍辟作璧為圓水天子之學泮宫為半水諸侯之學羅璧識遺曰辟雍非學也戴埴鼠璞曰泮宫合序與詩初無養才之説亦非學也辟君也雍和也説文天子饗飲曰辟雍月令論曰取其宗廟之清曰清廟取其正室之貌曰太廟取其堂曰明堂取其四門之學曰太學取其水圓璧曰辟雍圓璧之説雖非而清廟太廟明堂太學辟雍則同處異名為甚明也明堂以朝諸侯猶今皇極殿清廟太廟以祭祀猶今太廟太學辟雍以承師問道猶今文華殿成均上庠東序瞽宗則四門之學也泮魯水名僖公作離宫於其上落成之際詩人頌之欲於此而服夷狄受琛貢與宣王考室之詩同意琛音郴納陛王幼學謂納陛為從中階而升孟康謂鑿殿基際為陛二說皆非顔師古曰尊者不欲露而升陛故納之於霤下如今官府升堂有自檐而升者有自階而升者納陛亦自檐之意故曰納之霤下霤音溜鼇山列子歸墟中有五山帝使巨鼇十五載之五山始峙而不動龍伯國之大人一釣連六鼇於是二山流於北極後人所稱鼇山出此按鼇海中大鱉豈能負山龍伯雖大亦人耳大抵莊列之言多類此南北盛衰天下之大勢秦漢以前莫盛於北魏晉猶然隋唐以下莫盛於南宋猶然元則南北俱衰國朝則南北俱盛矣舜分天下為十二州北居其九南居其三周分天下為九州北居其七南居其二漢分天下為十三部北居其九南居其四元始中總天下千二百餘萬戸南二百萬戸僅天下四之一衣冠風俗之美穀粟財用之多舉在北焉當時論者往往指燕雲河湟為重江湖川廣為輕不知地無常利天運實衡其盛衰唐分天下為十道南北各居其五宋分天下為二十三路南居十七北居十三熈豐盛時總天下千六百五十萬戸北五百餘萬戸亦僅天下四之一鄒魯多儒移於濂閩青齊冠蓋乃在吳楚視燕雲河湟豈直過之耶元則舉天下而蕩除之勢少衰矣今南北郡縣相埓人才不殊財賦惟仰給於東南可謂並盛矣埓音劣三輔京兆尹左馮翊右扶風是為三輔京大也天子曰兆民故曰京兆馮翊言依馮輔翊京師扶風言扶助天子風教皆漢武所置秦有内史治京師漢景帝分置左右内史左馮翊左内史也右扶風右内史也京兆今西安府左馮翊今同州右扶風今鳳翔府馮音平空桑漢夀空桑山名在冀北一云在陳畱南一十五里一云在魯南山之空竇中楚辭踰空桑兮從女考𤣥𡨕於空桑郊祀志空桑琴瑟結促成干寳三日記徴在生孔子空桑之地今名空竇伊尹生於空桑正此地列子謂伊尹母視臼水出而東走身化為空桑尚書大傳謂伊尹母行汲化為空桑夫尋至水濱見桑穴中有兒皆不經也漢夀本廣漢葭萌縣地蜀先主置漢夀縣今保寧之廣元關羽之封地也漢制有縣侯如蕭何鄼侯有鄉侯如鄭衆鄛鄉侯有亭侯如靈帝解瀆亭侯之子晉封孔子二十三代孫震為奉聖亭侯或以夀亭為食邑漢為國號誤也甲第漢髙詔列侯食邑者皆賜大第室孟康曰有甲乙次第故曰第第非室也初學記出不由里門靣大道者名曰第爵雖列侯食邑不滿萬戸者不得作第第非通稱也武帝為霍光治第遂以第為室羊祜與從子琇書曰既定邊事當角巾東第遂以第為通稱田蚡治宅甲諸第遂有甲第之稱漢設甲乙科射䇿中者謂之髙第亦謂之甲第隋唐以來進士諸科又有及第之目是科目亦謂之甲第又物品髙者謂之上第漢書四方貢獻皆先輸上第於冀譙樓陳勝傳戰譙門中馬遂傳設二門為譙樓師古曰門上為髙樓以望曰譙廣韻譙樓之别稱古者為樓以望敵陣兵列於其間下為門上為樓或曰譙門或曰譙樓也是譙有望意俗以覷視為譙莊徐無鬼篇魏有麗譙説者謂美麗而嶕嶢則嶕當从山又俗謂門樓曰巢門巢與譙聲相近巢譙之訛也一説若巢然象魏冀闕兩觀古者宫庭為二臺於門外作樓觀於上上圓下方兩觀雙植中不為門門在兩旁中央闕然為道以其縣法謂之象魏象法象也魏其狀巍然髙大也以其記列教令謂之冀闕冀記也闕中央闕然也以其使民觀之謂之觀䨇植謂之兩觀名雖殊其實一也猶今午門然國禹㑹諸侯於塗山執玉帛者萬國商則三千餘國周則千八百國説者以是為夏商之衰諸侯轉相吞滅固然然禹五服􅂊五千里以萬國分之每服得國二千每國得半里不應如是之小也曰萬國槩言之耳商建國無考周地方千里為縣百為郡四百是得國五百五服得國二千五百曰千八百者或先後盈縮不同也三代以來之國則秦以後之縣封古者墓而不墳墳土起也亦謂之封封土陪益也檀弓若堂若防若覆夏屋若斧皆封之形也四周而平曰堂長而如隄曰防如大俎而垂曰覆夏屋仄而上鋭曰斧亦曰馬鬛今亦多類是朝陽夕陽朝音潮爾雅山東曰朝陽山西曰夕陽蓋山東迎日故曰朝山西送日故曰夕非旦暮之謂也亦猶古者諸侯見天子旦見曰朝暮見曰夕云耳朝日夕月之朝亦讀作潮音詩梧桐生矣於彼朝陽又曰度其夕陽正謂山東西也張華有鳳鳴朝陽之說始指為曉日而謂夕陽為落日者自昔詩人益紛紛矣崑崙二赤壁二洞庭二九江三大荒經阿耨達山一名崑崙恒水出其南此河源之崑崙也禹貢雍州崑崙即叙此酒泉西南之崑崙也魏志赤壁初戰操軍不利此嘉魚西岸與烏林對之赤壁今譌在黄州者也綱目冬十二月劉曜自立於赤壁此趙城霍山西南流之赤壁水名也北夢瑣言湘江蜀江溢為洞庭此岳陽樓之洞庭也揚州太湖一名震澤一名洞庭此姑蘇之洞庭也禹貢九江孔殷沅漸元辰叙酉灃資湘九水即岳陽洞庭亦曰九江也一統志秦虜負芻置楚郡漢初為九江郡今夀州也太康地記湖漢九江入彭蠡澤白蚌烏靡畎源廩提箘九江今九江府也函丈方丈杖函曲禮席間函丈函容也十尺為丈謂席間之地可容十尺也蓋席制三尺三寸三分寸之一逺近間三席是一丈或謂丈作杖容杖以指揮非是孟子食前方丈謂食物前列者方一丈唐顯慶中王𤣥䇿使西域至毗耶離城有維摩居士石室以手板縱横量之得十笏名方丈室後人謂僧舍皆曰方丈周禮伊耆氏共杖函函匱也以函藏杖也青瑣白間漢書給事黄門之職日暮入對青瑣門孟康曰以青畫戸邊鏤中天子之制也師古曰刻為連瑣文而青塗也魏都賦皎皎白間離離列錢張説注白間忩也以白塗之畫以錢文猶綺疏青瑣之類青瑣即今門之有亮􅀢者刻鏤為連瑣文本注是白間即今菱花忩􅀢文如列錢自生虚白非以白塗為錢文也鏤音漏􅀢音格楚建都三稱名二鬻熊重黎之後為周文武師成王得鬻熊曽孫熊繹封於荆蠻其地枝江即郢都也今荆州府厯三十餘世秦白起拔郢頃襄王徙陳今陳州才三十餘年秦日加兵考烈王徙夀春今夀州又十餘年秦虜負芻而楚亡矣春秋莊公以前皆稱荆僖公以後皆稱楚蓋荆楚本一或稱荆或稱楚故人於楚國或稱楚或稱荆也春秋亦是據當時人所稱而云然謂成頵始稱楚非賈逵謂秦莊襄王名楚改稱荆亦非頵音均三楚三吳三晉三秦淮北沛陳汝南南郡西楚也彭城以東吳廣陵東楚也衡山九江江南豫章長沙南楚也蘇州東吳也潤州中吳也湖州西吳也魏斯趙籍韓䖍三晉也章邯司馬欣董翳三秦也罘罳罘音浮罳音思罘罳博雅謂之屏顔師古曰連闕曲閣也二說往嘗疑之求之字義亦不合今宫殿檐栱之間有銅絲網以避飛鳥初疑即此亦未是後見夏月以黄絲為網自檐及階張之遇視朝則捲朝罷復設此即罘罳之遺制唐蘇鶚曰罘罳从网是形謂織絲之文輕疎浮虚之貌蓋宫殿檐戸之間也唐文宗甘露之變出殿北門裂斷罘罳而去温庭筠上陳武帝書罘罳晝捲此皆可證若屏與曲閣則字不當以网又豈可裂斷可捲耶釋文請事復思之説為尤謬華蓋座華蓋本星名晉天文志天皇大帝上九星曰華蓋所以覆蔽大帝之座也下九星曰杠蓋之柄也古者天子所坐曰華蓋之座取象於天也沈存中曰輦後曲蓋謂之筤兩扇夾心通謂之扇筤此華盖之制崔豹古今注黄帝與蚩尤戰於􅃰鹿上有五色雲氣止於帝所因作華蓋非筤音朗蚩尾蚩音笞倦㳺録漢以宫殿多火災術士言天上有魚尾星為其象於屋以禳之類要曰東海有魚似鴟噴浪即降雨唐以來設其象於屋脊蘇氏演義蚩海獸也漢武作栢梁殿以蚩尾水之精能却火災因置其象於上倦㳺録所謂魚尾即蚩尾類要所謂有魚似鴟亦即蚩譌為鴟也椒園雜記螭䗓形似獸立於屋角上又譌為螭又云􅀈􅀈似龍鼇魚亦似龍皆立於屋上者今殿庭曰䗓衙舍曰獸頭大抵皆蚩也殿庭為龍形衙舍為獸形或為魚形以别於宫殿皆以意為之非其本則然也鮮卑鮮卑東方之支依鮮卑山為號在栁州界又楚辭小􅆎秀頸若鮮卑只注鮮卑滚帶頭也言好女之狀􅆎支細小頸鋭秀長若以鮮卑之帶約而束之也鮮卑一為東方號一為滚帶頭或是帶出於東方因以得名云名義考卷三
