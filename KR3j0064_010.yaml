body:
  text: 名義考卷十目録物部鳯五鳩九雇鯤鵬烏鵙鶷􅗾黄鸝鸒鵜雉鵫鴩鷊鳥隹鳥䑕三臭龍鱗之而騶虞斗牛螭虎風馬牛天禄辟邪角甪牛溲馬勃太牢少牢一牢五牲八珍犗騬􅛳羯魚須飛魚白澤邛邛岠虚獬豸鸂鶒象鼻鱷尾豭豝鱣鮪鮆鱖鮞䲊蛤四蜃二蛤蠯觜蠵贔屭鼃黽馬螘青蚨海月麛馬頭娘狼戾很戾決明螵蛸各二䗁蟢蜥蜴蝘蜓𤨏􅖜水母蝍蛆蜈蚣蚿鷄尸蚌兩桂蠧鎻陽五靈脂紫稍花音聲木鸂鶒灘螽皮革十四物取義鴟鴞欽定四庫全書名義考卷十明周祈撰物部鳯鳯神鳥也朋鵬皆古鳯字其雌曰凰一名鶠爾雅鳯曰鶠一名鶉南方七㝛鶉是也漢蔡衡曰凡鳥象鳯者有五多赤色者鳯多青色者鸞多黄色者鵷多紫色者鷟多白色者鵠蓋鳯五色備舉總言之謂之鳯就其中赤多者獨得鳯名故曰朱鳯或曰丹鳯又曰朱雀鸞也鵷也鷟也鵠也四者皆鳯也其色小異古謂鸞曰青鸞是矣鵷曰鵷鶵鷟曰鸑鷟鵠曰鴻鵠皆不言色惟鵠又曰黄鵠楚辭寧與黄鵠比翼乎漢始元元年黄鵠下建章宫雖言色而非白大抵皆鳯類而稱名或異也今人知鳯不常有而不知鸞鵷鷟鵠亦不常有乃謂某為鸞為鵠妄矣五鳩左傳郯子五鳩祝鳩鴡鳩鳲鳩鷞鳩鶻鳩爾雅隹其鳺鴀疏云祝鳩也今水鳧是鳥之謹愿與波上下者詩詁鴡鳩王鴡也王鴡鶗鴂也今杜䳌是秋則為鶚春復為杜䳌月令鷹化為鳩者此也方其為杜䳌居幽閒逺人之地故曰在河之洲及為鶚則能摶擊故曰摯莊子誤以為布穀爾雅鳲鳩鴶鵴今布穀是牝牡飛鳴以翼相排居鵲之成巢有均一之徳鷞鳩杜云鷹是爾雅謂之鶆鳩鶆蓋鷞字之誤鶻鳩杜云鶻鵃也一名鶌鳩今鷓鴣是其聲軥輈故謂之鵃陸璣以為斑鳩非五鳩之外如鴿而灰色者曰鵓鳩天晴則呼其牝雨則逐之常聞其聲又曰鳴鳩似鵓鳩而大有繡項者曰斑鳩隹音錐鳺音扶鴀音浮鴶音甲鵴音局鶻音骨鵃音昭鵓音勃九雇雇音户左傳帝少昊以鳥名官有九雇為九農正說文九雇農桑候鳥雇民不淫者也春雇鳻鶞夏雇竊𤣥秋雇竊藍冬雇竊黄棘雇竊丹行雇唶唶宵雇嘖嘖桑雇竊脂老雇鷃蔡邕獨斷曰春扈氏趣民耕種夏扈氏趣民芸除秋扈氏趣民收斂冬扈氏趣民蓋藏棘扈氏掌民百果行扈氏晝為民驅鳥宵扈氏夜為民驅獸桑扈氏趣民養蠶老扈氏趣民收麥九雇有名而不知為何鳥按直音鳻鶞鸎也禽經竊𤣥曰鵰廣韻鷃鴽屬則春雇為黄鸝夏雇為鵰老雇似䳺餘無可考郭璞曰竊淺也竊藍謂毛羽淺青竊黄竊丹竊脂猶淺黄淺赤淺白也一曰竊脂以盜脂膏而食得名唶唶嘖嘖其聲也鳻音分鶞音春鸝音梨鯤鵬自有北𡨕篇人疑天壤間有鯤鵬焉若不得見不知無所謂鯤鵬者鯤魚子國語禁鯤鮞鵬古文鳯字鯤雖有而未成魚鵬不常有莊子蓋寓言耳郭象曰鯤鵬之實未詳象固疑之矣諸韻書訓鯤為大魚阮宣子大鵬讃李白大鵬賦皆濫觴於北𡨕篇也烏烏即鴉鴉與雅同猶鷄與雞無異也韓文魚魚雅雅是已小爾雅謂鵯鶋為雅烏失之複雅正之雅本作疋古文大疋小疋爾疋是已後人借作雅今人止知烏為鴉雅則語下切為大小雅疋則僻吉切為倍兩之疋矣鵙鶷􅗾爾雅鵙伯勞也郭璞曰似鶷􅗾而大左傳鵙伯趙氏說文鵙博勞也曰鵙曰伯勞曰伯趙曰博勞不省為何物服䖍曰鵜鴂一名鵙博雅鶗鴂子規也知子規而鵙與伯勞伯趙博勞皆可知矣第服䖍所謂鵜鴂博雅所謂鶗鴂皆譌也子規本作􅀈鳺􅀈从􅙻音子从弟乃鵜鶘之鵜从是乃鶗鵳之鶗鳺从夫音規从夬乃鸋鴂之鴂鵜鶘為淘河鸋鴂為巧婦二鳥與子規迥别鶗鵳為鶚又子規所化者焉有一鳥而借三鳥以為名也厯書子作秭集韻規作􅨼意自可見離騷恐鵜鴂之先鳴兮亦當作恐􅀈鳺之先鳴兮為是非屈子之誤乃傳寫譌耳蓋鵙一名􅀈鳺􅀈鳺亦作子巂又作鷤䳏通借作子規猶贔屭之借作臂係也􅀈鳺即郯子所謂鴡鳩一名杜宇又名杜䳌莫春始鳴夜啼達旦血漬草木至秋化為鶚仲春復化為􅀈鳺春鳴百草芳秋鳴百草死先鳴恐其未秋即化而鳴也其曰賊害之鳥與應隂氣之動者皆謂化為鶚時也詩七月鳴鵙七月已化為鶚復曰鵙者本始言之也字林云鶷􅗾似伯勞而小即今八哥鳥或呼八八者鶷胡八切􅗾牙八切因切音而曰八八也或呼八葛者􅗾从葛上以切音下以所以也葛又轉而為哥由不識二字故也鶷􅗾一名鸜鵒陸佃云鸜鵒似鵙而有幘今鸜鵒黒而有幘子規黒而無幘鸜鵒視子規而小子規視鸜鵒而大二鳥始辨矣韻㑹并鶷􅗾字亦不載非以其不知而畧乎據字義而言博鮮不誤矣鵜鶗俱音提鸋音寜黄鸝黄鸝之鸝本作離猶烏鴉之鴉本作雅後人以離為離别别作鸝字猶以雅為雅頌别作鴉字說文離黄倉庚也以是鳥黧黒而黄因名離黄庚金黄也倉與蒼同亦黧黒也猶黧首謂之蒼生故曰離黄倉庚也俗呼黄離留或謂之黄栗留栗離之訛也一名商庚商倉之訛也或又謂之鵹黄一名楚雀一名摶黍今所謂黄鶯也鸒錢氏曰詩弁彼鸒斯孔疏曰此鳥名鸒而云斯者語辭猶蓼彼蕭斯菀彼栁斯以劉孝標之博學而類苑鳥部乃立鸒斯目是不精也此說是矣爾雅鸒斯鵯鶋不獨類苑也釋名鸒􅠿鵯鶋則又以斯从鳥矣若然則螽斯之斯當从虫鹿斯之斯當从鹿寧有是理乎鵜陸璣云鵜水鳥形如鶚而極大喙長尺餘頷下胡大如數升囊小澤中便羣共抒水滿其胡棄之令水渇魚見乃共食之俗名淘河一名鵜鶘以頷下有胡也一名鴮鸅以渇澤食魚也郭璞作洿澤為是亦淘河意不知胡何以加鳥作鶘洿澤何以去水並从鳥作鴮鸅也爾雅亦莫之辨然則鵜其名胡其形淘河洿澤鵜之用則然矣雉爾雅鷂雉青質五彩鷮雉長尾走且鳴鳪雉黄色鳴自呼鷩雉似山鷄而小冠背毛黄腹下赤項緑鸐雉長尾者雗雉今白鵫也鷂鷮鳪其為禽不可辨鷩即今錦鷄鸐即今野鷄雗即今白鷴鷩尚書所謂華蟲廣韻鷩即今鵕䴊也南越志鵕䴊山鷄也今錦鷄冠背黄腹赤項緑為山鷄無疑曰似誤也華蟲唐虞以為十二章鷩周以為冕鵕䴊漢以為侍中冠錦鷄今以為一品服是知錦鷄山鷄鵕䴊華蟲鷩一也鸐一名翬王后之服以為飾周禮褘衣畫翬者是也亦作翟書羽畎夏翟又作狄周禮褕狄又南方曰東方曰鶅北方曰鵗西方曰鷷皆翟也因地異名鷂鷮鳪或亦皆翟也色微不同耳又西京雜記南越王獻髙帝白鷴黒鷴各一隻黒鷴疑即爾雅所謂秩秩如雉而黒在海中山上者雉之種類實䌓要以羽毛見重亦因色而異名故古人服物多用之為飾鷂音揺鷮音驕鳪音撲鷩音别鸐音狄雗音汗鵫音罩䴊音倪翬禕俱音揮音儔鶅音緇鵗音希鷷音尊鵫鴩鵫音罩鴩音秩楊用脩曰後周皇后服制受繭則服鷩衣聴女教則服鵫衣歸寧則服鴩衣鵫鴩字惟見此蓋蘇綽所制也用脩其亦未讀爾雅耶爾雅秩秩海雉雗雉鵫雉郭璞云秩秩似雉而黒鵫雉今白鵫也是鵫鴩已見爾雅但鴩作秩古字通用廣韻鴩讀若益餔豉鳥未知即秩秩否而云鵫鴩惟見此已非是又云蘇綽所制尤非鷊鷊音逆說文鷊鶃也春秋傳六鶃退飛一作六鷁廣韻鶂水鳥亦作鶃鷁鷊是知鷊也鶃也鶂也鷁也四者一鳥也按字書鶂水鳥九頭博物志鶂雌雄相視則孕莊子鶂相視眸子不運而風化然則果何鳥也裴瑜注爾雅云鶬麋鴰是九頭鳥也孔子聞河上人鶬歌曰逆毛衰兮一身九尾長兮逆當作鶂楊用脩曰鬼車九頭鳥也白澤圖謂之蒼鸆帝嚳書謂之逆鶬逆亦當作鶂是知鶂即鶬鴰鶬鴰即鬼車蓋鵂鶹類也爾雅鷊綬鳥埤雅綬鳥大如鸜鵒有時吐物長數寸古今注綬鳥行必逺草木慮觸其嗉倦㳺録吐綬一名真珠鷄遇晴日先出兩肉角然後徐舒其綬踰時歛於嗉下爾雅誤以綬鳥釋鷊陸佃諸人因名生義皆未得其實也予謂吐綬當是鷩古者盭綬緑色施於左肩以佩印鷩郭璞云冠背毛黄腹下赤項緑細辨之冠下别有毛黄而黒文長足覆項及肩仰則緑盡韜俯則綠漸舒若吐綬然是知吐綬乃鷩非鷊也劉禹錫吐綬鳥詩朱鳥星精鍾異氣鷩為赤雉故云朱鳥王介甫錦鷄詩天日晴明聊一吐鷩一名錦鷄吐謂吐綬質之二詩可信鳥隹隹音錐說文禽長尾者曰鳥短尾者曰隹尾莫長於鳯故鳯从鳥莫短於寉故寉以隹亦有不盡然者雉尾本長而从隹鵜尾本短而从鳥有兩从者雅或从隹或从鳥鷄或从鳥或从隹有並从者鵻既从鳥又从隹鷹既从隹又从鳥然鵻隹聲鷹膺省也寉本从冂从隹加鳥作鶴者俗文也冂音坰義同鳥䑕禹貢導渭自鳥䑕同穴爾雅鳥䑕同穴其鳥為鵌其䑕為鼵注鼵如人家䑕而短尾鵌似鵽而小黄黒色共處一穴山以是得名在今臨洮渭源縣南俗名青雀山鵌音徒鼵音突鵽音奪三臭爾雅鳥曰臭注張兩翼也論語三臭而作謂雉張兩翼臭臭者三遂舉去於上文色斯舉矣意實相應劉聘君亦主此說不知朱子何以不取也龍廣雅云有鱗曰蛟龍有翼曰應龍有角曰虯龍無角曰螭龍未升天曰蟠龍其言若辨而實非也按說文龍从肉童省聲象肉飛之形何有於翼也龍時飛則飛時濳則濳蟠非定稱也說文蛟龍屬無角曰蛟虯龍子無角者螭若龍無角而黄北方謂之土螻蛟則謂之蛟虯則謂之虯螭則謂之螭不可言蛟龍虯龍螭龍也亦猶謂螣為螣蛇也埤雅螣龍類將亦可謂螣龍哉鱗之而考工記凡攫閷援簭之類必深其𤓰出其目作其鱗之而鄭注謂筍虡之獸也之而頰􅝋也按頰面旁􅝋頭秃無髮義本不相承以訓之而似未得且之語助亦不當以之而為句許慎云而頰毛也後又从彡作耏鱗謂龍蛇也蓋筍虡之獸刻為龍蛇之狀閷與殺同簭與噬同言其狀飛動可畏攫著而欲殺援攬而欲噬如此者必深入其𤓰突出其目振起其頰毛也虡音巨􅝋音哭彡音杉耏音而攫音夹騶虞斗牛螭虎相傳物象有騶虞有斗牛有螭虎而今皆亡之騶虞見詩漢儒以為義獸合四靈以配五行其說誣罔歐陽脩引賈誼新書亦既辨之矣戴植謂天子田獵七騶虞虞人也言文王田獵雖騶從與虞人之賤皆有仁心故嘆美之也至斗牛螭虎别無考見即其形狀斗牛似龍而觩角螭虎似龍而岐尾乃知所謂斗牛者天文北宫七㝛斗牛也埤雅云虚危以前象蛇蛇體似龍故以為人臣最尊貴之服所謂螭虎者傳譌也蔡邕獨斷曰天子璽以玉螭虎紐衞宏曰秦以前皆以金玉為印龍虎紐邕謂或螭或虎宏謂或龍或虎非謂螭虎一物也螭若龍無角而黄亦非岐尾岐尾者蜼也蜼音壘風馬牛左傳唯是風馬牛不相及也服䖍曰馬牛風逸是未界之末事喻不相干也此訓亦未為得俞文豹曰牛馬見風則走牛喜順風馬喜逆風南風則牛南而馬北北風則牛北而馬南相去遂逺正如楚處南海齊處北海也故曰不相及天禄辟邪西域傳烏弋山離國有桃拔一名符拔似鹿長尾一角者為天禄兩角者為辟邪予謂桃拔符拔當作桃祓符祓以是獸能祓除不祥也祓誤作拔曰桃曰符者猶度朔山桃梗之意祓除不祥故謂之辟邪永綏百禄故謂之天禄漢立天禄于閣門古人置辟邪於步摇上南陽宗資碑旁有兩石獸一曰天禄一曰辟邪皆取祓除永綏之意一統志忽魯謨斯國產福禄似驢而花文可愛即天禄也今元旦賜近臣福禄獅子亦其遺與角甪說文角作古岳切獸角也象形角與刀魚相似崔偓佺云角从刀作角音覺頭骨上出也甪以一㸃一丿作音鹿無訓廣韻甪獸角挺番陽董敬菴饒雙峯皆云甪鳥咮骨也咮即喙也予按說文與崔偓佺所云互有得失說文角象形予謂甪亦象形角本作上象頭骨有岐下象骨文甪亦當作上象咮骨直而銳下亦象骨文訓角為刀魚相似以刀訓甪為獸角挺及从一㸃一丿者俱非也甪為鳥咮骨其說始見於董饒二氏最為得之廣韻觜鳥喙也此甪為觜㑹意詩誰謂雀無甪何以穿我屋言雀有甪而能穿屋也漢書予之齒者去其甪言獸有齒無咮骨也顔師古以牛無上齒為訓非是詩與漢書皆當作鹿音讀偓音握佺音詮丿音撇咮音晝喙音誨角音覺甪音鹿牛溲馬勃溲音小牛溲牛溺也本草黄犍牛鳥牯牛溺主水腫馬勃菌也本草注俗呼馬氣勃紫色虚軟狀如狗肺彈之粉出生濕地及腐木上主惡瘡溺音尿太牢少牢一牢五牲八珍太牢牛也少牢羊也一牢牛羊豕也五牲麋鹿麕狼兔也八珍牛羊麋鹿麕豕狗狼也犗騬􅛳羯犗音介騬音呈􅛳音堅羯音掲說文犗騬牛也騬犗馬也羯羊牯犗也廣韻􅛳犗牛人多未喻増韻凡畜健强者皆為犗唐郭崇韜謂魏王繼岌曰騬馬亦不可乗是以不馴為義按漢陳宫傳宫刑或云犗刑廣韻㓺以刀去牛勢也或作􅛳則犗也騬也􅛳也羯也皆馬牛羊去勢之名說文廣韻得之㓺音堅羯音結魚須須音斑玉藻笏大夫以魚須文竹士竹本象可也馮鑑云大夫用魚鬚文士以竹誤以須為鬚於文字下又去竹字以文士連讀史繩祖辨之是矣即本註亦未為得崔云用文竹及魚斑也隠義云以魚須飾文竹之邊且亦未明為何物按廣韻魚獸名陸機云魚獸似豬出東海肉背有斑文肉雖乾每潮至及將雨毛皆起是大夫笏以竹為質以魚斑飾之士則竹而已故曰本象魚斑不獨以飾笏古以為箭室詩象弭魚服是也又以為旗吳都賦旗魚須子虚賦靡魚須之撓㫋是也飛魚白澤飛魚􅠪也山海經秦器之山淮水出焉是多􅠪魚鳥翼蒼文白首赤喙群飛海上常有大風爾雅翼􅠪長尺許翅與尾齊一名飛魚白澤貘也說文貘似熊而黄黒色白居易貘屏賛象鼻犀目牛尾虎足寢其皮辟濕圖其形辟邪徐氏謂即白澤也邛邛岠虚爾雅西方有比肩獸焉與邛邛岠虚比為邛邛岠虚齧甘草即有難邛邛岠虚負而走其名謂之蟨吕氏春秋北方有獸其名為蟨䑕前而兔後趨則頓走則顛邛邛岠虚䑕後而兔前髙不得取甘草故須蟨食之孔叢子蟨得甘草必齧以遺蛩蛩駏驉二獸見人來必負蟨以走爾雅與吕氏春秋作邛邛岠虚孔叢子作蛩蛩駏驉其說有無不可知子虚賦注邛邛青獸如馬距虚似驘而小岠又作距今驢父馬母生曰駏或即岠虚也邛邛或亦此類與獬豸鸂鶒今制品官服色法官服獬豸七品官服鸂鶒而鸂鶒又諫垣獨服之說文獬豸似山羊一角古者決獄令觸不直者埤雅鸂鶒性食短狐蓋鳥之勑邪逐害者法官與諫垣上則弼違下則癉惡有觸不直勑邪逐害之義故服之脫有不然是仗馬是窮竒矣象鼻鱷尾虞衡志象頭不可俯頸不可回口隠於頤去地尚逺以鼻為用一軀之力皆在鼻將行先以鼻柱地鼻端甚深可以開闔取物中有小肉夾雖芥子亦可拾每取物就爪甲擊去泥垢而後捲以入口飲水亦以鼻吸嶺表異物志鱷形如鼉喙長半其身牙如鋸尾有二鈎極利遇鹿豕以尾㦸之以食生卵甚多或為魚鼉其為鱷不過一二象食以鼻鱷食以尾物類之異者也象孕五年乃乳鱷生卵為魚鼉天不欲其類繁也豭豝猳音加豝音巴說文豭牡豕也左傳盍反吾艾豭豭音轉為牙又轉為假俗謂牙猪假肉也稱假者今武昌稱牙者所至皆然說文豝牝豕也詩一發五豝南人謂餈曰巴北人謂女隂曰巴南人有音而無字作粑者俗也北人取義於牝故每聞南人言輒盧胡鱣鮪詩鱣鮪發發鱣今海東黄魚俗作鰉鮪一名鱏俗作鱘郭璞曰鱣大魚似鱏而短鼻口在頷下體有斜行甲肉黄大者長二三丈鮪鱣屬大者名王鮪小者叔鮪似鱣而青黒頭小而尖似鐵兜鍪陸璣曰鮪身形似龍周洛曰鮪出鞏山穴中三月遡河流上能度龍門則為龍是化龍者鱣鮪也俗謂鯉化龍因鯉亦謂之鱣故譌也字說云龍八十一鱗能變者也鯉三十六鱗雖無變而有理者也無變又豈能化鮆鱖鮆在禮切鱖居衛切漢貨殖傳鮐鮆千斤說文鮆刀魚也飲而不食俗作鰶韻書無鰶字唐人詩桃花流水鱖魚肥爾雅翼鱖魚有肚能嚼者廣韻大口細鱗有斑文一名婢魚訛作鱀鱀鼻在額上似鱏鮞䲊鮞音而䲊音妥說文鮞魚子也䲊魚子生者也鮞是子之在胎者䲊是子之散泊在草者蛤四蜃二蜃音矧蛤蜯也亦曰蜆又曰珧狹而長者曰蠯附石而生者曰蠣又曰蠔海蛤蚶也亦曰魁陸圓而厚外有理縱横山蛤石鱗魚也似蝦蟆而大身長黒色無痱癗三者皆可食蛤蚧似守宫而大長四五寸尾與身等可入藥蜃車螯也似蛤而大其甲可為器煆之以為灰禮鬯人職四方山川用蜃器㡛氏淫之以蜃謂薄粉之也又蜃似蛟而無足天官書海旁蜃氣象樓臺謂之海市者此也珧音揺蠯音排痱音肺瘤音疊㡛音荒贔音被屭音戲蛤蠯今人或以紙或以繒重糊之以為書衣冠武履襯曰蛤蠯不悟其義嘗閱韻書蛤蜃屬大曰蛤小曰蜆蠯蚌狹而長者皆甲蟲也書之衣冠之武履之襯皆殻也殻甲也借蛤蠯以名殻也北音呼歌排南人呼格簿皆蛤蠯之訛也凡俗呼未嘗無字但人不察耳觜蠵贔屭觜音咨蠵音兮贔音被屭音戯觜蠵玉篇大龜也似瑇瑁而薄有文今龜同是也又西方㝛名贔屭廣韻鼇也一曰雌鼇為贔今碑跗其像也又作力貌楊孚嶺表異物賛係臂如龜生於海洲係臂當作臂係即贔屭也楊用脩以臂係為海錯之名又以贔屭為鴟吻之類殆猶未辨耳鼃黽黽音猛周禮蟈氏掌去鼃黽鼃即蛙說文蝦蟆屬長脚喜鳴色青謂之青蛙一名田鷄又曰水鷄黽郭璞云蝦蟆屬似青蛙大腹一名土鴨二者皆可食陶𢎞景云蝦蟆腹大皮上多痱㿔不可食今但以取蟾酥一名螻蟈子名科斗一名活東形圓有尾聞雷震則尾脫脚生爾雅鼀鼀詹諸也其鳴詹諸其形鼀鼀詹諸作蟾蠩似蝦蟆居陸地𤣥中記蟾蠩生角食之壽千歳尚書故實百越人以蝦蟆為上味皮最佳謂之錦襖子非真蝦蟆蓋謂石鱗魚耳石鱗魚似蝦蟆而大生石澗中此即所謂蛤所謂鼀鼀所謂錦襖子者也生角又其異者耳痱音肺㿔音壘鼀音蔟或作􅖚馬螘螘與蟻同爾雅蚍蜉大螘小者螘注大螘俗呼為馬蚍蜉大戴禮注螘為𤣥駒毌以大螘馬小螘駒與或以馬善陣螘亦善陣有似於馬故得馬名古今注謂人成蚊蚋馬成大螘恐非青蚨海月博雅􅝒􅘿魚伯青蚨也謝靈運詩挂席拾海月青蚨海月二者皆水蟲也捜神記南海有蟲名􅀈蠋如蟬大辛美可食其子如蠶種殺其母塗錢子塗貫用錢則自還即青蚨也今閩廣所食龍虱是本草云海月南海水沫所化煮時猶變為水似半月因以名之海蛤類也黄直翁以為寳名誤矣麛按麛鹿子也韻㑹凡獸子初生皆曰麛引韓愈猛虎行子食赤豹麛誤矣羔小羊也北人罵人年少曰羔然則羔亦豈人與麛為豹子借用耳馬頭娘雲笈云黄帝元妃西陵氏始養蠶為絲禮記皇妃祭先蠶西陵氏也周禮疏蠶為龍精與馬同氣禁原蠶為其害馬也由雲笈與禮記則蠶祖為西陵氏黄帝妃也由周禮疏則蠶馬之所視以為盛衰馬胎于蠶也古之可見者如此圖經髙辛時蜀蠶女父為人所掠惟所乗馬在母誓得父者娶以女馬振迅去得父還父違誓殺馬曝其皮皮捲女飛去女化為蠶披馬皮謂之馬頭娘蜀人祀以祈蠶曰娘者因西陵氏而譌也曰馬者因馬同氣而譌也曰祀以祈蠶者托于皇妃祀先蠶之文也其不經如此至有謂髙辛氏募得犬戎將吳將軍頭以少女娶槃瓠皆此類也狼戾很戾很下懇切狼性多藉其草穢亂故曰狼藉曰狼貪又曰狼戾皆言多也羊性很愈牽愈不進其曰很戾言不順從也狼从犬良聲很从彳艮聲字相近而迥異今言不順從者乃曰狼戾或曰貪很則失之矣彳音尺決明螵蛸各二石決明鰒也似蛤附石而生王莽所啗者菜決明芰也葉黄銳赤華實如山茱萸屈到所嗜者桑螵蛸螳蜋子螳蜋逢木便產唯桑上者為佳陶隠居以為得桑之津氣也海螵蛸烏賊止背上一骨輕虚而白腹中血及膽如墨本草以為生東海池澤者也䗁蟢䗁音豈廣韻䗁長足蟲也說文蠨蛸長股者一名長蚑詩疏長䗁河内人謂之喜母著人衣當有親客至今產子牆壁上䕶以白膜亦有足抱子行者俗謂之喜喜則䗁也西京雜記蜘蛛集而百事喜陸賈云蟢子垂而百事喜李徳裕云人將有喜兆垂於冠冕蜘蛛有三種一種布網簷端一種絡幕草上俱蒼黒色一種小而微紅謂之蟢蛛則蟢也郭璞以小蜘蛛長脚者為蠨蛸是猶未辨蜥蜴蝘蜓說文在草曰蜥蜴在壁曰蝘蜓爾雅疏在草澤中者名蠑螈蜥蜴在壁名蝘蜓守宫蜥蜴又名蛇醫又曰龍子其色青紺長二三尺守宫又名蝎虎灰色大如指夷堅志劉居中至嵩山嶺有大蜥蜴數百就水飲纔入口即吐雹圓結如彈丸忽雷震彈丸皆失去故人用以禱雨蜥蜴龍子理或然也顔師古曰守宫術家以器養之飼以丹砂滿七斤擣治萬杵以㸃女子臂終身不滅有房室之事則滅矣劉邠曰守宫生屋壁如守宫然故名之何在防淫佚也邠此言是矣儒行篇宫牆垣也蝘蜓常居牆垣之中若守然東方朔􅀈􅀈胍胍善縁壁是也𤨏􅖜水母郭景純江賦𤨏􅖜腹蟹水母目鰕松陵集注𤨏􅖜似蜯有一小蟹在腹中為𤨏􅖜出求食或不歸𤨏􅖜餒死淮南人呼為蟹奴廣韻水母名􅜽形如羊胃無目以鰕為目嶺表録水母腹下有物如絮謂之足而無口眼常有數十鰕寄腹下捕者或遇之即沈乃是鰕有所見耳一名䖳又名摴蒱魚又名海靼二物者亦異矣蝍蛆蜈蚣蚿爾雅蒺藜蝍蛆郭璞云似蝗而大腹長角能食蛇腦莊子蝍蛆甘帯是也埤雅蝍蛆蜈蚣今俗謂之百足魯連子百足之蟲三斷不蹶是也韻㑹馬蚿蟲百足似蜈蚣而小尤多脚不能毒人莊子蚿憐蛇是也按蒺藜茨也爾雅以為蝍蛆不可曉或亦以果蠃為蒲盧之類郭璞以蝍蛆似蝗非食蛇唯蜈蚣為然埤雅以為蜈蚣是廣韻帶蛇别名亦非帯腦也中州人謂頭為腦帯莊子謂甘帶即郭璞所謂食蛇腦也蜈蚣謂之百足蚿亦謂之百足鷄尸蚌兩史記蘇秦說韓宣惠王曰寧為鷄口無為牛後戰國䇿作鷄尸牛從戰國䇿蘇代語趙惠王曰鷸曰今日不雨明日不雨即有死蚌蚌亦謂鷸曰今日不出明日不出即有死鷸陸農師讀雨作兩秦稱牛後者將激其怒而從也史記為是鷸知天將雨鳥也雨即解去戰國䇿為是桂蠧漢成帝紀桂蠧花不實文帝紀賜尉佗書衣服使者獻桂蠧一器東方朔七諫桂蠧不知所淹留兮大業拾遺録桂蠧紫色有香噉之已隂痿之疾按桂蠧桂樹中蝎蟲食桂味辛蜜漬之可食成帝紀桂蠧謂桂有蠧後三言桂蠧皆指蝎蟲言此亦可見桂有實鎻陽五靈脂紫稍花輟耕録韃靼田地野馬或與蛟龍交遺精入地乆之發起如笋上豐下儉鱗甲櫛比筋脈連絡其形類男隂名曰鎻陽五臺山有鳥名號寒蟲四足肉翅不能飛盛夏文采絢爛自鳴曰鳯凰不如我深冬毛羽落索然如鷇雛又自鳴曰得過且過其糞五靈脂秇林伐山龍生三卵一為吉吊上岸與鹿交或在水邊遺精流槎遇粘裹浮木枝如蒲桃焉號紫稍花道樞謂之龍鹽如所云則三物亦希有矣有或贗也音聲木鸂鶒灘因話録唐尚書省南門有古槐垂隂甚廣相傳夜深聞絲竹之音省中即有入相者謂之音聲木劇談録河南府尹闕前臨大溪每僚佐有入臺則水中先有小灘漲出牛僧孺為縣尉忽報灘出邑宰與同僚往觀之有老吏云此必分司御史若是西臺灘上當有一雙鸂鶒俄鸂鶒飛下不數日拜西臺御史由此則人之出處當有定也螽爾雅䘀螽蠜草螽負蠜蜤螽蚣蝑蟿螽螇蚸土螽蠰谿厥類有五蠜蝗也一生八十一子或云九十九子信㝛即飛周南螽斯是已負蠜大小長短如蝗奇音青色好在茅草中因謂之草螽蚣蝑長而青色長角似股以股鳴者也詩五月斯螽動股毛鄭誤以釋螽斯螇蚸似蚣蝑而細長飛翅作聲蠰谿一名蚱蜢似蝗而小善跳䘀或謂即草蟲因其多子故詩人取喻也䘀音負蠜音凡蜤音斯蚣音嵩蝑音胥蟿音契蚸音厯皮革生曰皮理之曰革柔之曰韋柔之不均謂之􅀈􅀈音虧十四物取義贔屭形似龜性好負重故用載碑螭􅀈形似獸性好望故立屋角上徒牢形似龍而小性好吼有神力故懸於鐘上憲章形似獸有威性好囚故立於獄門上饕餮性好水故立於橋所蟋蜴形似獸鬼頭性好腥故用於刀柄上􅀈􅀈形似龍性好風雨故用於殿脊上螭虎形似龍性好文彩故立於碑首金猊形似獅性好火烟故立於爐蓋上椒圖形似螺螄好閉口故立於門上今呼鼓了非也虭蛥形似龍而小好立險故立於䕶杇上鰲魚形似龍好吞火故立於屋脊上獸吻形似獅好食隂邪故立於門鐶上金吾形似美人首魚尾有兩翼性通靈不睡故用巡警見菽園雜記得之倪村民家雜録中必博雅者有所采也其曰螭虎亦不免訛耳恐訛亦不止此云鴟鴞爾雅鴟鴞鸋鴂按鴟鴞惡鳥鸋鴂小鳥即鷦鷯也二鳥本不同蓋誤也正名曰鴟鴞分言之或曰鴟或曰鴞又或作梟有三種一種茅鴟似鷹而白有冠一名鵵一名鵟今未知為何鳥一種恠鴟又分二種一似鷹性嗜䑕俗名夜食鷹頭圓而有耳俗又名猫兒頭即鵂鶹也曰角鴟曰鵋䳢曰鴝鵒曰訓狐曰姑獲皆其名也一似黄鸝背有文如鋤雄鳴扛雌鳴孔俗名快扛即鵩也曰鶂曰鶹離曰鬼車曰車截板曰九頭鳥皆其名也二鳥晝伏夜見鳴則凶一種梟鴟又名土梟少好長醜大則食其母日至捕磔之以頭挂木上因謂挂首為梟亦未詳其形似或云即鵂鶹也名義考卷十
