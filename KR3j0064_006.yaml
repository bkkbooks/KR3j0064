body:
  text: 名義考卷六目録人部角羈于思踑踞胼胝皸瘃溲膏肓臄齶青白眼夢龍鍾潦倒顔面夸毗籧篨戚施欠伸扶寸上頭半面輔車睢盱睚眦身重揖拜跪唱喏醋大首䑕章首啟處委質惡臭瞽瞍叩首叩頭如柴如泥九畆兩觀詞辭辤嗚呼烏烏咄咄翹材𤓰葛葭莩肺附病力力疾入月不月休假物故登假大行婚姻絶句員把麻貳乃辟古人逸名名非用之字書翰刀筆折簡疊幅數借用字御尚儲胥多古祗字寜馨阿堵行李能為臚句鴻臚欽定四庫全書名義考卷六明周祈撰人部角羈記剪髮為鬌男角女羈注夾囟曰角雙髻也午達曰羈三髻也鬌音柁囟音信于思左傳于思于思棄甲復來注于思多鬚貌按廣韻䯱䰄多鬚也作不思于當是不之訛䯱音丕踑踞踞蹲也踑亦踞也晉書南越踑踞一説踑踞大坐也張耳傳髙祖箕踞師古曰伸兩足狀如箕此因箕生義不知箕本作踑胼胝皸瘃胼音楩胝音之皸音均瘃音捉胼胝皮厚也人勤苦則手足皮厚李斯傳禹手足胼胝墨子重繭而不休息繭本作趼亦胼胝意皸凍裂也瘃寒瘍也寒甚之病李甘傳凍膚皸瘃莊子不龜手之藥龜與皸同趼音繭龜音均溲溲音小廣韻溲先了切便溺也此即小便溲字後人借作小也東方朔傳小遺殿上注小便也張湛傳遺失溲便注溲小便也朔傳以小作溲猶以矢作􅧚古字假借者多有之湛傳溲便是本字注者讀作疎鳩切云溲小便也則失之矣疎鳩切與所九切皆訓沃也水調粉麵也以溲為小便因以􅧚為大便可笑也溺與尿同􅧚與屎同膏肓肓音荒左傳居肓之上膏之下若我何按説文肓心上鬲下也膏毋即所謂鬲與臄齶臄音却齶音愕臄説文口上阿也通俗文云口上曰臄口下曰函校獵賦注口中之上下曰臄齶廣韻口中齗齶梵書作謂齒内上下肉也是臄者通指口中之上下分之則上為臄下為函齗通指齒根之内外分之則内為齶齗音銀青白眼阮籍能為青白眼母死嵇喜來吊籍作白眼弟康齎酒挾琴造焉籍大悦乃見青眼故後人有青盼垂青之語人平視睛圓則青上視睛蔵則白上視怒目而視也夢説文夢寐而覺者也覺謂有知周禮六夢一正夢二噩夢三思夢四寤夢五喜夢六懼夢又太卜三夢一致夢二觭夢三咸渉列子隂氣壯則夢渉大水而恐懼陽氣壯則夢入大火而燔焫浮虚為疾者則夢揚沉實為疾者則夢溺莊子夢飲酒者旦而哭泣夢哭泣者旦而田獵文中子曰至人無夢佛者曰攝心無寐無夢則可無寐則非龍鍾潦倒湘素雜記古語有二聲合為一字者如不可為叵何不為盍從西域二合之音切字之元也龍鍾潦倒正二合之音龍鍾切癃字潦倒切老字欲言癃欲言老即以龍鍾潦倒言之後有釋者皆不得其義而臆説也顔面説文顔眉目之間也增韻頟角曰顔方言湘江間謂之中夏謂之頟東齊謂之顙汝潁淮泗之間謂之顔説文面顔前也象人面形今人顔面通一面而言更不復分别音氊額俗作額夸毗夸音誇毗音脾爾雅夸毗體柔也按夸毗本作䠸􅀈以體柔為訓朱子釋詩無為夸毗曰夸大毗附也言小人不以大言夸之則以䛕言毗之失䠸􅀈之意矣爾雅猶足據也籧篨戚施爾雅籧篨口柔也戚施面柔也説文籧篨粗竹席曹氏曰竹席之為用常仰而不能俯口柔之人視人顔色以為辭常仰面於人因名為籧篨戚施本作􅀈䙾廣韻􅀈面柔也説文䙾司人也司與伺同愚謂􅀈从見尗聲亦伺也今巡緝字當作􅀈廣韻亦誤釋蓋面柔者必低首下人媚以容色有似於伺人者故曰􅀈䙾詩作戚施古字通用欠伸禮記君子欠伸欠張口氣悟也今言呵欠伸舒也今言伸要手足亦然亦作申論語申申如也又作信莊子熊經鳥信蓋人志倦則欠體疲則伸扶寸記投壺堂上七扶室中五扶注舖四指曰扶通作膚公羊傳膚寸而合注側手曰膚案指曰寸上頭女子笄曰上頭花蕋夫人宫詞年初十五最風流新賜雲鬟使上頭娼家處女初薦寢於人亦曰上頭俗謂梳櫳言上頭須梳櫳也半面今人謂曽相識曰半面之雅漢應奉少時詣彭城相袁賀賀出閉門造車匠於内啟扉出半面視奉後數年遭於道奉識而呼之至今云半面或云一面也輔車左傳輔車相倚注輔夾輔也車牙車也輔乃車兩旁木所以夾車者其字从車人頰骨似車輔故曰輔車左右相待故曰相倚頰音刼睢盱睚眦睢隳位二音盱音吁睢仰目也盱張目也睢盱小人喜悦貌恣睢暴戾也漢五行志恣睢者衆荀彧傳負功恣睢盱衡眉上曰衡王莽傳盱衡厲色又莊子睢睢盱盱則元氣也睚眦舉目相忤貌范睢睚眦之怨必報眦亦作眥孔光傳睚眥莫不誅傷左雄疏髠鉗之戮生于睚眦身重婦人懐姙曰娠通作身詩大任有身注云重也箋云重謂懐孕也今人亦曰有身或曰身重揖拜跪手與胷平為揖詩詁推手曰揖引手曰厭推手手與胷離也厭則着手於胷首與要平為拜荀子平衡曰拜平衡謂磬折正首與要平兩膝屈地危隉為跪説文跪拜也周禮大祝九拜以首至地曰稽首以首置地曰頓首不至地曰空首恐悚蹙迫而下手曰振動雍容而下手曰吉拜泣血而下手曰㓙拜拜不再拜曰竒拜答拜曰褒拜直身肅容而㣲下手曰肅拜凡言下手與首不至地是立而拜稽首頓首非跪不能拜竒拜褒拜兼跪立二者故跪亦曰拜稽首即稽顙鄭康成曰拜而後稽顙曰吉拜稽顙而後拜曰㐫拜婦人吉事肅拜㓙事手拜肅拜即九拜之肅拜手拜以首至手又謂拜手婦人古無屈膝而拜者有則自武后始也厭音壓隉音臬唱喏喏音惹左傳使訓羣騶知禮注騶喏喝聲也喏玉篇敬言也喝訶也貴者將出唱使避已故曰唱喏亦曰鳴騶即孟子行辟人也今俗謂揖曰唱喏不可曉醋大資暇録云世稱士流為醋大言其峭酸冠四民之首此説得之猶言酸子也或云衣冠儼然比於醋更釅或云能措置大事皆非新鄭志謂邑有醋溝溝東多甲族又以為彼邑之事恐未然首䑕章首灌夫傳首䑕兩端吳越春秋章首傽偟也俗云麞頭蓋䑕性疑出穴多不果一前一却麞膽怯飲水見影輒奔走道書麞鹿無魂啟處委質詩不遑啟處左傳䇿名委質啟處跽也長跪也兩膝着地而立身委質屈膝也拜則屈膝而委身於地跽音起惡臭大學如惡惡臭惡今但以穢惡為義顔師古曰惡即矢也昌邑王傳如是青蠅惡矣越王勾踐為吳王嘗惡皆指言矢矢本作􅧚俗作屎借作矢猶溲借作小也瞽瞍鄭云無目眹謂之瞽有目無眸子謂之瞍按眹兆也無目眹謂目上下相合漫無兆域若鼓皮然故曰瞽説文瞽目但有眹也非是瞍即今青盲目上下開有眹而無珠子故曰有目無眸子詩所謂矇瞍也眹音引叩首叩頭叩首以手至首也所謂舉手加額也叩頭以首至地也所謂頓為叩地也叩一也首與頭一也而其辨如此如柴如泥今人謂瘦甚曰如柴醉甚曰如泥埤雅曰柴豺也豺體細瘦謂之豺棘人骨立謂之柴毁豺柴通小説南海有蟲無骨在水中則活去水醉如一塊泥因名泥人醉則肢體軟如泥蟲然九畆兩觀史記禹致羣臣於會稽之山防風後至禹殺而戮之身横九畆司馬法六尺為步步百為畆防風亦人耳何至如是之大戮辱也九畆地也殺而辱之陳尸於九畆也猶肆諸市朝之意家語載孔子誅少正夘事世曰兩觀之誅夘行僻而堅記醜而博罪非死比也攝相七日而誅之毋乃過乎朱子嘗致疑矣予按兩觀即闕以觀雙植謂之兩觀以記教令謂之冀闕古者刑人於市兩觀豈市耶誅責也周禮宰夫以告而誅之是也故責人之隱曰心誅宰予不足責曰於予與何誅則正夘兩觀之誅或是當時列其罪狀於兩觀使人無效尤也詞辭辤詞説文音内而言外徐氏曰語之助也聲成文謂之音詞不出於音故曰音之内為音之助故曰言之外辭説文辭訟也通論曰理也辛辠也理辠為辭辤説文不受也受辛宜辤也三字義異今人辭訟之辭作詞言詞之詞作辭又以辭為辤受之辤雖經史亦循用古辭字辠古罪字嗚呼刋謬正俗曰嗚呼歎辭也或佳其美或傷其悲古文作於戲其義一也後人于哀誄祭文用嗚呼于封拜册命用於戲謂嗚呼為哀傷於戲為歎美詩於乎小子未知臧否是傷也書嗚呼威克厥愛允濟是歎美也何所分别乎烏烏咄咄咄讀若篤李斯彈筝拊髀而呼烏烏楊惲仰天拊缶而呼烏烏蓋烏見異則噪烏烏必秦中舊有此曲歎所異也斯下吏惲失爵位皆自以為異云殷浩終日書空作咄咄恠事四字咄咄驚恠聲浩山桑之敗心不能平故自驚恠如此髀音粃惲音藴缶音可否之否翹材説文翹尾長毛也又翹翹髙也翹材者猶言長才髙才也𤓰葛葭莩肺附𤓰葛蔓延相及屬之綿逺者云𤓰葛王導嘗與其子奕爭道導笑曰相與𤓰葛葭蘆也莩蘆中白也雖薄而不相離親之薄者云葭莩中山王傳非有葭莩之親肺附言肝肺相附着通屬籍託心膂者云肺附劉向傳臣幸得託肺附病力力疾汲黯傳今病力謂病甚也杜詩力疾坐清曉謂雖病而勉強之意入月不月女子天癸謂之月事以時下曰入月王建宫詞宻奏君王知入月過時不下為不月内經女子不月休假孟康曰古者名吏休假曰告漢法在官連有三最則予告病三月賜告予告得歸賜告不得歸至成帝時賜告亦得歸和帝賜予皆絶師古曰請休或謂之謝謝亦告也又漢律吏五日一休休言休息以洗沐也亦曰休澣今稱日曰上澣下澣者以此又謂之急晉令急假者五日一急一年以六十日為限曰取急請急長假併假今稱給假非李裴曰休謁之名吉曰告㐫曰寜陳忠傳光武絶告寜之典是休假始絶於光武再絶於和帝也今制内臣得告病外臣否正旦放假餘月否物故蘓武傳物故師古曰謂死也言其同於鬼物也魏臺訪問物故之義髙堂隆答曰物無也故事也言死者無所復能於事二説俱未得蓋人亡則物故不忍直言之也登假大行假作遐行下孟切曲禮告喪曰天王登假注假已也楚辭載營魄而登霞兮注霞與遐同猶言逺適云耳楚辭注是或謂霞赤黄氣莊子作登假釋音讀假為格俱非周書曰謚者行之跡是以大行受大名細行受細名風俗通皇帝新崩未有定謚故總其名曰大行皇帝此說是漢書音義作何庚切曰禮有大行小行人主諡號韋昭曰大行者不在之辭皆非也婚姻禮記疏壻曰婚妻曰姻詩疏婦黨為婚兄弟之黨為姻杜預曰妻父曰婚壻父曰姻字林婚婦家姻壻家諸説不同説文婚婦家也禮記娶婦以昏時故曰婚姻壻家也女之所因故曰姻説文是字林如説文杜預説為近絶句絶句謂句絶而意則相承如栁宗元千山鳥飛絶四句是也若兩箇黄鸝一行白鷺之句則句絶而意亦絶矣或云絶取八句律之四句或云絶妙之句皆非也員説文員物數也徐氏曰古以貝為貨故數之字从具猶言一錢二錢也增韻入官數也今官曰官員生曰生員吏曰吏員皆以數為言也把麻唐六典通事舍人多不知書至宣詔多失句讀拾遺低聲以助之謂之把麻麻黄白麻也把持也把持之使無失也貳乃辟左傳䇿名委質貳乃辟也狐突謂其子既己臣矣不可貳也貳則不忠莫大焉是天下刑戮之民也故曰貳乃辟又曰父教子貳何以事君辟乃刑辟之辟非違辟之辟注謂不可以貳心辟罪殊非古人逸名索隱孤竹君本墨台氏殷湯所封孤竹君名初字子朝伯夷名元或作允字公信叔齊名智或作致字公達夷齊其謚也帝王世紀漢太上皇名煓字執嘉相經云吕公名文字叔平荀悦漢紀壺闗三老姓令狐名茂陳留志東園公姓唐字宣明夏黄公姓崔名廣字少通甪里先生河内軹人姓周名術字元道惟綺里季姓名無傳或曰綺里季夏一人即崔廣也惟黄公名無傳古人傳記中無名者史氏偶未之及耳後來别見他書必有所承非盡杜撰也名非用之字潁川語小曰左氏云介之推燭之武二之字非名也特語助也荀悦云髙祖諱邦之字曰國恵帝諱盈之字曰滿文帝諱恒之字曰常此之字非語助示兒編曰之字訓變謂君諱臣下所避者變以相代也諱邦變國字以代之如左傳遇觀之否謂變觀為否也今以盈之恒之為名而以滿常為字益非矣書翰刀筆古者用羽翰為筆以書故曰書翰刀以削簡牘吏以刀筆自隨故曰刀筆今人直以翰為字以刀為深文殺人失古人命名之義矣折簡疊幅王凌面縛水次遥謂司馬宣王曰卿直以折簡召我我何敢不至折簡猶今拜帖盧光啟受知於張濬每致書凡事别為一紙謂之疊幅疊幅猶今副啟數借用字一二三四五六七八九十百千万此數本字也文省易縁為奸文移家以専壹之壹代一以副貳之貳代二以參錯之參代三以矜肆之肆代四以什伍之伍代五以水陸之陸代六以膠㭍之㭍代七以捌破之捌代八以瓊玖之玖代九以攟拾之拾代十以南北之阡代千以東西之陌代百以蜂萬之萬代万不知起自何時左傳萬盈數漢書阡陌之得相承已久俗呼本字為小借字為大可笑即文移家户口錢糧當用借字款目次第猶當用本字為是㭍俗桼字御尚凡天子所止謂之御前曰御前書曰御書服曰御服皆取統御四海之義又尊者謂之御卑者謂之服御前言臣下所進御也凡主天子之物皆曰尚主醫曰尚醫主食曰尚食主文書曰尚書尚書之尚陸音常又娶公主謂之尚言帝王之女尊而尚之不敢言娶又司馬相如傳卓王孫自以使女尚司馬長卿注尚配也儲胥長楊賦搤熊羆拖豪豬木􅀈槍櫐以為儲胥此天下之窮覽極觀也注木槍相櫐以為柵也儲胥舘名按雄以上田獵失時農民不得收歛而賦此何得方言田獵而遽及於宫舘蓋謂所獲之獸如木之􅀈如槍之櫐可為乾豆可充君庖儲之以待需故曰以為儲胥也斯於上下文義相承多古祇字論語多見其不知量也左傳多見疏也二多字乃古祗字與詩祗自底兮之祗同適所以之辭今讀為多寡之多非甚寧馨阿堵寧音寗馨音亨王衍神情明秀總角時見山濤濤曰何物老嫗生寜馨兒宋廢帝性㐫悖母疾篤召之不往母恚曰持刀來破我腹那得生此寧馨兒寜馨猶言恁地也又衍嫉妻貪鄙口不言錢妻以錢遶床晨起謂婢曰舉此阿堵物去顧凱之每畫人成或數年不㸃睛曰傳神寫照正在阿堵中李耕之女奴却要美容止長子欲蒸之詒曰可於東南隅相待少頃燃炬豁扉照之曰阿堵貧兒爭敢向這裏宿阿堵猶言這箇也嫗音遇恚音畏行李李濟翁資暇録謂古文使字誤以為李行李當作行使黄直翁謂行李本作行理古文李與理通皆謂使人李説近竒而黄説為是左傳僖三十年行李之往來共其乏困襄八年亦不使一介行李告於寡君用李字昭十三年行理之命無月不至國語行理以節逆之用理字管子書大理亦作李可見理李通用理治也行理行而治事者也因謂行槖曰行理能為説文能熊屬足似鹿獸之堅中而彊壯者故謂人強幹曰能為母猴其為禽好爪有作造之意故凡作造曰為臚句鴻臚叔孫通𫝊大行設九賔臚句𫝊蘓林曰上𫝊語告下為臚下告上為句百官表典客更名大鴻臚韋昭曰鴻大也臚陳序也欲以禮大陳序賔客也是臚一以𫝊語告下一以陳序賔客為義今鴻臚寺其職也在𫝊語其聲大在陳序其儀大故總謂之鴻但臚音閭在魚韻今讀作盧音非唐和逢堯𫝊攝鴻盧卿并字作盧尤非然臚从肉廬省聲説文皮也故籀文作膚名義考卷六
