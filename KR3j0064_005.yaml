body:
  text: 名義考卷五目録人部姓氏族國家縣官黔首蒼頭黃耇台背府君家公主臣鼻祖耳孫阿翁姑章賤息子姓丈夫丈人大夫夫人先生太夫人伯仲叔姪昆玉稿椹娣姒孩咳誕日初度六尺之孤公卿黃閣內閣特進開府尚書台鼎黃門都堂太史三法司翰林院察院鳯凰池玉筍班龍虎榜守令蓮幕稗官古官名陪臣陪儓承學不速之客臧獲厮養輿臺奚奴胥靡餘胥皂卒五百官銜官聨寮當家駔儈日者風角四凶三苖九夷突厥單于可汗閼氏屠耆居次小幼乃表虔婆營婦􅏠拉姑生旦淨丑鬝俚欽定四庫全書名義考卷五明周祈撰人部姓氏族天子賜姓命氏諸侯命族姓者所以繫統百世使不别氏者所以别子孫所出族者氏之别名也朱子吕伯恭雖嘗有辨亦誤認氏為姓如黃帝公孫姓此百世不别者也少昊黃帝子已氏顓頊黃帝孫姬氏此别子孫所出也又如魯姬氏黃帝後亦公孫姓無駭以字為展氏因以為族楚芈氏亦黃帝後亦公孫姓屈景昭為三族又謂之三閭此族者氏之别名也天子之後别以氏所謂胙之土而命之氏也諸侯之後别以族所謂官有世功則有官族也後世氏族通謂之姓而曰姓某氏史記黃帝二十五子其得姓者十四人即司馬遷亦不免誤况其後乎芉音米國家縣官漢官儀封禪記詔百官以次下國家隨後明日太醫令問國家起居國家曰不勞東平王傳今暑熱縣官年少霍光子禹傳縣官非我家將軍不得至是曰國家曰縣官皆謂天子也漢書中如此稱甚衆又蔡雍獨斷曰天子無外以天下為家稱天家廣記云五帝官天下三王家天下稱官家猶言帝王也資暇集云至尊以天下為宅四海為家又曰宅家黔首蒼頭秦本記更名民曰黔首祭義疏謂以黑布覆首謂之黔首戰國䇿魏蒼頭鮑彪注謂以青帕首項也又漢名奴亦曰蒼頭黔首則自唐虞以來所謂黎民也亦曰黔黎黃耇台背耇老夀也黃耇老人面色黃也台鯸鮐河豚也其背青老人背色若鮐也詩注謂黃為黃髮耇為凍梨爾雅疏謂燕代北鄙謂耇為梨説文又謂老人面梨若垢諸説似牽強舍人曰老人氣衰皮膚消瘠背若台魚此亦是以意釋不實知鮐者也鮐背豐滿但青黑耳鯸音侯鮐音胎耇音茍府君家公朱子曰府君漢人碑已有之只是尊神之辭如言官府之君列子云家公執席二者皆父稱也家公稱於存時府君稱於亡日主臣史記陳丞相世家漢文帝問陳平一嵗決獄錢穀幾何平曰有主者上曰而君所主者何事也平謝曰主臣馮唐傳文帝聞廉頗李牧為人良曰嗟乎吾獨不得廉頗李牧時為吾牧吾豈憂胸奴哉唐曰主臣魏志魏武謂陳琳曰卿為本初檄何乃上及父祖琳謝曰主臣馬援龍虎賦勇怯見之莫不主臣文選任昉奏彈曹景宗先敘其罪後繼之曰景宗即主臣景宗又彈劉整亦曰整即主臣齊沈約彈王源文亦然主臣前人多用之解者皆不得其義孟康曰主羣臣也韋昭曰主臣道不敢欺也張晏曰惶恐也文穎曰猶今言死罪樂彥曰猶上書前言昧死晉灼曰主擊也臣服也言其擊服惶恐也孟韋之説非是張晏以下亦鮮的見按古文臣作臣如人伏地也説文臣擊也事君也象屈服之形蓋人臣對君不容不惶恐不屈服也主臣是一於惶恐屈服之意惶恐乃驚怖非慚愧也上表者云誠惶誠恐是驚怖稽首頓首是屈服知此則死罪昧死惶恐擊服之義皆在其中然史記魏志龍虎賦所云主臣意在驚怖文選所云主臣意在屈服賈子曰主臣禮之正也斯言得之矣鼻祖耳孫鼻祖始祖也方言梁益謂鼻為祖獸之初生其鼻先見故謂鼻為祖耳孫玄孫之曾孫也顔師古曰耳孫諸説不同據平帝紀及諸侯王表昆孫之子耳孫耳音仍則耳仍一也為昆孫之子來孫之孫玄孫之曾孫或云唯耳可得聞非是阿翁姑章賤息子姓阿翁父也方言周晉秦隴謂父曰翁廣韻翁鳥頸毛也老人頸毛白而疆短若此鳥也善見律翁親則謂祖是父祖皆可稱翁姑章姑也廣川王傳皆尊章師古曰尊章猶言尊姑也或曰舅姑為尊章章本作嫜杜詩何以拜姑嫜又釋名兄公亦曰兄章舅公亦曰舅章息生也子女皆可稱息左師觸龍曰賤息舒祺東觀漢紀此蓋我子息是子稱息吕公見劉季曰僕有弱息願為箕帚妾是女亦稱息子姓孫也玉藻注姓生也孫是子之所生故謂之子姓今人稱尊貴者曰翁稱壻曰姑章稱婦曰息婦息又從女稱子姪輩曰子姓是殆未之考也丈夫丈人大夫夫人丈夫詩疏有傅相之德而可倚仗丈人師古曰嚴莊之稱凡親而老者皆稱焉此丈夫丈人之義也又十尺曰丈古一丈得今六尺六寸丈夫丈人以身長言也而倚仗嚴莊之義在其中大夫白虎通曰扶達於人者也夫人曲禮注扶持於王者也此大夫夫人之義也又夫本作夰從人一象簪也男冠女副皆須簪焉男女皆可稱夫也而扶達扶持之義在其中先生太夫人今尊貴者人稱曰先生則怒稱其母曰太夫人則不以為怪論語曰有酒食先生饌韓愈進學解招諸生弟子事先生于兹有年矣一則為父兄一則為師何怒也漢文紀注列侯妻稱夫人列侯死子復為列侯乃得稱太夫人是太者父亡母存之號今制猶然奈何稱者見稱於人者不論人父與父存否率以太為尊稱不可怪乎伯仲叔姪伯仲兄弟之稱詩伯氏吹塤仲氏吹箎次仲者為叔詩叔兮伯兮次叔者為季書仲叔季弟姪對姑而言爾雅女子謂晜弟之子為姪狄仁傑云未聞姪為天子而祔姑於廟者此則古人稱伯仲叔姪之義也今人謂父之兄弟曰伯叔謂兄弟之子曰姪皆舛也父之兄弟當曰伯父叔父爾雅父之晜弟先生為世父後生為叔父是也兄弟之子當曰猶子檀弓兄弟之子猶子也或曰從子朱子語録漢人謂姪為從子却得其正是也晜與昆同箎音池昆玉謂兄弟曰昆玉者蓋錯舉金昆玉友之文也兄弟何以謂之昆友昆本作罤周人謂兄曰罤從眔沓弟為罤今猶云沓肩兄弟通作昆詩謂他人昆是也説文友從二又相交徐氏曰二手相順也友有相左右之義兄弟如左右手故謂兄弟為友晏子兄愛而友是也金玉言其貴重耳罤與晜同眔音沓稿椹古樂府稿椹謂夫也古有罪者席稿伏於椹上以鈇斬之言稿椹則兼言鈇矣鈇與夫同音故隱語稿椹為夫也稿禾稈椹斫木櫍俗作砧鈇斧也椹與砧同櫍音質娣姒爾雅長婦謂稚婦為娣婦娣婦謂長婦為姒婦即今妯娌自以其年為長幼耳廣雅娣姒之名從身長幼左傳穆薑謂聲伯之母為姒叔向之嫂謂叔向之妻為姒二者皆呼夫弟之妻為姒不從夫之齒也孩咳咳音孩廣韻孩小兒將學語時能鼓頷也莊子未致乎孩而始誰是也説文咳小兒笑聲禮記咳而名之是也孟子孩提之童注知孩笑是以孩作咳也扁鵲傳咳嬰之兒又禮記孩蟲皆以幼小為義一曰咳古文作孩頷音含誕日初度今人謂生辰曰誕日又曰初度詩曰誕彌厥月傳誕大也謂大矣后稷之在母終人道十月而生今曰誕日則是大日降誕則是降大矣離騷經曰皇覽揆豫於初度兮肇錫豫以嘉名注初度猶言初節也古者子生三月父名之謂命名之初節也非謂生也今自幼而壯而老皆云初度是期頤皆三月時矣其謬誤有如此者六尺之孤周禮國中自七尺以及六十野自六尺以及六十有五皆征之韓詩外傳曰國中二十行役是七尺二十嵗也其升降皆以五年為率則六尺十五嵗也孟子五尺之童十嵗也公卿背私為公有制為卿公之為字八背也某私也背私則可以為公矣卿之為字卯事之制也有制則可以為卿矣知二字之義則公卿之職舉人其顧名而思義哉八音背某音私卯音賫黃閣內閣按唐門下省以黃塗門謂之黃閣明興罷中書省永樂初以解縉等七人直文淵閣謂之內閣則是黃閣為閨閣之閣從合爾雅小閨謂之閣漢文翁傳出入閨閣公孫𢎞傳開東閣皆謂門也內閣為庋閣之閣從各內則天子之閣左達五右達五漢宫殿疏騏驎天祿等閣皆謂重屋也又唐制天子日御前朝見羣臣曰常參朔望薦食陵寢有思慕之感御便殿謂之入閣唐志中書舍人以久次者一人為閣老制本省雜事二閣字皆從合今輔臣延登曰入閣稱謂曰閣老二閣字皆從各名雖同而義則異庋音几特進開府特進自漢宣帝以許廣漢為平恩侯位特進始開府自安帝以鄧隲為開府儀同三司始魏晉以特進為加官隋唐以為文散官宋以特進居文官之首大觀著令非宰臣不除今制亦以為散官文武之穹階也宋太宰以下至光祿大夫開府者為文公大司馬以下至諸將軍開府為武公梁位次三公唐以為文散官雖三公三師亦必冠以此號宋改唐節度使為使相亦稱開府今巡撫私稱開府者本使相之遺意也尚書今曹郎自署銜曰尚書某部郎何謬也夫尚書秦官在殿中主發書漢置尚書令二有尚書僕射有尚書成帝初分常侍曹二千石曹民曹南北主客曹五曹曹又置尚書及左右丞侍郎光武改常侍曹曰吏部增都官曹為六曹魏為吏部左民客曹五兵度支五曹晉為吏部三公客曹駕部屯田度支六曹隋為吏民禮兵刑工六部唐改民部曰户部部各總四司以本司為頭司餘為子司亦謂之部如金部祠部之類六部迄今因之自漢以來曰尚書臺或曰中臺宋曰尚書省北齊謂之都省省有尚書令六部有尚書子部有郎是六尚書者皆𨽻尚書省故曰尚書某部也今則異於是矣如之何古之襲也台鼎後漢郎顗傳三公上應台階彭宣傳三公鼎足承君此台鼎之稱也周禮大宗伯疏上台司命為太尉中台司中為司徒下台司祿為司空晉天文志曰在人曰三公在天曰三台主開德宣符也環濟要略云三公者象鼎三足共承其上也台鼎之義如此黃門今給諌有稱黃門者以唐諫議大夫𨽻門下省開元間改省為黃門省之故不知漢唐以來中書門下二省間雜奄人為之大抵黃門謂奄人也漢輿服志禁門曰黃門中人主之故曰黃門百官公卿表中書謁者令中黃門屬焉師古曰黃門謂奄人居禁中給事者也佛書優婆娑論般荼迦注此云黃門謂去勢及天奄者若以開元改省之故諫議與侍中自異以諫議以來中黃門內給事之故彼皆奄人也都堂唐制尚書省都堂居中左右分司堂東有吏户禮三行每行四司左司統之西有兵刑工三行每行四司右司統之凡二十四司分曹共理今巡撫俗稱都堂無謂太史秦漢以來太史之任兼成周太史馮相保章三職以著述為事而兼掌星厯司馬談父子所職是也至宣帝時著述以他官領之太史惟知占候而已唐為司天臺宋為司天監我朝為欽天監不復稱太史三法司唐百官志凡寃而無告者三司詰之三司謂御史大夫中書門下也六典髙宗武后之際當時大獄以尚書刑部御史臺大理寺推案謂之三司今刑部都察院大理寺為三法司唐制也翰林院唐翰林院在麒德殿西以處天下藝能技術之士學士院𢎞文館集賢院以處文儒玄宗始選有詞藝學識者入居翰林供奉肅宗令掌詔勑始兼學士之名五代晉翰林學士與中書舍人分為兩制宋翰林學士掌內制制勑詔赦國書及宫禁所用文字乘輿行幸則侍從以備顧問今翰林院知制誥及一應纂修與宋同而入閣辦事自𢎞正以來為定制矣察院今都察院即秦漢以來御史臺也唐御史臺其屬有三一曰臺院侍御史𨽻焉二曰殿院殿中侍御史𨽻焉三曰察院監察御史𨽻焉今有監察御史分十三道𨽻都察院而省察院其曰察院者相襲如此非官制也鳯凰池通典中書省地在樞近人因其位謂之鳯凰池按中書尚書為兩省秦有尚書令屬少府漢以大將軍領尚書事以大尉録尚書事權尊重矣漢有中書謁者亦屬少府自武帝始用宦者元帝復委以政事魏以中書典尚書奏事而尚書之權漸減故荀朂自中書監遷尚書令恚曰奪我鳯凰池玉筍班龍虎榜李宗敏知貢舉門生多清秀俊茂唐伸薛庠袁郁輩時謂之玉筍陸贄主試得韓愈歐陽詹賈稜陳羽等皆天下孤俊偉傑之士號龍虎榜今人謂朝班為玉筍揭曉懸龍虎畫於榜前者可笑也守令大郡曰守小郡曰尉大縣曰令小縣曰長秦制也漢初因之如魏尚雲中守趙他南海尉董宣洛陽令陳實太丘長之謂又郡佐亦謂之尉郡守秦以前稱上大夫即州牧侯伯漢名太守唐名刺史宋名知州或加將軍或號持節或𢃄團練防禦或曰總管皆守也治中别駕長史司馬通判皆郡丞也軍事判官防團推官司理司户皆增置亞于丞者也主簿功曹督郵録事參軍曹掾皆郡尉也縣令秦以前稱下大夫即附庸或又稱宰稱尹稱公漢以後俱稱令宋始稱知縣有戍兵則兼兵馬都監押亦有丞尉又增主簿郡守掌治京師曰內史曰尹王國曰相蓮幕齊王儉領吏部用庾杲之為長史蕭緬與儉書盛府元僚每難其選使杲得泛緑水依芙蓉何其麗也時人以儉府為蓮花池今謂幕官曰蓮幕義出此稗官漢藝文志小説出於稗官細米曰稗王者欲知閭巷風俗細碎之言故立稗官古官名古官名姑舉一二人不常知者如挏馬主馬乳酒者鍾官主鑄錢者大誰長主問非常者都船主徼循京師者平凖主錢穀者司商主賜族受姓者將行主宫掖者若盧主弩射者尚方主御刀劍諸好器物者復陶主衣服者率更主刻漏者負弩主亭者督郵主諸縣糾攝者水衡主稅入者遒人主宣令者郵表畷主督約農事者簮裊主飾馬者佽飛主射者剽姚主兵者掌故主故事者鞮鞻氏主夷樂者婕妤娙娥嬪嬙傛華皆女官也中涓黃門皆宦官也陪臣陪儓陪重也陪臣重臣也諸侯之臣於天子曰陪臣陪儓猶陪臣也儓亦作臺左傳僕臣臺方言南楚罵庸賤謂之田臺輟耕録凡婢役於婢者俗謂之重臺重平聲承學承學言學者分門各自承襲其家學如楊何施酬孟喜梁丘賀之徒學易皆祖田何歐陽生大小夏侯勝建之徒學書皆祖伏生翼奉遵后蒼而非韓魯蕭初善賈馬而詆鄭玄儒林傳所謂斯文未陵亦各有承是也不速之客易有不速之客廣韻速徴也猶俗謂請也今折簡云速者正此意臧獲厮養輿臺奚奴風俗通臧被罪沒官為奴婢獲逃亡獲得為奴婢揚雄凡民男而壻婢謂之臧女而婦奴謂之獲張楫壻婢之子謂之臧婦奴之女謂之獲張耳傳厮養卒韋昭注析薪為厮炊烹為養左傳王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺禮奚八人鄭玄曰古者從坐男女沒官其少才智以為奚今侍史女婢也説文奴婢皆古罪人周禮其奴男入於皂𨽻女入於舂藁今人家役使者但可謂之傭王逸云傭厮賤之人前功臣表咸出傭保之中師古曰傭賣功傭保可信任皆賃作者今律謂之雇工人也胥靡餘胥傅説胥靡莊子注刑徒之人以鐵鎖相連繫周公曰憎人者憎其餘胥廣韻須者賤妾之稱古人以婢僕為餘須亦作餘胥皂卒左傳士臣皂方言梁宋齊燕之間謂櫪曰皂因謂賤人直馬者曰皂説文卒𨽻人給事者方言南楚東海之間或謂卒為赬郭璞曰言其衣赤今𨽻卒首與要尚衣赤云赬音蟶五百漢宦者傳越騎營五百妻有美色韋昭曰五百本為伍陌伍當也陌道也言使之導引當道陌中以驅除也唐謂行杖人亦曰五百是五百即今之皂𨽻以除路又以行杖官銜官聨徐氏曰馬銜所以制馬之行也官吏階位亦曰銜者以尊卑相銜所以制百官也徐又曰周禮官府之聨事謂大事非一官所了衆共成之也寮爾雅寀寮官也郭璞曰官地為寀同官為寮無同地為寀之文邢昺曰寀采也采取賦稅以供己有采地及言同寮者皆謂有官者也寮亦作僚説文僚好貌廣韻僚賤稱同官相好曰僚僕臣僚故以為賤稱寮之義如此楊用修謂寮為小忩以齋署同忩為義不知忩竂之竂從穴不從宀説文竂穿也玉篇竂舍也後人遂以竂為忩是窗竂之竂與采寮之寮文既不同義亦自别安得以同窗釋同寮乎寀采俱音菜宀音綿當家奴婢之監知家務者謂之當家或云管家霍光傳愛幸監奴王建詩不是當家頻向説在朝之蒼頭廬兒在官之侍史官婢皆當家也當平聲駔儈駔子朗切儈音會貨殖傳駔儈注會二家交易者如今度市師古曰駔者其首率即今所謂牙行牙本作互以交互為義互與牙字相近因訛為牙行廣韻儈會合市人日者風角日者占候時日者也風角占候四方四隅之風者也四凶帝鴻氏有不才子曰渾沌少昊氏有不才子曰窮竒顓頊氏有不才子曰檮杌縉雲氏有不才子曰叨餮謂之四凶按帝鴻氏繼黃帝而為君縉雲氏帝鴻氏之子與少昊俱去舜三百餘嵗顓頊亦去舜二百餘嵗四凶何若是之夀耶必四氏之後有若人耳非子也渾沌歡兜也窮竒共工也檮杌鯀也叨餮三苖也訓者謂渾沌為不開通窮竒為其行窮其好竒檮杌為頑凶無疇匹貪財為叨貪食為餮不知窮竒獸名狀如牛蝟毛音如嘷狗食人人鬭乃助不直者叨餮獸之嗜食者古者象於彞鼎以為食戒渾沌水不通也檮杌斷木也四凶有似於四者因以目之也檮音陶三苖書傳三苖國在江南荆楊之間地里沿革表潭州古三苖國潭州今長沙蓋建國在長沙而所治則江南荆揚也國中多貓姓九夷九夷東夷也有畎于方黃白赤玄風陽九種箕子之封國俗仁而夀夫子欲居者此也即今朝鮮其字從大從弓重射也男子之所有事也南蠻從蟲地多蛇虺也北狄從犬西羌從羊畜宜犬羊也其不及東夷也有以哉又同謂之夷者猶公侯伯子男通謂諸侯也蟲虺俱音卉蛇一音疑突厥單于可汗突厥北夷國號夏曰獯鬻殷曰鬼方周曰玁狁漢曰丐奴魏曰突厥北夷謂兜鍪為突厥世居金山山形如兜鍪因以為國號單于北夷酋長號北夷謂廣大為單于言主北方象天廣大單于然也可汗于闐王號于闐謂金翅為􅠫鱗黑韓宋封為􅠫鱗黑韓王自稱為黑汗王訛為可汗閼氏屠耆居次閼音焉氏音攴閼氏單于妻號謂可愛如煙支屠耆單于子號謂賢為屠耆居次單于女號猶漢言公主也小幼歌童俗謂之小幼柔曼溢於女德或謂能侑飲為小侑不知幼之名有自來即漢所謂孺也髙之藉孺惠之閎孺皆以婉媚與上起卧藉閎其名孺則幼小而可親慕也三風頑童亦是此輩夃表夃音孤俗謂娼曰表子私娼者曰夃老表對裏之稱表子猶言外婦夃秦以市買多得為夃蓋負販之徒夃老猶言客人虔婆營婦􅏠拉姑􅏠音歪方言謂賊為虔虔婆猶賊婆也營妓古以待軍之無妻者營婦猶軍妻也􅏠不正也􅏠拉俗謂一拉􅏠􅏠拉姑猶不正之婦也生旦淨丑今角戲有生旦淨丑之名嘗求其義而不得偶思樂記及優侏儒獶雜子女注謂俳優雜戲如獼猴之狀乃知生狌也猩猩也山海經猩猩人面豕身聲似小兒啼旦狚也猵狚也莊子猿猵狚以為雌淨猙也廣韻似豹一角五尾又云似狐有翼丑狃也廣韻犬性驕又狐狸等獸迹謂俳優之人如四獸也所謂獶雜子女也末猶末厥之末外猶員外之外其意亦相通獶音撓獮音迷猩音生猵音篇狚音旦猙音靜鬝俚鬝音戞俗謂白秃曰臘梨又曰梅花掐或以白如梨與梅花也不知其字之訛臘梨蓋鬝俚梅花掐蓋梅花鬝也博雅鬝秃也丘八切通作揭明堂位注齊人謂無髮為秃揭俚蠻屬也鬝俚猶言秃蠻也梅花鬝猶言白鬝也鬝與臘掐聲相近俚梨亦聲相近遂訛也説文􅝋秃也苦骨切法華經􅝋瘦注􅝋口轄切􅝋與鬝一也説文切是法華注妄讀作臘音矣掐音恰名義考卷五
