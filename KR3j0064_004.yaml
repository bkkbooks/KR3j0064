body:
  text: 名義考卷四目録地部菑畬街階祴濫觴濫竽陽溝州郡府縣四十雙衙門康衢擊壤端門掖門五鳳樓濡須沙羡建瓴甌窶汙邪柣棖橛榫卯白屋衡門三戶黃鶴樓沙堤火城草莽市井揭涉厲圯上脽上鴛鴦瓦紫微堂虛集開阡陌東南西北音義酇䣜古南衙盬字有三義井幹杝巴銅柱藉田行馬灃灃帶礪胥濤江黃瀚海古今地名不同雷首龍門吕梁辨先儒江漢經文之誤弱水黑水三危舜陵陟方嶽滄浪蒼梧鳴條熊耳各二鹵莽滅裂荆蠻東陵欽定四庫全書名義考卷四明周祈撰地部菑畬菑音淄畬音豫爾雅田一歲曰菑二歲曰新田三歲曰畬鄭云田一歲曰菑二歲曰畬三歲曰新田鄭與爾雅小異鄭說是也菑災也始災殺其草木也畬漸和柔也新謂已成田尚新也四歲則田矣街階祴祴音皆街四通道也今街衢之街階陛也今階級之階祴磚道也周禮考工記堂涂注若今令甓祴今之磚砌地也令與瓴同爾雅瓴甋謂之甓濫觴濫竽家語江出岫山源可濫觴言其初尚微也韓子齊宣王使人吹竽有三百人南郭先生不知竽而濫於三百人之中以食祿言非據也陽溝中華古今注楊溝植髙楊於其上也一曰羊溝為溝以阻羊之抵觸也二說皆非楊當作陽隂溝水入地潛行陽溝水出地顯行見不見之别耳州郡府縣人皇氏依山川土地之勢財度九州州之名始見周制天子地方千里分為百縣縣有四郡郡縣之名始見唐改郡為州改大州為府府之名始見人皇氏之九州即舜之十二州秦之三十六郡西漢之十三州唐之十道宋之二十三路今之十三布政司也周制千里百縣百里之國也縣有四郡不能五十里之國也七十里五十里之國又損益於其中秦以後其制盡廢今之府由漢以來之郡之州也今之縣由秦以來之縣也其廣狹大小代有不同耳四十雙金黃花老人詩招客先開四十雙雲南雜志夷人耕者三人使二牛前牽中壓而後驅之犂一日為一雙約有中原四畝地蓋一日二牛謂之雙地則四畝今粵西計田以工二工言一人可耕耘也大率三工為一畝衙門古者天子出建大牙旗故有建牙之號吳志孫權作黃龍大牙帶在軍中視其所向又立於帳前謂之牙門公孫瓉傳拔其牙門是也唐制天子居曰衙行曰駕遂謂正朝為正衙後通謂官府為衙門乃牙門之訛不知何始官寺日再視事謂之放衙丁文果射覆花花華華雖無官職一日兩衙是也花音委康衢擊壤爾雅四達謂之衢五達謂之康六達謂之莊史記所謂康莊之衢風土記擊壤以木為之長三四寸其形如履臘節僮少以為戲分部以擲摶也將戲先側一壤於地遙於三四十步以手中壤擲之中者為上擲音直端門掖門五鳳樓端門見周勃傳師古曰殿之正門掖門見成帝紀服䖍曰正門之旁小門如人臂掖也五鳳樓梁太祖即位羅紹威取魏良材建周翰所謂去地百丈在天半空五鳳翹翼者也濡須沙羡須音誨羡音夷濡須水名在今巢縣南一名天河水須從水俗從彡是須㬰之須矣沙羡邑名即今江夏地羡近知切今讀作延靣切是歆羡之羡矣形聲少差其義逈别彡音衫建瓴建音蹇史記髙屋之上建瓴水注瓴盛水瓶建翻水也韻㑹覆也覆瓶水於髙屋之上其下注之勢順也甌窶汙邪窶音樓甌窶偏側之地汙邪下地也淳于髠傳甌窶滿篝汙邪滿車謂偏側汙下之地皆生五穀篝笭與車皆滿也柣棖橛柣音送爾雅柣謂之閾棖謂之楔橛謂之闑郭璞云閾門限也楔門兩旁木橛門閫孫炎云門限謂門下橫木為內外之限今亦謂之門限其制有三有一定者今宫府及南人門多用之有起落者有不設者蓋古者多乘車入門必脫限棖門兩旁斜柱兩木中為容以受限專以便起落也橛門中所𥪡短木以礙扉此不設限者也二者今驛舍城門及北人門多用之是門限謂之柣曲禮云不履閾是也門兩旁斜木謂之棖玉藻大夫中棖與闑之間是也門中橛為闑玉藻君入門介拂闑是也限音歉榫卯榫音筍伊川語録云枘鑿者榫卯也楊用修謂榫卯當作簨牡按簨所以懸鐘鼓者橫曰簨卯固當作牡榫亦當作牝蓋牡與卯牝與榫聲相近遂訛也直音雖有榫字只是俗書蓋枘以入鑿其象牡鑿以受枘其象牝今俗猶云公母榫枘音鋭白屋衡門白屋以白茅覆屋也衡門橫一木為門也巖穴之士其居如此三戶楚南公曰楚雖三戶亡秦必楚韋昭謂三戶楚三大姓屈景昭左傳以界楚師於三戶杜預注今丹水縣北三戶亭則三戶當是地名服䖍云三戶漳水津也括地志漳水北經三戶峽為三戶津在相州滏陽縣界後項羽宷渡三戶津破章邯軍邯降秦遂亡南公六國時人善䜟緯知秦亡必於三戶也昭說雖通非南公術數曰雖者設為疑辭不顯言也相州今彰德府滏陽縣今磁州黃鶴樓黃鶴樓在今武昌唐圖經云費文禕登仙駕黃鶴返憩於此張南軒云黃鶴以山得名今黃鶴樓側有山名黃鵠南軒說是也按鵠蔡衡曰鳯多白色者鵠索隱曰鴻鵠是一鳥若鳳凰然則鵠鳳類也或稱鴻或稱白或稱黃耳黃與白色相近鴻大也司裘注鵠者鳱鵠小鳥難中者也玉篇鳱鵠鵲也鳥之知來者今靈鵲是鳱鵠為小則鴻鵠為大矣既以山得名何又言鶴蓋鵠不常有人鮮的識後人因易以鶴圖經妄託之費文褘也鳱鵠後人又妄作乾鵲鳱音干沙堤火城唐故事凡拜相者府縣載沙填路自私第至子城東街名曰沙堤李肇國史補每大朝㑹百官己集宰相方至列燭多至數百炬謂之火城宰相火城至衆皆滅燭以避之唐宋相如此今亦無矣草莽市井杜預曰草生廣野莽莽然故曰草莽師古曰凡言市井者市交易之處井共汲之所一說古者一井之地以二十畝為廬舍因為市以交易故曰市井揭涉厲爾雅繇膝以下為揭繇膝以上為涉繇帶以上為厲蓋水淺自膝以下攝衣而渡曰揭差深自膝以上徒行而渡曰涉若深至衣帶以上以衣而渡曰厲攝衣之衣謂裳以衣之衣謂褌也徒行不止攝裳又不必用褌也厲本作濿圯上脽上張良傳良遊下邳圯上遇老父墜履圯下楚人謂橋為圯李白詩我來圯橋下懷古欽英風既曰圯又曰橋復矣白誤讀圯為圮族之圮猶云敗橋不知圯上之圯從已矣之已左無缺圮族之圮從人已之已左缺文微不同漢武紀祭后土汾脽上師古曰脽以形髙起如人尻脽嘗考鄈河東臨汾地漢祭后土處彼土呼鄈為誰訛為脽師古不知而以尻脽釋之鄈在河東岸長四五里廣一里髙十餘丈安得似尻脽也圯音痞尻音􅒱鄈音葵汾與焚同脽與誰同鴛鴦瓦唐人鴛鴦詩耿霧盡迷朱殿瓦魏文帝夢殿上雙瓦落地化為鴛鴦以問周宣對曰後宫當有暴死者已而果然則鴛鴦瓦不惟不吉特文帝所夢則然耳安得謂瓦為鴛鴦乎至詠鴛鴦用瓦尤為不通紫微堂今藩司堂扁有曰紫薇堂者其義不可曉意必因元人行中書省之故也唐開元間改中書省曰紫微省以中書令掌佐天子執大政有藩臣匡衛之義取象於紫微星則微乃微顯之微今扁者作薇藿之薇殊未考也虛集古謂市賣之區曰虛曰集集聚也神農日中為市致天下之民聚天下之貨故謂之集方市則集市罷則虛故謂之虛桞宗元云虛所賣之嶺表録虛市以易醑峒氓詩緑荷包飯赴虛人作墟者誤也况虛本從業乎業古丘字開阡陌顔師古謂阡陌是商鞅所開朱子謂阡陌之外有地商鞅却破開了使成田更不要齊整二說恐非先王井田之制阡是洫上之路陌是遂上之塗有井田便有阡陌豈得是鞅所開又豈得是鞅破開了若云阡陌之外破開成田則此阡陌尚存井田猶末廢蓋開猶除也開除阡陌并其經界而去之也正是廢井田東南西北音義東春方又音當丁東玉聲也南夏方又音淫詩以雅以南樂舞也西秋方又音先漢郊祀歌白集西遷方也北冬方又音佩書分北三苖分異之也穀梁隱十年注戰不逐北敗也酇䣜酇音贊䣜音磋酇則旦切䣜才何切皆秦之縣名酇屬南陽郡漢初以封蕭何䣜屬沛郡後續封何之子地本不同字亦各異集韻酇又才何切䣜亦作酇韻㑹謂酇蕭何子孫所封䣜蕭何初封邑是二字果同音而亦可互用耶此其必不然也何初封本南陽之酇非才何切續封則沛郡之䣜亦不可作酇而乃有訛者何也蓋其後以初封本酇後雖改封䣜仍稱酇也猶楚初封郢後徙陳徙夀春仍稱郢也然則郢亦可他鄰女救二切陳與夀亦可作郢耶古南衙今開封府稱古南衙不知其義古者前朝後市王宫在南漢以宫城之軍謂之南軍唐謂之南衙五代謂之殿前司宋以殿前都檢㸃受周禪都汴梁今開封府治或即宋殿前司治所猶襲唐南衙之名也盬字有三義鼠璞曰食貨志猗頓用盬鹽注盬鹽池也詩王事靡盬注不堅固也周禮盬人共甘苦鹽杜子春謂盬鹽不練治也詩禮注謂盬為不堅固不練治食貨注謂盬為鹽池二說似異然盬池練治後成鹽其為鹽也難壞出水即成鹽其為鹽也易壞其理一也豫又思左傳夢楚子伏已而盬其腦注盬喋也喋啖也鹽可啖故謂啖為盬字義固有不同者其因此生彼者甚衆如殿大堂也有鎮意故謂軍後曰殿廉堂垂也有分辨意故謂不茍取曰廉初讀若判然不相蒙細思理實相通也喋音匝啖音淡鹽音古井幹幹音寒漢書武帝立井幹之樓楊子重黎篇或問茅焦厯井幹之死按井幹井上木欄其形四角或八角師古曰積木而髙於樓若井幹之形司馬曰始皇殺諌者二十七人積之闕下如井幹之狀杝巴通俗文柴垣曰杝木垣曰栖南土悉以竹為之斜織者謂之巴非杝杝本作籬釋名以柴為之疏離離然爾雅樊藩也郭璞云藩籬也銅柱銅柱二一在交趾漢光武時交趾女子徴側反光武拜馬援為伏波將軍討平之援立銅柱為漢之極西界一在辰州府城西北五代晉時漢州刺史彭士愁納土求盟于楚楚王馬希範立銅柱為界藉田藉音瘠藉田多作藉風俗通曰古者使民如借故曰藉田鄭𤣥曰藉之言借也從草作藉字與訓皆非也國語宣王不藉於千畝月令藏帝藉於神倉從表昔聲作藉按玉篇鋤藉也天子親耕有事於鋤故曰藉田盧植曰藉耕也引左傳鄅人藉耕意雖得而字不免於誤一曰藉蹈藉也謂天子親蹈之也亦通王制古者公田藉而不稅孟子助者藉也則當從草作藉行馬今制朝門及公府以衡木為斜好别以木交錯穿之樹於門外俗謂鹿角義即古之行馬也魏文帝拜楊彪光祿大夫令門施行馬晉孝武置檢校御史知行馬外事行馬即周禮所謂梐枑也夫本以禁馬曰行馬者反言之也今言者請禁百官馬不得入柞內按柞疾各切櫟也又陟格切除草也並非行馬之義亦非鋤駕切若謂為遮欄則當用􅀢字􅀢胡挂切橫木不入也􅀢音化灃灃灃音風灃音里灃灃二水名灃水出鄠南山豐谷北入渭周都酆邑酆以灃水得名通作豐詩維豐之垣書王來自商至於豐灃字從水豐聲豐從兩丰從山從豆灃水出衡山乃江沅之别流今嶽之灃州以灃水得名書東至於灃楚辭濯余佩於灃浦灃字從水豐聲豐從兩丰從凵從豆文本相似但其中一從山一從凵耳蔡雍以豐同豐誤凵音歉帶礪漢功臣誓黃河若帶泰山若礪謂河竭若束帶山泐如礪石猶岸為谷谷為陵之意俗云海枯石爛也胥濤臨安志吳王既賜子胥死盛以鴟夷之革浮之江中子胥因流揚波依潮來往或有見其乘素車白馬在潮頭者盧元輔謂憤悱致怒配濤作神范希文云伍胥神不滅𤣥貞子云濤之靈曰江胥皆以濤子胥為之也論衡雖辨其妄以子路彭越不能發怒於鼎鑊之中似亦不必以此為證吳越之中惟江濤最雄擁如山嶽奮如雷霆山海經以為海鰌出入浮屠書以為神龍變化猶臨安志以為子胥揚波也素車白馬亦猶李白所謂連山噴雪耳或當時為是說以懼吳王後遂謬傳之也江黃江黃人多以為今九江黃州不知非也江春秋時國名漢改為陽安縣晉省故城在今息縣西南一十里黃古黃子國漢初屬汝南後屬江夏魏省故城在今光州西一十二里瀚海博物志四海之外皆復有海南海之外有漲海北海之外有瀚海是以瀚海與漲海等皆水也不知瀚海在火州桞城東北地皆沙磧若大風則行者人馬相失夷人呼為瀚海宋史云瀚海沙深五尺不育五穀沙中生草名登相可食以沙飛若浪人馬相失若沉視猶海然非真濁晦之海也古今地名不同古今地名不同者甚衆姑舉一二顯著者黃帝與蚩尤戰於涿鹿今保安州涿鹿山非涿州舜耕於厯山今蒲州南有厯山非濟南厯城禹避舜之子於陽城今登封縣非澤州陽城周封熊繹於丹陽之地今歸州東七里春秋丹陽邑秦彭超謂苻堅曰丹陽不足平今應天府又今寧國府漢初為丹陽郡俱非鎮江丹陽陳勝吳廣起兵於蘄今宿州南四十里秦蘄縣非蘄州圯上老父謂良曰十三年孺子見我穀城山下黃石即我矣今東阿縣黃山非德安穀城漢擊韓王信餘冦過柏人今唐山縣非柏鄉縣景帝徙衡山王勃為濟北王今六安州漢衡山國非衡州衡山漢遣謁者說降漢陽散羌今秦州非漢陽府朱邑少為桐鄉嗇夫今懷寧縣非嘉興桐鄉成帝封王根為曲陽侯今濟源縣西南一十五里春秋曲陽邑非定州曲陽吳漢耿弇擊富平獲索於平原今樂陵縣非耀州富平樂安太守陸康上書今武定縣非撫州樂安沮授勸袁紹留屯延津今滑縣東二十里漢延津縣非開封延津曹操鑿泉州渠以通漕今武清縣東南四十里漢泉州縣非泉州府丁忠說吳主亮弋陽可襲而取今光州漢弋陽國非廣信弋陽晉燕冦陷魯髙平今濟寧州晉髙平國非澤州髙平劉裕至東莞與燕兵戰於臨朐今沂水縣非廣州東莞梁定州刺史蕭勃㑹楊㬓於西江今鬱林州陳定州刺史田龍升以江北叛今麻城縣俱非真定定州若以今之地名而求古人之蹟則舛矣雷首禹貢雷首即首陽山徐廣云雷首山在河東蒲坂縣封禪書所謂薄山也括地志云薄山一名襄山一名雷首山一名首陽山在芮縣北十里蒲坂即今蒲州芮縣即今芮城此山盤亘蒲芮數百里之地或云在蒲坂或云在芮縣也今蒲州首陽山上有夷齊墓者是一云在偃師縣西北一云在襄城縣南皆非龍門吕梁闕龍門伊水所出又以吕梁洪為吕梁夫吕梁洪在徐州雖河流所經逺去孟門數千里皆非也按龍門古耿國殷王相所都在今河津縣三秦記河津一名龍門江海大魚集門下數十不得上上即為龍是龍門山也吕梁在今石州書治梁及岐春秋梁山崩莊子孔子觀於吕梁縣水三十仭流沫四十里酈道元謂吕梁之石崇竦河流激蕩震動天地皆謂在石州者也龍門吕梁皆晉山故二山未治河出孟門之上也辨先儒江漢經文之誤禹貢嶓冡導漾二條先儒疑經文與地理不合朱子謂彭蠡即今番陽湖受湖東西諸州之水趨湖口以入於江為江水所遏因却而自豬為澤初無所仰於漢水又謂漢水入江之後未嘗不相持以東惡覩所謂中江北江之别蔡沈謂江漢之間三苗頑不即工禹未嘗親蒞即官屬亦未深入其境以此致誤鄭漁仲謂東滙澤以下十三字為衍文是皆未之考也嶓冡山在今漢中沔縣漢水發源名漾東流至洋縣為漢又東至均州為滄浪過景陵三澨至漢陽大别南入於江徐鉉云江水出岷山至楚都名南江此云南入於江謂漢水入於南江也東滙澤為彭蠡滙當作㑹言漢水東㑹於彭蠡也為彭蠡者言澤為彭蠡非謂漢為彭蠡也故下文云東迤北㑹於滙東為北江即徐鉉所謂江至南徐州為北江漢水至此為北江也南徐州即今鎮江府漢至是趨揚州之海門縣入海矣岷山在今成都府茂州江水發源東至新繁為沱又東至於灃灃即離騷灃浦在今慈利者也九江今洞庭湖江水過之至於東陵地志東陵道士洑在今黃州東者也自漢水南入於江二水合流東迤北㑹於滙滙猶言彭蠡江既言㑹漢惡得言滙乎東為中江即徐鉉所謂江至潯江為九道名中江也亦至海門縣入海是南江在今武昌中江在今九江北江在今鎮江揚之三江既入正謂此也書將言揚州治故云三江既入將言荆州治故云江漢朝宗於海江漢發源於梁州荆之上流也南江在荆州揚之上流也上流治則下流無不治矣此書法也韋昭謂松江錢塘浦陽為三江唐仲初謂婁江東江松江為三江張守節謂三江在蘇州東南三十里名三江口與諸家三江之說皆非也如此訓則經文未嘗與地理不合夫何疑乎弱水黑水薛氏曰弱水出吐谷渾界窮石山至合黎與張掖河合漢張掖郡今陕西甘州衛合黎其山鎮也弱水與張掖河合則弱水當在甘州境內今甘州一帶環青海渥窪之流浸居延鮮卑之水未見有所謂弱水者豈古有而今湮塞耶西域傳弱水在條支然條支去雍州幾二萬里非是或别一弱水也至謂蓬萊弱水則又荒唐矣黑水水經出張掖郡雞山地志出􅛳為郡南廣縣汾關山今平凉府開城縣有川曰大黑水平凉去甘州不逺在漢屬張掖郡雍州西據黑水者此也􅛳為郡今叙州府城南馬湖江一名盧水盧黑也梁州西據黑水者此也是黑水有二雍州雞山黑水至三危與梁州汾關山黑水南流入於南海故蘇綽云黑水自雍之西北而直出梁之西南二州皆以黑水為界也或以麗水為黑水或以西珥河為黑水俱非是然黑水亦非一今定州漢故奴盧縣奴不流盧黑以縣有黑水不流故名陕西安化縣文縣山東蓬萊縣皆有黑水三危三危蔡沈云西裔之地又云即舜竄三苖之地或以為燉煌水經黑水南至燉煌過三危山蘇綽云麗水者即古之黑水也三危山臨峙其上由蔡說則三危地名由水經蘇綽之說則三危山名按燉煌今陜西赤斤蒙古衛三危既宅見雍州則三危為燉煌明矣非山也如水經所云則燉煌與三危為二如蘇綽所云麗水今雲南麗江府則三危既宅當見梁州不應在雍州也二說非是蔡說為近之但未詳其實也舜陵史記舜南巡崩於蒼梧之野葬零陵之九疑此馬遷牽合有庳之事附㑹家語而不覺其謬也家語舜陟方嶽死於蒼梧之野而葬焉按蒼梧有二一郡名今梧州府一山名郴陽何孟春云在海州舜葬當於此孟子舜卒於鳴條吕氏春秋舜葬於紀何孟春云鳴條亭名在陳留縣紀城名在莒州蒼梧山近莒之紀城去鳴條不逺故或言蒼梧或言鳴條或言紀也皆東方之地若蒼梧郡則南方矣且蒼梧郡漢武時始置九疑在秦時屬長沙郡即零陵猶未有也何得言葬零陵之九疑為崩於蒼梧之野然則遷何所本歟昔者舜封象於有庳有庳今道州也九疑山在道州象建國於此死而葬焉後人誤以象冡為舜陵遷因家語有死於蒼梧之文又因九疑有象冡遂不疑謂舜崩於蒼梧之野葬零陵之九疑也使舜南巡崩當云死於衡山之野而葬焉不應云死於蒼梧之野也且衡山去古帝都最逺黃帝以灊霍二山為副漢武徙南嶽之祭於灊山皆以逺故也九疑去衡山又將千里舜勤事野死至衡山足矣葬衡山已矣何暇至蒼梧葬九疑也今九疑有舜嶺舜源簫韶峰臯陶祠皆濫觴於遷耳或曰屈原九辨有湘君湘夫人黃陵廟有舜二妃墓此又何也曰湘君湘夫人不可知為誰即舜南巡豈以二妃從舜既崩二妃豈涉萬里以殉皆誣也陟方嶽舜年百有十歲崩尚書陟方乃死家語陟方嶽死於蒼梧之野而葬焉尚書脫一嶽字當以家語為是孔安國不察以升遐訓陟方謂陟為升遐其義雖通以方屬陟為讀則不可且既言升遐焉得又言乃死也如馬遷所云葬零陵之九疑當是陟南嶽據今所考葬海州之蒼梧山則是陟東嶽家語所謂陟乃陟彼岵兮之陟安國所云陟乃殷禮陟配天之陟自有能辨之者滄浪蒼梧鳴條熊耳各二滄浪水名一在嶧縣孟子滄浪之水清兮一在均州禹貢又東為滄浪之水蒼梧二一郡名今梧州府一山名在海州家語舜死於蒼梧之野而葬焉鳴條二一亭名在陳留孟子舜卒於鳴條一邑名今安邑縣伊訓造攻自鳴條熊耳山名一在盧氏縣禹貢導洛自熊耳一在洛南縣禹貢熊耳外方桐柏至於陪尾鹵莽滅裂長梧封人曰豫昔為禾耕而鹵莽之則其實亦鹵莽而報豫藝而滅裂之其實亦滅裂而報豫按鹵鹹地也莽草淹地也滅赤地也裂龜坼地也四者地之不可耕藝者也為禾者因其鹵莽而鹵莽之滅裂而滅裂之其實有不鹵莽不滅裂而報豫者乎所謂欲惡之孽為性萑葦也善為禾者去鹵莽之耕善養性者去欲惡之孽善為政者去淫邪之民楊用修所訓四字殊覺牽强通義愈疏荆蠻太伯奔荆蠻自號句吳按吳揚州域非荆不應謂之荆蠻太伯與仲雍初奔所至地為梅里聚梅里聚人立以為君號句吳梅里聚在今吳縣北句發語聲吳大也言太伯當昌大也吳之名始此而曰荆蠻者何荆楚也蠻越也梅里聚介在楚越之間故曰荆蠻東陵禹貢導江過九江至於東陵集傳謂東陵為巴陵按九江今洞庭湖在巴陵不應過洞庭又至巴陵也地志以東陵為道士洑在黃州東一百二十里與江水經流次第相協史記楚世家秦將白起拔我西陵括地志西陵故城在黃州黃山西二里以此互證則東陵為道士洑無疑名義考卷四
