body:
  text: 名義考雜家類二雜考之屬提要臣等謹案名義考十二卷明周祈撰祈蘄州人始末未詳前有萬厯甲申劉如寵序稱為周大夫又有萬厯癸未袁昌祚重刻序稱其嘗為民部郎又稱其從幼時授經至綰組擁軺不知確為何官也其書凡天部二卷地部二卷人部四卷物部四卷各因其名義而訓釋之其有異同則雜引諸書參互辨證雖條目浩博不無訛誤如論月星則不知推步之術論河源則全據傳聞之訛論廣輪則不知周禮先有此文論化日則不知夫論實無此語論鮮卑以栁城為栁州論肉刑以漢文為魏文論箜篌為即琵琶論杜甫詩竹根為酒杯如斯之類抵牾恆有然訂謬析疑可取之處為多惟援引舊文往往不著出典不出明人著書通病云爾乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部十名義考目録雜家類二雜考之屬卷一天部卷二天部卷三地部卷四地部卷五人部卷六人部卷七人部卷八人部卷九物部卷十物部卷十一物部卷十二物部
